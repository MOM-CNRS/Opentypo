# En dev local : stocker les images hors du projet pour éviter que DevTools
# redémarre l'app à chaque upload (Spring Boot DevTools surveille les fichiers du projet)
opentypo:
  images:
    path: ${java.io.tmpdir}/opentypo-images

server:
  port: 8080
  servlet:
    session:
      timeout: -1
      cookie:
        http-only: true
        secure: ${COOKIE_SECURE:false}  # true en production avec HTTPS
        same-site: strict

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/opentypo
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    validate-on-migrate: true
    clean-disabled: true
    out-of-order: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false
        envers:
          audit_table_suffix: _aud
          revision_field_name: rev
          revision_type_field_name: revtype
          store_data_at_delete: true
          default_schema: public
        enable_lazy_load_no_trans: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

logging:
  level:
    root: INFO
    fr.cnrs.opentypo: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    jakarta.faces: INFO
    org.joinfaces: INFO
    org.primefaces: WARN
