# Configuration commune (local et prod)
# Exclut ErrorMvcAutoConfiguration pour éviter le conflit avec notre ErrorController personnalisé

# Images uploadées : répertoire racine (par défaut : répertoire de travail + /images)
opentypo:
  images:
    path: ${OPENTYPO_IMAGES_PATH:${user.dir}/images}
  # Upload HTTP optionnel (ex. candidats) : URL de base, chemin POST, clé Bearer optionnelle
  remote-image-upload:
    base-url: ${OPENTYPO_REMOTE_IMAGE_UPLOAD_BASE_URL:http://localhost:8182}
    api-key: ${OPENTYPO_REMOTE_IMAGE_UPLOAD_API_KEY:}
    path: ${OPENTYPO_REMOTE_IMAGE_UPLOAD_PATH:/api/upload}
  # Bibliothèque Zotero du projet (API v3). Clé API recommandée pour les quotas : https://www.zotero.org/settings/keys
  zotero:
    group-id: ${OPENTYPO_ZOTERO_GROUP_ID:6519271}
    api-key: ${OPENTYPO_ZOTERO_API_KEY:}
    citation-style: ${OPENTYPO_ZOTERO_CITATION_STYLE:chicago-note-bibliography}
    locale: ${OPENTYPO_ZOTERO_LOCALE:fr-FR}

spring:
  autoconfigure:
    exclude: org.springframework.boot.webmvc.autoconfigure.error.ErrorMvcAutoConfiguration
  devtools:
    restart:
      # Évite le redémarrage quand on upload une image (fichiers sauvegardés dans images/)
      additional-exclude: "**/images/**"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# PrimeFaces : "commons" pour upload fiable (native ne déclenche pas le listener avec JoinFaces)
# JSF : state-saving=server (client provoque "Illegal base64 character 3a" avec upload multipart)
# Mojarra : nombre de vues augmenté pour limiter ViewExpiredException
joinfaces:
  primefaces:
    uploader: commons
  jsf:
    state-saving-method: server
  mojarra:
    numberOfViewsInSession: 100
