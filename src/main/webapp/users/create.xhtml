<ui:composition template="../commun/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="mainContent">
        <!-- Page création/édition utilisateur : en-tête + formulaire + groupes -->
        <div class="users-container">
            <!-- En-tête (titre + bouton Retour) -->
            <div class="users-header">
                <div class="users-header-content">
                    <div>
                        <h1 class="users-title">
                            <i class="pi pi-#{userManagementBean.editMode ? 'pencil' : 'plus-circle'} users-title-icon" />
                            #{userManagementBean.editMode ? msg['users.create.title.edit'] : msg['users.create.title.new']}
                        </h1>
                        <p class="users-subtitle">#{userManagementBean.editMode ? msg['users.create.subtitle.edit'] : msg['users.create.subtitle.new']}</p>
                    </div>
                    <h:form>
                        <p:commandButton value="#{msg['users.create.back']}"
                                       icon="pi pi-arrow-left"
                                       styleClass="users-create-button"
                                       action="/users/users.xhtml?faces-redirect=true"
                                       process="@this"
                                       update="@none"/>
                    </h:form>
                </div>
            </div>

            <!-- Formulaire utilisateur -->
            <div class="users-content">
                <h:form id="userForm">
                    <p:panel header="#{msg['users.panel.title']}" styleClass="users-form-panel">
                        <div class="users-form-grid">
                            <div class="users-form-group users-form-group-full">
                                <p:outputLabel for="email" value="#{msg['users.form.email']}" />
                                <p:inputText id="email"
                                           value="#{userManagementBean.newUser.email}"
                                           required="true"
                                           requiredMessage="#{msg['users.form.email.required']}"
                                           disabled="#{userManagementBean.editMode}"
                                           styleClass="users-input"
                                           placeholder="#{msg['users.form.email.placeholder']}"
                                           maxlength="255" />
                                <p:message for="email" display="icon"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="firstName" value="#{msg['users.form.firstName']}" />
                                <p:inputText id="firstName"
                                           value="#{userManagementBean.newUser.prenom}"
                                           required="true"
                                           requiredMessage="#{msg['users.form.firstName.required']}"
                                           styleClass="users-input"
                                           placeholder="#{msg['users.form.firstName.placeholder']}"
                                           maxlength="100" />
                                <p:message for="firstName" display="icon"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="lastName" value="#{msg['users.form.lastName']}" />
                                <p:inputText id="lastName"
                                           value="#{userManagementBean.newUser.nom}"
                                           required="true"
                                           requiredMessage="#{msg['users.form.lastName.required']}"
                                           styleClass="users-input"
                                           placeholder="#{msg['users.form.lastName.placeholder']}"
                                           maxlength="100" />
                                <p:message for="lastName" display="icon"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="password" value="#{msg['users.form.password']} #{userManagementBean.editMode ? msg['users.form.password.optional'] : '*'}" />
                                <p:password id="password"
                                         value="#{userManagementBean.newUser.passwordHash}"
                                         requiredMessage="#{msg['users.form.password.required']}"
                                         feedback="false"
                                         styleClass="users-input"
                                         placeholder="#{msg['users.form.password.placeholder']}"
                                         maxlength="255" />
                                <p:message for="password" display="icon"/>
                                <p:tooltip for="password" value="#{msg['users.form.password.tooltip']}" position="right"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="groupe" value="#{msg['users.form.group']}" />
                                <p:selectOneMenu id="groupe"
                                                 value="#{userManagementBean.selectedGroupeId}"
                                                 required="true"
                                                 requiredMessage="#{msg['users.form.group.required']}"
                                                 styleClass="users-select">
                                    <f:selectItem itemLabel="#{msg['users.form.group.select']}" itemValue=""/>
                                    <f:selectItems value="#{userManagementBean.availableGroups}" var="groupe" itemLabel="#{groupe.nom}" itemValue="#{groupe.id}"/>
                                    <p:ajax event="change"
                                            process="@this"
                                            listener="#{userManagementBean.onGroupeChange}" />
                                </p:selectOneMenu>
                                <p:message for="groupe" display="icon"/>
                            </div>

                            <div class="users-form-group users-form-group-full">
                                <div class="users-checkbox-wrapper">
                                    <p:selectBooleanCheckbox id="active" value="#{userManagementBean.newUser.active}" styleClass="users-checkbox"/>
                                    <p:outputLabel for="active" value="#{msg['users.form.active']}" />
                                </div>
                            </div>
                        </div>
                    </p:panel>

                    <div class="users-form-actions">
                        <p:commandButton value="#{msg['users.form.cancel']}"
                                       icon="pi pi-times"
                                       styleClass="users-btn users-btn-cancel"
                                       action="/users/users.xhtml?faces-redirect=true"
                                       process="@this"
                                       update="@none"/>
                        <p:commandButton value="#{msg['users.form.save']}"
                                       icon="pi pi-check"
                                       styleClass="users-btn users-btn-save"
                                       action="#{userManagementBean.sauvegarderUser}"
                                       process="@form"
                                       update="@form :growl"/>
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>

</ui:composition>
