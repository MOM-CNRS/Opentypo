<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Zone de présentation du site - contenu par langue (table langue) -->
    <h:panelGroup id="sitePresentationContent" layout="block" styleClass="site-presentation-container">
        <h:form id="sitePresentationForm">
            <!-- Mode affichage -->
            <h:panelGroup layout="block" styleClass="site-presentation-content" rendered="#{not sitePresentationBean.editing}">
                <div class="site-presentation-header">
                    <div class="site-presentation-icon">
                        <i class="pi pi-info-circle" />
                    </div>
                    <div class="site-presentation-title-row">
                        <h2 class="site-presentation-title">#{sitePresentationBean.currentPresentation.titre}</h2>
                        <p:commandButton icon="pi pi-pencil"
                                         styleClass="site-presentation-edit-btn p-button-text p-button-rounded"
                                         title="Modifier la présentation"
                                         rendered="#{sitePresentationBean.canEditPresentation()}"
                                         action="#{sitePresentationBean.startEdit()}"
                                         process="@this"
                                         update=":sitePresentationContent"
                                         ajax="true"
                                         oncomplete="sitePresentationEnterAnimation()"/>
                    </div>
                </div>
                <div class="site-presentation-body">
                    <div class="site-presentation-text site-presentation-description-display">
                        <h:outputText value="#{sitePresentationBean.currentPresentation.description}" escape="false"/>
                    </div>
                </div>
            </h:panelGroup>

            <!-- Mode édition inline -->
            <h:panelGroup layout="block" styleClass="site-presentation-content site-presentation-edit-mode" rendered="#{sitePresentationBean.editing}">
                <div class="site-presentation-header">
                    <div class="site-presentation-icon">
                        <i class="pi pi-pencil" />
                    </div>
                    <h2 class="site-presentation-title">Modifier la présentation</h2>
                </div>
                <div class="site-presentation-body site-presentation-edit-fields">
                    <div class="site-presentation-edit-field site-presentation-langue-field">
                        <p:outputLabel for="editLangueCode" value="Langue" styleClass="site-presentation-edit-label"/>
                        <p:selectOneMenu id="editLangueCode"
                                         value="#{sitePresentationBean.editLangueCode}"
                                         style="border: none !important"
                                         styleClass="collection-select">
                            <f:selectItem itemLabel="Sélectionner une langue" itemValue="" />
                            <f:selectItems value="#{sitePresentationBean.availableLanguages}"
                                           var="langue"
                                           itemLabel="#{langue.nom}"
                                           itemValue="#{langue.code}" />
                            <p:ajax event="change"
                                    listener="#{sitePresentationBean.onEditLangueChange()}"
                                    process="@this"
                                    update="@form"/>
                        </p:selectOneMenu>
                    </div>
                    <div class="site-presentation-edit-field">
                        <p:outputLabel for="editTitre" value="Titre" styleClass="site-presentation-edit-label"/>
                        <p:inputText id="editTitre"
                                     value="#{sitePresentationBean.editTitre}"
                                     styleClass="site-presentation-edit-input"
                                     maxlength="255"/>
                    </div>
                    <div class="site-presentation-edit-field">
                        <p:outputLabel for="editDescription" value="Description" styleClass="site-presentation-edit-label"/>
                        <p:textEditor id="editDescription"
                                      value="#{sitePresentationBean.editDescription}"
                                      height="140"
                                      secure="false"
                                      styleClass="site-presentation-texteditor"
                                      placeholder="Saisissez la description (texte riche)…"/>
                    </div>
                    <div class="site-presentation-edit-actions">
                        <p:commandButton value="Annuler"
                                         icon="pi pi-times"
                                         styleClass="p-button-secondary site-presentation-action-btn"
                                         action="#{sitePresentationBean.cancelEdit()}"
                                         process="@this"
                                         update=":sitePresentationContent"
                                         oncomplete="sitePresentationEnterAnimation()"/>
                        <p:commandButton value="Enregistrer"
                                         icon="pi pi-check"
                                         styleClass="p-button-primary site-presentation-action-btn"
                                         action="#{sitePresentationBean.savePresentation()}"
                                         process="@form"
                                         update=":growl :sitePresentationContent"
                                         oncomplete="sitePresentationEnterAnimation()"/>
                    </div>
                </div>
            </h:panelGroup>
        </h:form>
    </h:panelGroup>

    <script type="text/javascript">
        function sitePresentationEnterAnimation() {
            setTimeout(function() {
                var el = document.querySelector('.site-presentation-container .site-presentation-content');
                if (el) {
                    el.classList.remove('site-presentation-animate');
                    el.offsetHeight;
                    el.classList.add('site-presentation-animate');
                    setTimeout(function() { el.classList.remove('site-presentation-animate'); }, 440);
                }
            }, 40);
        }
    </script>
</ui:composition>
