<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <!-- Barre d'outils collections -->
    <h:panelGroup id="create-collection-section" class="create-collection-section index-create-section-bar"
                  rendered="#{loginBean.isAdminTechniqueOrFonctionnel()}" >
        <div class="collections-toolbar">
            <!-- Sélecteur de mode de tri -->
            <ui:include src="/commun/components/sort-selector.xhtml">
                <ui:param name="listType" value="collections"/>
                <ui:param name="updateId" value=":collectionsForm :create-collection-section"/>
                <ui:param name="sizeGt1" value="#{applicationBean.collections.size() gt 1}"/>
                <ui:param name="styleClass" value="collections-sort-selector"/>
                <ui:param name="optionClassPrefix" value="collections-sort"/>
                <ui:param name="label" value="#{msg['index.collections.sortLabel']}"/>
            </ui:include>

            <h:panelGroup layout="block" styleClass="collections-toolbar-divider" rendered="#{applicationBean.collections.size() gt 1 and loginBean.isAdminTechniqueOrFonctionnel()}"/>

            <h:panelGroup styleClass="create-collection-section-actions">
                <p:commandButton value="Réorganiser l'ordre"
                                 icon="pi pi-sort-alt"
                                 rendered="#{applicationBean.collections.size() gt 1}"
                                 styleClass="collection-toolbar-btn collection-toolbar-btn-secondary"
                                 action="#{applicationBean.prepareCollectionsOrderDialog()}"
                                 process="@this"
                                 update=":orderListDialog"
                                 oncomplete="PF('orderListDialog').show();"/>
                <p:commandButton value="#{msg['index.collections.create']}"
                                 icon="pi pi-plus"
                                 styleClass="collection-toolbar-btn collection-toolbar-btn-primary"
                                 process="@this"
                                 update="collectionDialogForm"
                                 actionListener="#{collectionBean.resetCollectionForm()}"/>
            </h:panelGroup>
        </div>
    </h:panelGroup>

    <!-- Grille des cartes collections -->
    <div class="modern-cards-container modern-cards-collections">
        <h:form id="collectionsForm">
            <h:panelGroup id="collectionsFormContent">
            <div class="modern-cards-grid">
                <ui:repeat value="#{applicationBean.sortedCollections}" var="collection">
                    <div class="modern-card-wrapper">
                        <p:commandLink action="#{collectionBean.showCollectionDetail(applicationBean, collection)}"
                                       styleClass="modern-card"
                                       process="@this" ajax="true"
                                       update=":centerContent :selectedEntityLabel :searchForm :collectionSelect"
                                       pt:data-entity-code="#{collection.code}"
                                       onclick="window.__pendingUrlCode = this.getAttribute('data-entity-code') || '';"
                                       onstart="showLoading('#{msg['index.collections.loadLoading']}', 'spinner');"
                                       oncomplete="setTimeout(function(){hideLoading(); ensureRootTogglerVisible(); if(typeof updateBrowserUrlAfterNavigation==='function') updateBrowserUrlAfterNavigation(window.__pendingUrlCode||''); window.__pendingUrlCode=undefined;}, 500);"
                                       onerror="forceHideLoading();">
                            <div class="modern-card-content">
                                <div class="modern-card-header">
                                    <div class="modern-card-icon">
                                        <i class="pi pi-folder" />
                                    </div>
                                    <h3 class="modern-card-title">#{applicationBean.getEntityLabel(collection)}</h3>
                                    <h:panelGroup rendered="#{loginBean.isAuthenticated()}">
                                        <div class="collection-card-status-badge #{collection.statut == 'PUBLIQUE' ? 'collection-status-public' : 'collection-status-private'}"
                                             title="#{collection.statut == 'PUBLIQUE' ? msg['index.collections.badge.public'] : msg['index.collections.badge.private']}">
                                            <i class="pi #{collection.statut == 'PUBLIQUE' ? 'pi-globe' : 'pi-lock'}" />
                                        </div>
                                    </h:panelGroup>
                                </div>
                                <div class="collection-info-value collection-info-description">
                                    <p class="reference-category-card-description">
                                        <h:outputText value="#{applicationBean.getEntityDescription(collection)}" escape="false"/>
                                    </p>
                                </div>
                            </div>
                        </p:commandLink>
                    </div>
                </ui:repeat>

                <!-- Message si aucune collection -->
                <h:panelGroup class="empty-categories-message" rendered="#{empty applicationBean.collections}">
                    <div class="empty-categories-icon">
                        <i class="pi pi-inbox" />
                    </div>
                    <div class="empty-categories-content">
                        <h4 class="empty-categories-title">#{msg['index.collections.empty.title']}</h4>
                        <h:panelGroup class="empty-categories-hint" rendered="#{loginBean.canCreateOrEdit()}">
                            <i class="pi pi-info-circle" />
                            <span>#{msg['index.collections.empty.hint.line1']}<br/>
                                #{msg['index.collections.empty.hint.line2']}</span>
                        </h:panelGroup>
                    </div>
                </h:panelGroup>
            </div>
            </h:panelGroup>
        </h:form>
    </div>

    <!-- Dialog de création de collection -->
    <ui:include src="../../dialogs/collectionDialog.xhtml"/>
</ui:composition>
