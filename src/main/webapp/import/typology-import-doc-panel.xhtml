<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <p:panel header="#{msg['import.doc.panel.header']} #{typologyImportBean.importCollectionTypologyLabel}"
             toggleable="true"
             collapsed="true"
             styleClass="typology-import-doc-panel">
        <div class="typology-import-doc-intro">
            <p class="typology-import-doc-intro-lead">
                #{msg['import.doc.intro']}
            </p>
            <ul class="typology-import-doc-rules">
                <li>#{msg['import.doc.rule.1']}</li>
                <li>#{msg['import.doc.rule.2']}</li>
                <li>#{msg['import.doc.rule.3']}</li>
                <li>#{msg['import.doc.rule.4']}</li>
            </ul>
        </div>
        <div class="typology-import-doc-scroll" tabindex="0">
            <table class="typology-import-doc-table">
                <thead>
                <tr>
                    <th scope="col">#{msg['import.doc.table.column']}</th>
                    <th scope="col">#{msg['import.doc.table.description']}</th>
                </tr>
                </thead>
                <tbody>
                <ui:repeat value="#{typologyImportBean.importFieldDocumentationRows}" var="fd">
                    <tr>
                        <td><code class="typology-import-doc-code">#{fd.columnName}</code></td>
                        <td>#{fd.description}</td>
                    </tr>
                </ui:repeat>
                </tbody>
            </table>
        </div>
    </p:panel>
</ui:composition>
