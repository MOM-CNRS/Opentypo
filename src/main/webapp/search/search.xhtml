<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui">
    <!-- Page recherche : barre principale + options avancées + script search.js -->

    <h:form id="searchForm">
        <!-- 1. Barre de recherche compacte (collection, langue, champ recherche, boutons) -->
        <div class="search-bar-compact">
            <!-- Bouton arbre / navigation (mobile) - design intégré et lisible -->
            <div class="tree-toggle-wrapper" id="treeToggleButton">
                <p:commandButton icon="pi pi-sitemap"
                                 styleClass="search-tree-toggle-btn"
                                 aria-label="#{msg['search.treeToggle.ariaLabel']}"
                                 title="#{msg['search.treeToggle.title']}"
                                 process="@this" update="@none"
                                 onclick="toggleTreePanel(); return false;">
                    <span class="search-tree-toggle-label">#{msg['search.treeToggle.label']}</span>
                </p:commandButton>
            </div>

            <!-- Burger pour options (mobile) -->
            <div class="burger-search-control">
                <p:commandButton icon="pi pi-sliders-h"
                                 styleClass="search-burger-button p-button-rounded p-button-text"
                                 title="#{msg['search.burger.title']}"
                                 process="@this" update="@none"
                                 onclick="SearchPage.toggleAdvancedSearch(); return false;"/>
            </div>

            <!-- Collection - Compact sans label -->
            <p:selectOneMenu id="collectionSelect" 
                             value="#{searchBean.collectionSelected}"
                             styleClass="search-compact-select"
                             placeholder="#{msg['search.collection.placeholder']}"
                             filter="true"
                             filterMatchMode="contains">
                <f:selectItems value="#{searchBean.hierarchicalCollectionItems}"/>
                <p:ajax event="change" listener="#{searchBean.onCollectionChange(entityUpdateBean)}"
                        update=":centerContent, :selectedEntityLabel, :collectionsForm" process="@this"
                        onstart="showLoading('#{msg['common.loading']}', 'spinner');"
                        oncomplete="setTimeout(function(){hideLoading(); ensureRootTogglerVisible();}, 500);"
                        onerror="forceHideLoading();"/>
            </p:selectOneMenu>

            <!-- Langue - Compact avec icône drapeau (comme le select Collection avec 📁 📖) -->
            <p:selectOneMenu id="langueSelect"
                             value="#{searchBean.langSelected}"
                             styleClass="search-compact-select"
                             title="#{langueBean.getMsg('search.change_thesaurus_language')}">
                <f:selectItems value="#{applicationBean.languages}" var="lang"
                               itemValue="#{lang.code}" itemLabel="#{lang.flagEmoji} #{lang.value}"/>
                <p:ajax event="change"
                        listener="#{applicationBean.onLanguageChange()}"
                        update=":centerContent collectionSelect"
                        process="@this"/>
            </p:selectOneMenu>

            <!-- Zone de recherche principale - Optimisée mobile (inputmode, zone tactile) -->
            <div class="search-input-group search-input-group-mobile">
                <i class="pi pi-search search-input-group-icon" aria-hidden="true"/>
                <p:inputText id="searchInput" 
                             value="#{searchBean.searchTerm}"
                             placeholder="#{msg['search.input.placeholder']}" 
                             styleClass="search-input-compact"
                             autocomplete="off"
                             maxlength="255">
                    <f:passThroughAttribute name="inputmode" value="search"/>
                    <f:passThroughAttribute name="enterkeyhint" value="search"/>
                </p:inputText>
                <p:message for="searchInput" display="icon" styleClass="search-input-msg"/>
                <p:commandButton id="searchButton"
                                 icon="pi pi-search"
                                 styleClass="search-button-compact"
                                 aria-label="#{msg['search.submit.ariaLabel']}"
                                 actionListener="#{searchBean.applySearch()}"
                                 process="@form" 
                                 update=":centerContent, :searchForm"
                                 oncomplete="if(typeof SearchPage !== 'undefined' &amp;&amp; SearchPage.onSearchComplete) SearchPage.onSearchComplete();"
                                 title="#{msg['search.submit.title']}"/>
            </div>

            <!-- Bouton recherche avancée - Compact (masqué sur mobile, remplacé par burger) -->
            <p:commandButton icon="pi pi-sliders-h"
                             styleClass="search-advanced-compact search-advanced-toggle"
                             process="@this" 
                             update="@none"
                             onclick="SearchPage.toggleAdvancedSearch(); return false;"/>

            <!-- Bouton afficher/cacher les résultats - Compact -->
            <p:commandButton id="toggleResultsPanelBtn"
                             icon="pi pi-chevron-right"
                             styleClass="search-advanced-compact search-toggle-results"
                             process="@this" 
                             update="@none"
                             title="#{msg['search.toggleResults.title']}"
                             onclick="SearchPage.toggleRightPanel(); return false;"/>
        </div>

        <!-- 2. Options avancées (filtres type, statut, état, type de recherche) -->
        <div id="advanced-search-options" class="advanced-search-section-compact">
            <div class="advanced-filters-compact">
                <!-- Filtre Type -->
                <div class="filter-group-compact">
                    <p:outputLabel for="typeFilter" value="#{msg['search.filter.type']}" styleClass="filter-label-compact"/>
                    <p:selectOneMenu id="typeFilter" 
                                     value="#{searchBean.typeFilter}" 
                                     styleClass="filter-select-compact">
                        <f:selectItems value="#{searchBean.entityTypeFilterItems}"/>
                    </p:selectOneMenu>
                </div>

                <!-- Filtre Statut -->
                <div class="filter-group-compact">
                    <p:outputLabel for="statutFilter" value="#{msg['search.filter.status']}" styleClass="filter-label-compact"/>
                    <p:selectOneMenu id="statutFilter" 
                                     value="#{searchBean.statutFilter}" 
                                     styleClass="filter-select-compact">
                        <f:selectItems value="#{searchBean.statutFilterItems}"/>
                    </p:selectOneMenu>
                </div>

                <!-- Filtre État -->
                <div class="filter-group-compact">
                    <p:outputLabel for="etatFilter" value="#{msg['search.filter.state']}" styleClass="filter-label-compact"/>
                    <p:selectOneMenu id="etatFilter" 
                                     value="#{searchBean.etatFilter}" 
                                     styleClass="filter-select-compact">
                        <f:selectItems value="#{searchBean.etatFilterItems}"/>
                    </p:selectOneMenu>
                </div>

                <!-- Filtre Type de recherche -->
                <div class="filter-group-compact">
                    <p:outputLabel for="searchTypeFilter" value="#{msg['search.filter.searchType']}" styleClass="filter-label-compact"/>
                    <p:selectOneMenu id="searchTypeFilter" 
                                     value="#{searchBean.searchTypeFilter}" 
                                     styleClass="filter-select-compact">
                        <f:selectItems value="#{searchBean.searchTypeFilterItems}"/>
                    </p:selectOneMenu>
                </div>
            </div>
        </div>
    </h:form>

    <h:outputScript library="js" name="search.js"/>


    <style>
        .search-input-group {
            border: 1px solid rgba(71, 98, 77, 0.18) !important;
        }
    </style>

</ui:composition>
