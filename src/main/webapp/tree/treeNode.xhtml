<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

    <li class="simple-tree-node #{node.expanded ? 'expanded' : ''}"
        data-entity-id="#{treeBean.getEntityIdFromNode(node)}"
        data-entity-type="#{treeBean.getEntityFromNode(node) != null and treeBean.getEntityFromNode(node).entityType != null ? treeBean.getEntityFromNode(node).entityType.code : ''}"
        data-has-children="#{node.childCount > 0}"
        data-can-have-children="#{treeBean.canHaveChildren(node)}"
        draggable="#{treeBean.isLeafEntityType(node) and typeBean.canMoveType(treeBean.getEntityFromNode(node))}"
        data-draggable-type="#{treeBean.isLeafEntityType(node) and typeBean.canMoveType(treeBean.getEntityFromNode(node)) ? 'true' : 'false'}">

        <div class="simple-tree-node-content ui-treenode-content #{treeBean.isNodeSelected(node) ? 'ui-state-highlight' : ''}"
             role="button"
             tabindex="0"
             data-entity-id="#{treeBean.getEntityIdFromNode(node)}"
             data-entity-type="#{treeBean.getEntityFromNode(node) != null and treeBean.getEntityFromNode(node).entityType != null ? treeBean.getEntityFromNode(node).entityType.code : ''}"
             data-code="#{treeBean.getEntityCodeFromNode(node)}"
             data-drop-target="#{treeBean.isGroupOrSerieNode(node) ? 'true' : 'false'}"
             data-drop-forbidden="#{treeBean.isGroupOrSerieNode(node) ? 'false' : 'true'}">

            <!-- Toggler : chevron cliquable si enfants possibles ; icône fixe si aucun enfant ; placeholder pour feuilles (alignement) -->
            <h:panelGroup rendered="#{node.childCount > 0 or treeBean.canHaveChildren(node) or treeBean.isLeafEntityType(node)}">
                <ui:fragment rendered="#{(node.childCount > 0 or not treeBean.isKnownToHaveNoChildren(node)) and not treeBean.isLeafEntityType(node)}">
                    <span class="simple-tree-toggler ui-tree-toggler"
                          data-tree-toggler="true"
                          aria-label="#{node.expanded ? 'Réduire' : 'Développer'}"
                          title="#{node.expanded ? 'Réduire' : 'Développer'}">
                        <i class="pi pi-chevron-right simple-tree-toggler-icon" aria-hidden="true"/>
                    </span>
                </ui:fragment>
                <ui:fragment rendered="#{treeBean.isKnownToHaveNoChildren(node) or treeBean.isLeafEntityType(node)}">
                    <span class="simple-tree-leaf-placeholder" aria-hidden="true" title="Aucun sous-élément">
                        <i class="pi pi-circle simple-tree-leaf-placeholder-icon"/>
                    </span>
                </ui:fragment>
            </h:panelGroup>

            <i class="#{treeBean.getEntityIcon(node)} simple-tree-node-icon"/>
            <span class="simple-tree-node-label" title="#{treeBean.getNodeLabel(node)}">
                #{treeBean.getNodeLabel(node)}
            </span>

            <!-- Icône unique selon le statut (visible pour Rédacteur, Valideur, Admin, Gestionnaire référentiels) -->
            <h:panelGroup class="simple-tree-node-indicators" rendered="#{treeBean.getEntityFromNode(node) != null and loginBean.canCreateOrEdit()}">
                <span class="tree-node-indicator #{treeBean.getUnifiedIndicatorCssClass(node)}"
                      title="#{treeBean.getUnifiedIndicatorTitle(node)}">
                    <i class="pi #{treeBean.getUnifiedIndicatorIcon(node)}"/>
                </span>
            </h:panelGroup>
        </div>

        <!-- Enfants (récursion) : ui:fragment pour que rendered soit pris en compte (sur un <ul> HTML il ne l'est pas) -->
        <ui:fragment rendered="#{node.children != null and node.childCount > 0}">
            <ul class="simple-tree-children ui-treenode-children">
                <c:forEach items="#{node.children}" var="childNode">
                    <ui:include src="treeNode.xhtml">
                        <ui:param name="node" value="#{childNode}"/>
                        <ui:param name="treeBean" value="#{treeBean}"/>
                        <ui:param name="typeBean" value="#{typeBean}"/>
                    </ui:include>
                </c:forEach>
            </ul>
        </ui:fragment>
    </li>

    <style>
        .fa, .fa-brands, .fa-regular, .fa-solid, .fab, .far, .fas {
            min-width: 10px !important;
        }
    </style>
</ui:composition>
