<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Dialog de confirmation de déplacement de type (depuis le dialog ou le drag-and-drop) -->
    <p:dialog id="confirmMoveTypeDialog"
              widgetVar="confirmMoveTypeDialog"
              header="Confirmer le déplacement"
              modal="true"
              closable="true"
              resizable="false"
              draggable="false"
              width="440"
              height="auto"
              appendTo="@(body)"
              styleClass="reference-confirm-dialog move-type-confirm-dialog">

        <f:facet name="header">
            <div class="reference-confirm-header">
                <div class="reference-confirm-header-icon-wrapper">
                    <i class="pi pi-arrow-right-arrow-left reference-confirm-header-icon"/>
                </div>
                <div class="reference-confirm-header-content">
                    <h3 class="reference-confirm-header-title">Confirmer le déplacement</h3>
                    <p class="reference-confirm-header-subtitle">Voulez-vous déplacer ce type ?</p>
                </div>
            </div>
        </f:facet>

        <h:panelGroup id="confirmMoveTypeDialogContent">
            <div class="reference-confirm-message-wrapper">
                <div class="reference-confirm-icon-info">
                    <i class="pi pi-info-circle"/>
                </div>
                <p class="reference-confirm-message-text">
                    #{typeBean.confirmMoveMessage}
                </p>
            </div>

            <h:form id="confirmMoveTypeForm" styleClass="reference-confirm-form">
                <div class="reference-confirm-actions">
                    <p:commandButton value="Annuler"
                                     icon="pi pi-times"
                                     styleClass="reference-confirm-btn reference-confirm-btn-cancel"
                                     process="@this"
                                     update="@none"
                                     onclick="PF('confirmMoveTypeDialog').hide(); return false;"/>

                    <p:commandButton value="Oui, déplacer"
                                     icon="pi pi-folder-open"
                                     action="#{typeBean.performConfirmMove}"
                                     process="@this"
                                     ajax="true"
                                     update=":growl :mainContentArea :leftTreePanel :contentPanels :selectedEntityLabel"
                                     styleClass="reference-confirm-btn reference-confirm-btn-validate"
                                     onstart="if(typeof showLoading==='function') showLoading('Déplacement...', 'spinner');"
                                     oncomplete="PF('confirmMoveTypeDialog').hide(); PF('moveTypeDialog').hide(); if(typeof hideLoading==='function') hideLoading(); if(typeof initTreeDragAndDrop==='function') initTreeDragAndDrop(); if(typeof applyTreeSelectionHighlight==='function') applyTreeSelectionHighlight();"
                                     onerror="if(typeof forceHideLoading==='function') forceHideLoading();"/>
                </div>
            </h:form>
        </h:panelGroup>
    </p:dialog>
</ui:composition>
