<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:outputStylesheet library="css" name="dialogs/move-type-dialog.css"/>
    <p:dialog id="moveTypeDialog"
              widgetVar="moveTypeDialog"
              header=""
              modal="true"
              closable="true"
              resizable="false"
              draggable="false"
              width="420"
              height="auto"
              appendTo="@(body)"
              styleClass="move-type-dialog"
              responsive="true">

        <f:facet name="header">
            <div class="move-type-dialog-header">
                <div class="move-type-dialog-header-icon-wrapper">
                    <i class="pi pi-folder-open move-type-dialog-header-icon"/>
                </div>
                <h3 class="move-type-dialog-header-title">Déplacer le type</h3>
            </div>
        </f:facet>

        <h:form id="moveTypeDialogForm">
            <div class="move-type-dialog-body">
                <div class="move-type-current-section">
                    <div class="move-type-section-label">
                        <i class="pi pi-folder move-type-section-icon"/>
                        <span>Parent actuel</span>
                    </div>
                    <div class="move-type-current-value">#{typeBean.moveTypeCurrentParentLabel}</div>
                </div>

                <div class="move-type-arrow-indicator" aria-hidden="true">
                    <i class="pi pi-arrow-down"/>
                </div>

                <div class="move-type-new-section">
                    <div class="move-type-section-label">
                        <i class="pi pi-arrow-right-arrow-left move-type-section-icon"/>
                        <span>Nouveau parent</span>
                    </div>
                    <p:selectOneMenu id="newParentSelect"
                                     value="#{typeBean.moveTypeSelectedParentId}"
                                     styleClass="move-type-select"
                                     filter="true"
                                     filterMatchMode="contains"
                                     placeholder="Rechercher un groupe ou une série..."
                                     required="true"
                                     requiredMessage="Veuillez sélectionner un nouveau parent.">
                        <f:selectItem itemValue="#{null}" itemLabel="— Choisir —" noSelectionOption="true"/>
                        <f:selectItems value="#{typeBean.moveTypeParentOptions}"/>
                    </p:selectOneMenu>
                    <p:message for="newParentSelect"/>
                </div>
            </div>

            <div class="move-type-dialog-actions">
                <p:commandButton value="Annuler"
                               icon="pi pi-times"
                               styleClass="move-type-dialog-btn move-type-dialog-btn-cancel"
                               onclick="PF('moveTypeDialog').hide(); return false;"
                               process="@this"
                               update="@none"/>
                <p:commandButton value="Déplacer"
                               icon="pi pi-folder-open"
                               styleClass="move-type-dialog-btn move-type-dialog-btn-validate"
                               action="#{typeBean.changeTypeParentFromDialog}"
                               process="@form"
                               update=":growl :moveTypeDialogForm :mainContentArea :leftTreePanel :contentPanels :selectedEntityLabel"
                               onstart="if(typeof showLoading==='function') showLoading('Déplacement...', 'spinner');"
                               onerror="if(typeof forceHideLoading==='function') forceHideLoading();"/>
            </div>
        </h:form>
    </p:dialog>
</ui:fragment>
