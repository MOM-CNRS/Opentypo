<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Dialog générique de confirmation de sauvegarde (référentiel, catégorie, groupe, série, type) -->
    <p:dialog id="confirmSaveDialog"
              widgetVar="confirmSaveDialog"
              header="#{msg['confirmSave.dialog.header']}"
              modal="true"
              closable="true"
              resizable="false"
              draggable="false"
              width="440"
              height="auto"
              appendTo="@(body)"
              styleClass="reference-confirm-dialog">

        <f:facet name="header">
            <div class="reference-confirm-header">
                <div class="reference-confirm-header-icon-wrapper">
                    <i class="pi pi-save reference-confirm-header-icon"/>
                </div>
                <div class="reference-confirm-header-content">
                    <h3 class="reference-confirm-header-title">#{msg['confirmSave.dialog.header']}</h3>
                    <p class="reference-confirm-header-subtitle">#{msg['confirmSave.dialog.subtitle']}</p>
                </div>
            </div>
        </f:facet>

        <h:panelGroup id="confirmSaveDialogContent">
            <div class="reference-confirm-message-wrapper">
                <div class="reference-confirm-icon-info">
                    <i class="pi pi-info-circle"/>
                </div>
                <div class="reference-confirm-message-text">
                    <h:outputText value="#{confirmSaveBean.messageText}" escape="false"/>
                </div>
            </div>

            <h:form id="confirmSaveForm" styleClass="reference-confirm-form">
                <div class="reference-confirm-actions">
                    <p:commandButton value="#{msg['confirmSave.dialog.cancel']}"
                                     icon="pi pi-times"
                                     styleClass="reference-confirm-btn reference-confirm-btn-cancel"
                                     action="#{entityUpdateBean.revertPendingFileUploads()}"
                                     process="@this"
                                     update=":mainContentArea :growl"
                                     oncomplete="PF('confirmSaveDialog').hide();"/>

                    <p:commandButton value="#{msg['confirmSave.dialog.confirm']}"
                                     icon="pi pi-check"
                                     action="#{confirmSaveBean.performSave()}"
                                     process="#{confirmSaveBean.modifierFormProcessIds}"
                                     ajax="true"
                                     update="#{confirmSaveBean.updateIds}"
                                     styleClass="reference-confirm-btn reference-confirm-btn-validate"
                                     oncomplete="if(!args.validationFailed){ PF('confirmSaveDialog').hide(); if(typeof window.scrollToTopAll==='function') window.scrollToTopAll(); } if(typeof forceHideLoading==='function') forceHideLoading();"
                                     onerror="if(typeof forceHideLoading==='function') forceHideLoading();"/>
                </div>
            </h:form>
        </h:panelGroup>
    </p:dialog>
</ui:composition>
