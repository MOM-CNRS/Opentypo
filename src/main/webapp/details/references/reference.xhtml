<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions">

    <div class="reference-detail-page">
    <!-- 1. Image du référentiel -->
    <h:panelGroup class="image-container">
        <!-- Afficher l'image si disponible (clic = plein écran) -->
        <h:panelGroup rendered="#{not empty applicationBean.selectedEntity.imagePrincipaleUrl}">
            <div class="clickable-image"
                 data-image-url="#{applicationBean.selectedEntity.imagePrincipaleUrl}"
                 data-image-legende="#{applicationBean.selectedEntity.image != null and applicationBean.selectedEntity.image.legende != null ? applicationBean.selectedEntity.image.legende : ''}"
                 onclick="var el=this;var u=el.getAttribute('data-image-url');var l=el.getAttribute('data-image-legende')||'';if(u&amp;&amp;typeof showFullscreenImage==='function'){showFullscreenImage(u,l);}return false;">
                <p:graphicImage value="#{applicationBean.selectedEntity.imagePrincipaleUrl}"
                               styleClass="research-image"
                               alt="Image du référentiel"/>
            </div>
        </h:panelGroup>

        <!-- Afficher le texte "OpenTypo" si pas d'image -->
        <h:panelGroup class="reference-image-placeholder"
             rendered="#{empty applicationBean.selectedEntity.imagePrincipaleUrl}">
            <span class="reference-placeholder-text">OpenTypo</span>
        </h:panelGroup>
    </h:panelGroup>

    <!-- 2. Panneau détail référentiel : en-tête, vue/modifier, liste catégories -->
    <h:panelGroup id="referenceDetailPanel" class="row collection-page-wrapper">
        <div class="col-md-12 collection-page-content">
                <div class="type-detail-page type-detail-page--v2 col-md-12">
                    <h:form id="referenceEditForm" styleClass="groupe-header-form-inline" enctype="multipart/form-data">
                        <div id="reference-identity" class="concept-info-panel type-identity-panel #{entityEditModeBean.editingEntityInCatalog ? 'collection-edit-mode' : ''}">
                            <!-- En-tête avec titre et actions -->
                            <div class="concept-info-header #{entityEditModeBean.editingEntityInCatalog ? 'collection-edit-header' : ''}">
                                <div class="concept-info-title-section">
                                    <span class="reference-entity-type-badge">Référentiel</span>
                                    <div class="concept-info-language-flag">
                                        <h:graphicImage library="img" name="flag/#{searchBean.langSelected != null and searchBean.langSelected != '' ? searchBean.langSelected : 'fr'}.png"
                                                        styleClass="language-flag"
                                                        alt="#{applicationBean.getLanguageLabel(searchBean.langSelected)}"
                                                        title="#{applicationBean.getLanguageLabel(searchBean.langSelected)}"/>
                                    </div>
                                    <h:panelGroup rendered="#{loginBean.authenticated and applicationBean.selectedEntity.statut != 'PUBLIQUE'}"
                                                  styleClass="collection-not-published-icon">
                                        <i class="pi pi-clock"/>
                                        <p:tooltip value="Catégorie non publiée" position="top"/>
                                    </h:panelGroup>
                                    <div class="collection-panel-title-wrapper">
                                        <h3 class="collection-panel-title">#{applicationBean.selectedEntity.code}</h3>
                                        <span class="collection-panel-subtitle">
                                            <h:outputText value="#{applicationBean.getEntityLabel(applicationBean.selectedEntity)}" escape="true"/>
                                        </span>
                                    </div>
                                </div>

                                <!-- Actions (masquées en mode édition) -->
                                <h:panelGroup class="concept-info-actions" rendered="#{!entityUpdateBean.editingEntity}">
                                    <!-- Paramétrage OpenTheso (associé au référentiel) -->
                                    <p:commandLink action="#{collectionParametrageBean.prepareAndShowParametrageDialog(applicationBean.selectedEntity)}"
                                                   process="@this"
                                                   update=":collectionParametrageForm"
                                                   styleClass="concept-action-button"
                                                   title="Paramétrage OpenTheso"
                                                   rendered="#{referenceBean.canEditReference(applicationBean)}"
                                                   oncomplete="PF('collectionParametrageDialog').show();">
                                        <i class="pi pi-cog"/>
                                        <p:tooltip value="Paramétrage" position="top"/>
                                    </p:commandLink>

                                    <!-- Paramétrage bibliographie Zotero (ouvert depuis l'écran référentiel, sans préremplissage) -->
                                    <p:commandLink action="#{collectionParametrageBean.prepareAndShowBibliographieParametrageDialog(applicationBean.selectedEntity)}"
                                                   process="@this"
                                                   update=":collectionBibliographieParametrageForm"
                                                   styleClass="concept-action-button"
                                                   title="Paramétrage bibliographie Zotero"
                                                   rendered="#{referenceBean.canEditReference(applicationBean)}"
                                                   oncomplete="PF('collectionBibliographieParametrageDialog').show();">
                                        <i class="pi pi-book"/>
                                        <p:tooltip value="Paramétrage bibliographie Zotero" position="top"/>
                                    </p:commandLink>

                                    <p:commandLink action="#{referenceBean.openTypologyImport}"
                                                   ajax="false"
                                                   styleClass="concept-action-button"
                                                   title="Import typologie — assistant CSV (catégories, groupes, séries, types)"
                                                   rendered="#{referenceBean.canImportTypology(applicationBean)}">
                                        <i class="pi pi-upload"/>
                                        <p:tooltip value="Import typologie (CSV)" position="top"/>
                                    </p:commandLink>

                                    <!-- Bouton Historique -->
                                    <p:commandLink action="#{historyBean.loadHistory(applicationBean.selectedEntity)}"
                                                   rendered="#{loginBean.currentUser != null}"
                                                   process="@this"
                                                   update="@none"
                                                   styleClass="concept-action-button"
                                                   title="Voir l'historique des modifications"
                                                   immediate="true">
                                        <i class="pi pi-history"/>
                                        <p:tooltip value="Voir l'historique" position="top"/>
                                    </p:commandLink>

                                    <p:commandLink action="#{entityUpdateBean.startEditing()}"
                                                   process="@this"
                                                   update=":centerContent :searchSectionWrapper"
                                                   styleClass="concept-action-button"
                                                   title="Modifier le référentiel"
                                                   rendered="#{referenceBean.canEditReference(applicationBean)}">
                                        <i class="pi pi-file-edit"/>
                                        <p:tooltip value="Modifier" position="top"/>
                                    </p:commandLink>

                                    <p:commandLink action="#{confirmDeleteBean.prepareDelete('REFERENTIEL')}"
                                                   process="@this"
                                                   update=":confirmDeleteDialogContent"
                                                   oncomplete="PF('confirmDeleteDialog').show();"
                                                   rendered="#{referenceBean.canEditReference(applicationBean)}"
                                                   styleClass="concept-action-button type-detail-action-delete"
                                                   title="Supprimer ce référentiel">
                                        <i class="pi pi-trash"/>
                                        <p:tooltip value="Supprimer" position="top"/>
                                    </p:commandLink>

                                    <h:panelGroup rendered="#{loginBean.currentUser != null}">
                                        <div class="collection-visibility-card">
                                            <div class="collection-visibility-card-content">
                                                <div class="collection-visibility-indicator #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'collection-visibility-public' : 'collection-visibility-private'}">
                                                    <div class="collection-visibility-icon">
                                                        <i class="pi #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'pi-globe' : 'pi-lock'}" />
                                                    </div>
                                                    <div class="collection-visibility-info">
                                                        <span class="collection-visibility-label">#{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'Public' : 'Privé'}</span>
                                                    </div>
                                                </div>
                                                <h:panelGroup rendered="#{referenceBean.canEditReference(applicationBean)}"
                                                              styleClass="collection-visibility-toggle-wrapper">
                                                    <p:commandLink styleClass="concept-action-button"
                                                                   process="@this"
                                                                   update=":confirmReferenceVisibilityChangeDialog :growl"
                                                                   title="Changer la visibilité (public / privé)"
                                                                   action="#{applicationBean.prepareConfirmVisibilityChange(applicationBean.selectedEntity.statut != 'PUBLIQUE')}">
                                                        <i class="pi pi-sync"/>
                                                        <p:tooltip value="Cliquez pour changer la visibilité" position="top"/>
                                                    </p:commandLink>
                                                </h:panelGroup>
                                            </div>
                                        </div>
                                    </h:panelGroup>
                                </h:panelGroup>
                            </div>

                            <ui:fragment rendered="#{entityUpdateBean.editingEntity}">
                                <ui:include src="../../commun/modifier/modifier.xhtml"/>
                            </ui:fragment>
                        </div>

                        <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">

                            <section class="details-row-mt-15 description-typo-root monnaie-communs-section monnaie-communs-new-line"
                                     aria-label="Présentation du référentiel">
                                <div class="concept-info-panel description-typo-panel" role="region" aria-labelledby="reference-presentation-heading">
                                    <header class="concept-info-header monnaie-communs-header description-typo-header">
                                        <div class="concept-info-title-section monnaie-communs-title-wrapper">
                                            <i class="pi pi-file-edit monnaie-communs-title-icon" aria-hidden="true"/>
                                            <h2 id="reference-presentation-heading" class="concept-info-title monnaie-communs-title">Présentation</h2>
                                        </div>
                                    </header>
                                    <div class="concept-info-grid concept-info-grid--two-columns-max description-typo-grid">
                                        <ui:fragment rendered="#{applicationBean.showFieldWithValue(applicationBean.getEntityDescription(applicationBean.selectedEntity))}">
                                            <div class="concept-info-grid-band description-typo-band">
                                                <div class="concept-info-grid concept-info-grid--one-column concept-info-grid--nested description-typo-band-grid">
                                                    <h:panelGroup styleClass="concept-info-item description-typo-prose" layout="block">
                                                        <div class="concept-info-label">
                                                            <i class="pi pi-file monnaie-communs-icon" aria-hidden="true"/>
                                                            <span>Description</span>
                                                        </div>
                                                        <div class="concept-info-value concept-info-description description-typo-prose-body">
                                                            <ui:fragment rendered="#{not empty applicationBean.getEntityDescription(applicationBean.selectedEntity)}">
                                                                <ui:fragment rendered="#{applicationBean.isEntityDescriptionLong(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}">
                                                                    <div class="concept-info-description-wrapper concept-info-description-char-based">
                                                                        <div class="concept-info-description-truncated" data-description-truncated="true">
                                                                            <h:outputText value="#{applicationBean.getEntityDescriptionTruncated(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}" escape="true"/>
                                                                        </div>
                                                                        <div class="concept-info-description-full" data-description-full="true">
                                                                            <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.selectedEntity)}" escape="false"/>
                                                                        </div>
                                                                        <button type="button" class="concept-info-description-toggle" data-description-toggle="true" aria-expanded="false">
                                                                            afficher la suite
                                                                        </button>
                                                                    </div>
                                                                </ui:fragment>
                                                                <ui:fragment rendered="#{!applicationBean.isEntityDescriptionLong(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}">
                                                                    <div class="concept-info-description-content concept-info-description-expanded">
                                                                        <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.selectedEntity)}" escape="false"/>
                                                                    </div>
                                                                </ui:fragment>
                                                            </ui:fragment>
                                                            <ui:fragment rendered="#{empty applicationBean.getEntityDescription(applicationBean.selectedEntity)}">
                                                                <span class="empty-field-message">Non renseigné</span>
                                                            </ui:fragment>
                                                        </div>
                                                    </h:panelGroup>
                                                </div>
                                            </div>
                                        </ui:fragment>
                                    </div>
                                </div>
                            </section>

                            <ui:fragment rendered="#{applicationBean.showDatationBlock()}">
                                <div id="reference-section-datation" class="type-section-shell type-section-anchor candidats-mt-20">
                                    <ui:include src="../type/datation.xhtml"/>
                                </div>
                            </ui:fragment>

                            <ui:fragment rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.getReferenceBibliographique())
                                    or applicationBean.showFieldWithValue(referenceBean.getReferenceGestionnairesDisplayNames(applicationBean.selectedEntity))}">
                                <section class="details-row-mt-15 description-typo-root monnaie-communs-section monnaie-communs-new-line"
                                         aria-label="Informations complémentaires du référentiel">
                                    <div class="concept-info-panel description-typo-panel" role="region" aria-labelledby="reference-meta-heading">
                                        <header class="concept-info-header monnaie-communs-header description-typo-header">
                                            <div class="concept-info-title-section monnaie-communs-title-wrapper">
                                                <i class="pi pi-info-circle monnaie-communs-title-icon" aria-hidden="true"/>
                                                <h2 id="reference-meta-heading" class="concept-info-title monnaie-communs-title">Informations complémentaires</h2>
                                            </div>
                                        </header>
                                        <div class="concept-info-grid concept-info-grid--two-columns-max description-typo-grid">
                                            <h:panelGroup styleClass="concept-info-item description-typo-field description-typo-field--solo"
                                                          rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.getReferenceBibliographique())}"
                                                          layout="block">
                                                <div class="concept-info-label">
                                                    <i class="pi pi-book monnaie-communs-icon" aria-hidden="true"/>
                                                    <span>Référence bibliographique</span>
                                                </div>
                                                <div class="concept-info-value bibliographie-container">
                                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.getReferenceBibliographique()}">
                                                        <ui:repeat value="#{fn:split(applicationBean.selectedEntity.getReferenceBibliographique(), ';')}" var="ref" varStatus="status">
                                                            <ui:fragment rendered="#{not empty ref and fn:trim(ref) != ''}">
                                                                <span class="bibliographie-badge">
                                                                    <span class="bibliographie-badge-text">#{fn:trim(ref)}</span>
                                                                </span>
                                                            </ui:fragment>
                                                        </ui:repeat>
                                                    </ui:fragment>
                                                    <h:outputText value="Aucune référence bibliographique disponible"
                                                                 rendered="#{empty applicationBean.selectedEntity.getReferenceBibliographique()}"
                                                                 styleClass="bibliographie-empty" />
                                                </div>
                                            </h:panelGroup>

                                            <h:panelGroup styleClass="concept-info-item description-typo-field description-typo-field--solo"
                                                          rendered="#{applicationBean.showFieldWithValue(referenceBean.getReferenceGestionnairesDisplayNames(applicationBean.selectedEntity))}"
                                                          layout="block">
                                                <div class="concept-info-label">
                                                    <i class="pi pi-users monnaie-communs-icon" aria-hidden="true"/>
                                                    <span>Gestionnaires du référentiel</span>
                                                </div>
                                                <div class="concept-info-value bibliographie-container">
                                                    <ui:fragment rendered="#{not empty referenceBean.getReferenceGestionnairesDisplayNames(applicationBean.selectedEntity)}">
                                                        <ui:repeat value="#{referenceBean.getReferenceGestionnairesDisplayNames(applicationBean.selectedEntity)}" var="gestionnaire">
                                                            <span class="bibliographie-badge">
                                                                <span class="bibliographie-badge-text">#{gestionnaire}</span>
                                                            </span>
                                                        </ui:repeat>
                                                    </ui:fragment>
                                                    <h:outputText value="Aucun gestionnaire assigné"
                                                                 rendered="#{empty referenceBean.getReferenceGestionnairesDisplayNames(applicationBean.selectedEntity)}"
                                                                 styleClass="bibliographie-empty" />
                                                </div>
                                            </h:panelGroup>
                                        </div>
                                    </div>
                                </section>
                            </ui:fragment>
                        </ui:fragment>
                    </h:form>
                </div>
        </div>
    </h:panelGroup>
    </div>

    <!-- 3. Liste des catégories (masquée en mode édition) -->
    <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">
        <ui:include src="../catalogues/liste_categories.xhtml"/>
    </ui:fragment>

    <h:outputStylesheet library="css" name="collection.css"/>
    <h:outputStylesheet library="css" name="candidats/opentheso-dialog.css"/>
    <h:outputScript library="js" name="treeUtils.js"/>
</ui:composition>
