<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <!-- 1. Panneau détail collection : en-tête, vue/modifier, liste référentiels -->
    <h:panelGroup id="collectionDetailPanel" class="row collection-page-wrapper">
        <div class="col-md-12 collection-page-content">
            <div class="collection-detail-page">
                <div class="type-detail-page type-detail-page--v2 col-md-12">
                    <h:form id="collectionEditForm" styleClass="groupe-header-form-inline" enctype="multipart/form-data">
                        <div id="collection-identity" class="concept-info-panel type-identity-panel #{entityUpdateBean.editingEntity ? 'collection-edit-mode' : ''}">
                            <div class="concept-info-header #{entityUpdateBean.editingEntity ? 'collection-edit-header' : ''}">
                                <div class="concept-info-title-section">
                                    <span class="reference-entity-type-badge">#{msg['collection.badge']}</span>
                                    <div class="concept-info-language-flag">
                                        <h:graphicImage library="img" name="flag/fr.png"
                                                        styleClass="language-flag"
                                                        alt="#{msg['lang.french']}"
                                                        title="#{msg['lang.french']}"/>
                                    </div>
                                    <div class="collection-panel-title-wrapper collection-detail-title-row">
                                        <h:outputText value="#{applicationBean.getEntityLabelHtml(applicationBean.selectedEntity)}"
                                                      escape="false"
                                                      styleClass="collection-panel-title entity-label-html"/>
                                        <h:panelGroup rendered="#{loginBean.authenticated and applicationBean.selectedEntity.statut != 'PUBLIQUE'}"
                                                      styleClass="collection-not-published-icon"
                                                      title="#{msg['collection.tooltip.notPublished']}">
                                            <i class="pi pi-clock"/>
                                        </h:panelGroup>
                                    </div>
                                </div>
                                <!-- Actions (masquées en mode édition) -->
                                <h:panelGroup class="concept-info-actions" rendered="#{!entityUpdateBean.editingEntity}">
                                    <p:menuButton icon="pi pi-ellipsis-v"
                                                  styleClass="concept-action-menu-trigger"
                                                  menuStyleClass="type-actions-menu-overlay"
                                                  title="#{msg['common.actions']}"
                                                  appendTo="@(body)"
                                                  rendered="#{loginBean.currentUser != null or collectionBean.canEditCollection(applicationBean) or collectionBean.canDeleteCollection(applicationBean)}">
                                        <p:menuitem value="#{msg['common.history.tooltip']}"
                                                    icon="pi pi-history"
                                                    action="#{historyBean.loadHistory(applicationBean.selectedEntity)}"
                                                    process="@this"
                                                    update="@none"
                                                    immediate="true"
                                                    rendered="#{loginBean.currentUser != null}"/>
                                        <p:menuitem value="#{msg['common.edit']}"
                                                    icon="pi pi-file-edit"
                                                    action="#{entityUpdateBean.startEditing()}"
                                                    process="@this"
                                                    update=":centerContent :searchSectionWrapper"
                                                    rendered="#{collectionBean.canEditCollection(applicationBean)}"/>
                                        <p:separator rendered="#{collectionBean.canDeleteCollection(applicationBean) and (loginBean.currentUser != null or collectionBean.canEditCollection(applicationBean))}"/>
                                        <p:menuitem value="#{msg['common.delete']}"
                                                    icon="pi pi-trash"
                                                    styleClass="type-action-menu-delete"
                                                    action="#{confirmDeleteBean.prepareDelete('COLLECTION')}"
                                                    process="@this"
                                                    update=":confirmDeleteDialogContent"
                                                    oncomplete="PF('confirmDeleteDialog').show();"
                                                    rendered="#{collectionBean.canDeleteCollection(applicationBean)}"/>
                                    </p:menuButton>

                                    <h:panelGroup rendered="#{loginBean.currentUser != null}">
                                        <div class="collection-visibility-card">
                                            <div class="collection-visibility-card-content">
                                                <div class="collection-visibility-indicator #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'collection-visibility-public' : 'collection-visibility-private'}">
                                                    <div class="collection-visibility-icon">
                                                        <i class="pi #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'pi-globe' : 'pi-lock'}" />
                                                    </div>
                                                    <div class="collection-visibility-info">
                                                        <span class="collection-visibility-label">#{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? msg['common.visibility.public'] : msg['common.visibility.private']}</span>
                                                    </div>
                                                </div>
                                                <h:panelGroup rendered="#{collectionBean.canEditCollection(applicationBean)}"
                                                              class="collection-visibility-toggle-wrapper">
                                                    <p:commandLink styleClass="collection-visibility-toggle-btn"
                                                                   process="@this"
                                                                   update=":confirmReferenceVisibilityChangeDialog :growl"
                                                                   title="#{msg['common.visibility.toggle.title']}"
                                                                   action="#{applicationBean.prepareConfirmVisibilityChange(applicationBean.selectedEntity.statut != 'PUBLIQUE')}">
                                                        <i class="pi pi-sync" />
                                                    </p:commandLink>
                                                </h:panelGroup>
                                            </div>
                                        </div>
                                    </h:panelGroup>
                                </h:panelGroup>
                            </div>

                            <ui:fragment rendered="#{entityUpdateBean.editingEntity}">
                                <ui:include src="../../commun/modifier/modifier.xhtml"/>
                            </ui:fragment>
                        </div>

                        <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">

                            <section class="details-row-mt-15 description-typo-root monnaie-communs-section monnaie-communs-new-line"
                                     aria-label="#{msg['collection.presentation.region']}">
                                <div class="concept-info-panel description-typo-panel" role="region" aria-labelledby="collection-presentation-heading">
                                    <header class="concept-info-header monnaie-communs-header description-typo-header">
                                        <div class="concept-info-title-section monnaie-communs-title-wrapper">
                                            <i class="pi pi-file-edit monnaie-communs-title-icon" aria-hidden="true"/>
                                            <h2 id="collection-presentation-heading" class="concept-info-title monnaie-communs-title">#{msg['common.presentation']}</h2>
                                        </div>
                                    </header>
                                    <div class="concept-info-grid concept-info-grid--two-columns-max description-typo-grid">
                                        <ui:fragment rendered="#{applicationBean.showFieldWithValue(applicationBean.getEntityDescription(applicationBean.getSelectedEntity()))}">
                                            <div class="concept-info-grid-band description-typo-band">
                                                <div class="concept-info-grid concept-info-grid--one-column concept-info-grid--nested description-typo-band-grid">
                                                    <h:panelGroup styleClass="concept-info-item concept-info-item-full description-typo-prose description-typo-prose--full-width" layout="block">
                                                        <div class="concept-info-label">
                                                            <i class="pi pi-file monnaie-communs-icon" aria-hidden="true"/>
                                                            <span>#{msg['common.description']}</span>
                                                        </div>
                                                        <div class="concept-info-value concept-info-description description-typo-prose-body">
                                                            <ui:fragment rendered="#{not empty applicationBean.getEntityDescription(applicationBean.getSelectedEntity())}">
                                                                <ui:fragment rendered="#{applicationBean.isEntityDescriptionLong(applicationBean.getSelectedEntity(), applicationBean.descriptionMaxChars)}">
                                                                    <div class="concept-info-description-wrapper concept-info-description-char-based">
                                                                        <div class="concept-info-description-truncated" data-description-truncated="true">
                                                                            <h:outputText value="#{applicationBean.getEntityDescriptionTruncated(applicationBean.getSelectedEntity(), applicationBean.descriptionMaxChars)}" escape="true"/>
                                                                        </div>
                                                                        <div class="concept-info-description-full" data-description-full="true">
                                                                            <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.getSelectedEntity())}" escape="false"/>
                                                                        </div>
                                                                        <button type="button" class="concept-info-description-toggle" data-description-toggle="true" aria-expanded="false">
                                                                            #{msg['common.description.showMore']}
                                                                        </button>
                                                                    </div>
                                                                </ui:fragment>
                                                                <ui:fragment rendered="#{!applicationBean.isEntityDescriptionLong(applicationBean.getSelectedEntity(), applicationBean.descriptionMaxChars)}">
                                                                    <div class="concept-info-description-content concept-info-description-expanded">
                                                                        <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.getSelectedEntity())}" escape="false"/>
                                                                    </div>
                                                                </ui:fragment>
                                                            </ui:fragment>
                                                            <ui:fragment rendered="#{empty applicationBean.getEntityDescription(applicationBean.getSelectedEntity())}">
                                                                <span class="empty-field-message">#{msg['common.empty.notProvided']}</span>
                                                            </ui:fragment>
                                                        </div>
                                                    </h:panelGroup>
                                                </div>
                                            </div>
                                        </ui:fragment>

                                        <ui:fragment rendered="#{applicationBean.showFieldWithValue(collectionBean.getCollectionGestionnairesDisplayNames(applicationBean.selectedEntity))}">
                                            <div class="concept-info-grid-band description-typo-band">
                                                <div class="concept-info-grid concept-info-grid--one-column concept-info-grid--nested description-typo-band-grid">
                                                    <h:panelGroup styleClass="concept-info-item description-typo-field description-typo-field--solo" layout="block">
                                                        <div class="concept-info-label">
                                                            <i class="pi pi-users monnaie-communs-icon" aria-hidden="true"/>
                                                            <span>#{msg['collection.managers.label']}</span>
                                                        </div>
                                                        <div class="concept-info-value bibliographie-container">
                                                            <ui:fragment rendered="#{not empty collectionBean.getCollectionGestionnairesDisplayNames(applicationBean.selectedEntity)}">
                                                                <ui:repeat value="#{collectionBean.getCollectionGestionnairesDisplayNames(applicationBean.selectedEntity)}" var="gestionnaire">
                                                                    <span class="bibliographie-badge">
                                                                        <span class="bibliographie-badge-text">#{gestionnaire}</span>
                                                                    </span>
                                                                </ui:repeat>
                                                            </ui:fragment>
                                                            <h:outputText value="#{msg['reference.meta.managers.empty']}"
                                                                         rendered="#{empty collectionBean.getCollectionGestionnairesDisplayNames(applicationBean.selectedEntity)}"
                                                                         styleClass="bibliographie-empty" />
                                                        </div>
                                                    </h:panelGroup>
                                                </div>
                                            </div>
                                        </ui:fragment>
                                    </div>
                                </div>
                            </section>
                        </ui:fragment>
                    </h:form>
                </div>
            </div>
        </div>
    </h:panelGroup>

    <!-- 2. Liste des référentiels (masquée en mode édition) -->
    <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">
        <ui:include src="liste_references.xhtml"/>
    </ui:fragment>

    <h:outputStylesheet library="css" name="collection.css"/>
    <h:outputStylesheet library="css" name="candidats/opentheso-dialog.css"/>

    <h:outputScript library="js" name="treeUtils.js"/>

    <ui:include src="../references/referenceDialog.xhtml"/>
</ui:composition>
