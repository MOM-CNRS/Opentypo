<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions">

    <h:panelGroup rendered="#{applicationBean.showProductionBlock()}" layout="block">
        <section class="details-row-mt-15 description-typo-root monnaie-communs-section monnaie-communs-new-line"
                 aria-label="Production et circulation du type">
            <div class="concept-info-panel description-typo-panel" role="region" aria-labelledby="entity-production-heading">
                <header class="concept-info-header monnaie-communs-header description-typo-header">
                    <div class="concept-info-title-section monnaie-communs-title-wrapper">
                        <i class="pi pi-inbox monnaie-communs-title-icon" aria-hidden="true"/>
                        <h2 id="entity-production-heading" class="concept-info-title monnaie-communs-title">Production et circulation</h2>
                    </div>
                </header>

                <div class="concept-info-grid concept-info-grid--two-columns-max description-typo-grid">
                    <div class="concept-info-grid-band description-typo-band">
                        <div class="concept-info-grid concept-info-grid--three-columns-max concept-info-grid--nested description-typo-band-grid">
                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.productions)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-truck monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Aire de production</span>
                                </div>
                                <div class="concept-info-value">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.productions}">
                                        <ui:repeat value="#{applicationBean.selectedEntity.productions}" var="prod">
                                            <ui:fragment rendered="#{prod != null and not empty prod.valeur}">
                                                <ui:fragment rendered="#{not empty prod.url}">
                                                    <h:outputLink value="#{prod.url}"
                                                                  target="_blank"
                                                                  rel="noopener noreferrer"
                                                                  styleClass="concept-value-external-link">
                                                        #{prod.valeur}
                                                        <i class="pi pi-external-link concept-value-external-link-icon" aria-hidden="true"/>
                                                    </h:outputLink>
                                                </ui:fragment>
                                                <ui:fragment rendered="#{empty prod.url}">
                                                    <span class="concept-value-no-link" title="Aucun lien OpenTheso">
                                                        <i class="pi pi-link-slash" aria-hidden="true"/>
                                                        #{prod.valeur}
                                                    </span>
                                                </ui:fragment>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <h:outputText value="Non renseigné"
                                                  rendered="#{empty applicationBean.selectedEntity.productions}"
                                                  styleClass="empty-field-message"/>
                                </div>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.metadata != null ? applicationBean.selectedEntity.metadata.ateliers : null)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-building monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Atelier(s)</span>
                                </div>
                                <div class="concept-info-value">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata and not empty applicationBean.selectedEntity.metadata.ateliers}">
                                        <ui:repeat value="#{fn:split(applicationBean.selectedEntity.metadata.ateliers, ';')}" var="ref" varStatus="status">
                                            <ui:fragment rendered="#{not empty ref and fn:trim(ref) != ''}">
                                                <span class="bibliographie-badge">
                                                    <span class="bibliographie-badge-text">#{fn:trim(ref)}</span>
                                                </span>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <h:outputText value="Non renseigné"
                                                  rendered="#{empty applicationBean.selectedEntity.metadata or empty applicationBean.selectedEntity.metadata.ateliers}"
                                                  styleClass="empty-field-message"/>
                                </div>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.airesCirculation)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-map monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Aire de circulation</span>
                                </div>
                                <div class="concept-info-value">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.airesCirculation}">
                                        <ui:repeat value="#{applicationBean.selectedEntity.airesCirculation}" var="ref">
                                            <ui:fragment rendered="#{ref != null and not empty ref.valeur}">
                                                <ui:fragment rendered="#{not empty ref.url}">
                                                    <h:outputLink value="#{ref.url}"
                                                                  target="_blank"
                                                                  rel="noopener noreferrer"
                                                                  styleClass="concept-value-external-link">
                                                        #{ref.valeur}
                                                        <i class="pi pi-external-link concept-value-external-link-icon" aria-hidden="true"/>
                                                    </h:outputLink>
                                                </ui:fragment>
                                                <ui:fragment rendered="#{empty ref.url}">
                                                    <span class="concept-value-no-link" title="Aucun lien OpenTheso">
                                                        <i class="pi pi-link-slash" aria-hidden="true"/>
                                                        #{ref.valeur}
                                                    </span>
                                                </ui:fragment>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <h:outputText value="Non renseigné"
                                                  rendered="#{empty applicationBean.selectedEntity.airesCirculation}"
                                                  styleClass="empty-field-message"/>
                                </div>
                            </h:panelGroup>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </h:panelGroup>
</ui:composition>
