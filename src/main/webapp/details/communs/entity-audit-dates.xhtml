<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:panelGroup layout="block" styleClass="entity-audit-dates"
                  rendered="#{applicationBean.selectedEntity ne null}">

        <h:panelGroup rendered="#{applicationBean.showTypePanel or applicationBean.showSeriePanel or applicationBean.isShowGroupePanel}"
                      layout="block" styleClass="entity-audit-dates__authors">

            <div class="entity-audit-dates__authors-header">
                <i class="pi pi-id-card" />
                <span>Attribution</span>
            </div>

            <h:panelGroup layout="block" styleClass="concept-info-item concept-info-item-full"
                          rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.auteursScientifiques)}">
                <div class="concept-info-label">
                    <i class="pi pi-users concept-info-icon" />
                    <span>Auteur(s) scientifique(s)</span>
                </div>
                <div class="concept-info-value bibliographie-container">
                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.auteursScientifiques}">
                        <ui:repeat value="#{applicationBean.selectedEntity.auteursScientifiques}" var="auteurScientifique">
                            <span class="bibliographie-badge">
                                <i class="pi pi-star bibliographie-badge-icon" />
                                <span class="bibliographie-badge-text">#{auteurScientifique.prenom} #{auteurScientifique.nom}</span>
                            </span>
                        </ui:repeat>
                    </ui:fragment>
                    <h:outputText value="Aucun auteur scientifique disponible" styleClass="bibliographie-empty"
                                  rendered="#{empty applicationBean.selectedEntity.auteursScientifiques}" />
                </div>
            </h:panelGroup>

            <h:panelGroup layout="block" styleClass="concept-info-item concept-info-item-full"
                          rendered="#{applicationBean.showFieldWithValue(applicationBean.uniqueAuteurs(applicationBean.selectedEntity.auteurs))}">
                <div class="concept-info-label">
                    <i class="pi pi-user concept-info-icon" />
                    <span>Auteur saisie</span>
                </div>
                <div class="concept-info-value bibliographie-container">
                    <ui:fragment rendered="#{not empty applicationBean.uniqueAuteurs(applicationBean.selectedEntity.auteurs)}">
                        <ui:repeat value="#{applicationBean.uniqueAuteurs(applicationBean.selectedEntity.auteurs)}" var="auteur" varStatus="status">
                            <span class="bibliographie-badge">
                                <i class="pi pi-user bibliographie-badge-icon" />
                                <span class="bibliographie-badge-text">#{auteur.prenom} #{auteur.nom}</span>
                            </span>
                        </ui:repeat>
                    </ui:fragment>
                    <h:outputText value="Aucun auteur disponible" styleClass="bibliographie-empty"
                                  rendered="#{empty applicationBean.uniqueAuteurs(applicationBean.selectedEntity.auteurs)}" />
                </div>
            </h:panelGroup>
        </h:panelGroup>

        <div class="entity-audit-dates__inner" role="region" aria-label="Dates de l'entité">
            <div class="entity-audit-dates__card">
                <span class="entity-audit-dates__icon" aria-hidden="true">
                    <i class="pi pi-calendar" />
                </span>
                <div class="entity-audit-dates__meta">
                    <span class="entity-audit-dates__label">Création</span>
                    <h:outputText styleClass="entity-audit-dates__value" value="#{applicationBean.formattedSelectedEntityCreateDate}"/>
                </div>
            </div>
            <div class="entity-audit-dates__card">
                <span class="entity-audit-dates__icon" aria-hidden="true">
                    <i class="pi pi-history" />
                </span>
                <div class="entity-audit-dates__meta">
                    <span class="entity-audit-dates__label">Dernière modification</span>
                    <h:outputText styleClass="entity-audit-dates__value" value="#{applicationBean.formattedSelectedEntityLastModificationDate}"/>
                </div>
            </div>
        </div>
    </h:panelGroup>
</ui:fragment>
