<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <h:panelGroup id="contentTypePanels" layout="block">
        <div class="type-detail-page col-md-12">
            <h:form id="typeEditForm" styleClass="groupe-header-form-inline" enctype="multipart/form-data">
                <div class="concept-info-panel #{entityEditModeBean.editingEntityInCatalog ? 'collection-edit-mode' : ''}">
                    <div class="concept-info-header">
                        <div class="concept-info-title-section">
                            <span class="reference-entity-type-badge">Type</span>
                            <h:panelGroup rendered="#{loginBean.authenticated and applicationBean.selectedEntity.statut != 'PUBLIQUE'}"
                                          styleClass="collection-not-published-icon">
                                <i class="pi pi-clock"/>
                                <p:tooltip value="Catégorie non publiée" position="top"/>
                            </h:panelGroup>
                            <div class="collection-panel-title-wrapper">
                                <div class="collection-panel-title-wrapper">
                                    <h3 class="collection-panel-title">#{applicationBean.selectedEntity.code}</h3>
                                    <span class="collection-panel-subtitle">#{applicationBean.getEntityLabel(applicationBean.selectedEntity)}</span>
                                </div>
                            </div>
                        </div>

                        <h:panelGroup class="concept-info-actions" rendered="#{!entityUpdateBean.editingEntity}">
                            <p:menuButton id="typeActionsMenu"
                                          value=""
                                          icon="pi pi-ellipsis-v"
                                          styleClass="concept-action-menu-trigger"
                                          menuStyleClass="type-actions-menu-overlay"
                                          title="Actions">
                                <p:menuitem value="Voir l'historique"
                                            icon="pi pi-history"
                                            action="#{historyBean.loadHistory(applicationBean.selectedEntity)}"
                                            process="@this"
                                            update="@none"
                                            immediate="true"/>
                                <p:menuitem value="Modifier"
                                            icon="pi pi-file-edit"
                                            action="#{entityUpdateBean.startEditing()}"
                                            process="@this"
                                            update=":contentPanels :leftTreePanel :searchSectionWrapper"
                                            rendered="#{typeBean.canEditType(applicationBean)}"/>
                                <p:menuitem value="Déplacer"
                                            icon="pi pi-arrow-right-arrow-left"
                                            action="#{typeBean.prepareMoveTypeDialog()}"
                                            process="@this"
                                            update=":moveTypeDialog"
                                            oncomplete="PF('moveTypeDialog').show();"
                                            rendered="#{typeBean.canEditType(applicationBean)}"/>
                                <p:menuitem value="Dupliquer"
                                            icon="pi pi-copy"
                                            action="#{typeBean.prepareDuplicateTypeDialog()}"
                                            process="@this"
                                            update=":duplicateTypeDialog :duplicateTypeDialogForm"
                                            oncomplete="PF('duplicateTypeDialog').show();"
                                            rendered="#{typeBean.canEditType(applicationBean)}"/>
                                <p:separator rendered="#{typeBean.canEditType(applicationBean)}"/>
                                <p:menuitem value="Supprimer"
                                            icon="pi pi-trash"
                                            action="#{confirmDeleteBean.prepareDelete('TYPE')}"
                                            process="@this"
                                            update=":confirmDeleteDialogContent"
                                            oncomplete="PF('confirmDeleteDialog').show();"
                                            rendered="#{typeBean.canEditType(applicationBean)}"
                                            styleClass="type-action-menu-delete"/>
                            </p:menuButton>

                            <h:panelGroup rendered="#{loginBean.currentUser != null}">
                                <div class="collection-visibility-card">
                                    <div class="collection-visibility-card-content">
                                        <div class="collection-visibility-indicator #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'collection-visibility-public' : 'collection-visibility-private'}">
                                            <div class="collection-visibility-icon">
                                                <i class="pi #{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'pi-globe' : 'pi-lock'}" />
                                            </div>
                                            <div class="collection-visibility-info">
                                                <span class="collection-visibility-label">#{applicationBean.selectedEntity.statut == 'PUBLIQUE' ? 'Public' : 'Privé'}</span>
                                            </div>
                                        </div>
                                        <h:panelGroup rendered="#{typeBean.canEditType(applicationBean)}"
                                                      styleClass="collection-visibility-toggle-wrapper">
                                            <p:commandLink styleClass="collection-visibility-toggle-btn"
                                                           process="@this"
                                                           update=":confirmReferenceVisibilityChangeDialog :growl"
                                                           action="#{applicationBean.prepareConfirmVisibilityChange(applicationBean.selectedEntity.statut != 'PUBLIQUE')}">
                                                <i class="pi pi-sync" />
                                                <p:tooltip value="Cliquez pour changer la visibilité" position="top"/>
                                            </p:commandLink>
                                        </h:panelGroup>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </h:panelGroup>
                    </div>

                    <ui:include src="galerie_images.xhtml"/>

                    <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">
                        <div class="concept-info-grid">
                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.getEntityDescription(applicationBean.selectedEntity))}"
                                          styleClass="concept-info-item concept-info-item-full" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-file concept-info-icon" />
                                    <span>Description</span>
                                </div>
                                <div class="concept-info-value concept-info-description">
                                    <ui:fragment rendered="#{not empty applicationBean.getEntityDescription(applicationBean.selectedEntity)}">
                                        <ui:fragment rendered="#{applicationBean.isEntityDescriptionLong(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}">
                                            <div class="concept-info-description-wrapper concept-info-description-char-based">
                                                <div class="concept-info-description-truncated" data-description-truncated="true">
                                                    <h:outputText value="#{applicationBean.getEntityDescriptionTruncated(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}" escape="true"/>
                                                </div>
                                                <div class="concept-info-description-full" data-description-full="true">
                                                    <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.selectedEntity)}" escape="false"/>
                                                </div>
                                                <button type="button" class="concept-info-description-toggle" data-description-toggle="true" aria-expanded="false">
                                                    afficher la suite
                                                </button>
                                            </div>
                                        </ui:fragment>
                                        <ui:fragment rendered="#{!applicationBean.isEntityDescriptionLong(applicationBean.selectedEntity, applicationBean.descriptionMaxChars)}">
                                            <div class="concept-info-description-content concept-info-description-expanded">
                                                <h:outputText value="#{applicationBean.getEntityDescription(applicationBean.selectedEntity)}" escape="false"/>
                                            </div>
                                        </ui:fragment>
                                    </ui:fragment>
                                    <ui:fragment rendered="#{empty applicationBean.getEntityDescription(applicationBean.selectedEntity)}">
                                        <span class="empty-field-message">Non renseigné</span>
                                    </ui:fragment>
                                </div>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 5 and applicationBean.showFieldWithValue(applicationBean.selectedEntity.metadata != null ? applicationBean.selectedEntity.metadata.appellation : null)}"
                                          class="concept-info-item concept-info-item-full">
                                <div class="concept-info-label">
                                    <i class="pi pi-file concept-info-icon" />
                                    <span>Appellation usuelle</span>
                                </div>
                                <div class="concept-info-value concept-info-description">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata.appellation}">
                                        <h:outputText value="#{applicationBean.selectedEntity.metadata.appellation}" escape="false"/>
                                    </ui:fragment>
                                    <ui:fragment rendered="#{empty applicationBean.selectedEntity.metadata.appellation}">
                                        <span class="empty-field-message">Non renseigné</span>
                                    </ui:fragment>
                                </div>
                            </h:panelGroup>
                        </div>
                    </ui:fragment>

                    <ui:fragment rendered="#{entityUpdateBean.editingEntity}">
                        <ui:include src="../../commun/modifier/modifier.xhtml"/>
                    </ui:fragment>
                </div>

                <ui:fragment rendered="#{!entityUpdateBean.editingEntity}">
                    <ui:include src="datation.xhtml"/>

                    <ui:include src="alignements.xhtml"/>

                    <ui:include src="../communs/production.xhtml"/>

                    <h:panelGroup rendered="#{applicationBean.isCashTypo()}">
                        <ui:include src="../communs/description_monnaie.xhtml"/>
                        <ui:include src="../communs/caracteristiques_physique_monnaie.xhtml"/>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{applicationBean.isCeramiqueTypo() or applicationBean.isInstrumentumTypo()}">
                        <ui:include src="../communs/description.xhtml"/>

                        <h:panelGroup rendered="#{applicationBean.isCeramiqueTypo()}">
                            <ui:include src="../communs/caracteristiques_physique.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.isInstrumentumTypo()}">
                            <ui:include src="../communs/caracteristiques_physique_instrumentum.xhtml"/>
                        </h:panelGroup>
                    </h:panelGroup>

                    <ui:include src="attestations.xhtml"/>

                    <ui:include src="sites_archeologiques.xhtml"/>

                    <ui:include src="gestion.xhtml"/>

                    <ui:include src="../communs/commentaire.xhtml"/>

                    <ui:include src="../communs/bibliographie.xhtml"/>
                </ui:fragment>
            </h:form>
        </div>
    </h:panelGroup>
</ui:composition>
