<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <h:panelGroup layout="block" class="concept-info-value concept-info-description concept-info-item concept-info-item-full"
            rendered="#{!entityUpdateBean.editingEntity}">
        <div class="galleria-container">
            <div class="galleria-wrapper-with-images">
                <!-- Carte typologie gauche : type précédent (ordre alphabétique) -->
                <div class="galleria-side-card galleria-side-card-left">
                    <p:commandLink action="#{applicationBean.showType(applicationBean.previousType)}"
                                   styleClass="typologie-card typologie-card-prev"
                                   process="@this"
                                   update=":centerContent"
                                   pt:data-entity-code="#{applicationBean.previousType != null ? applicationBean.previousType.code : ''}"
                                   onclick="window.__pendingUrlCode = this.getAttribute('data-entity-code') || '';"
                                   onstart="showLoading('Chargement du type...', 'spinner');"
                                   oncomplete="setTimeout(function(){hideLoading(); if(typeof applyTreeSelectionHighlight==='function') applyTreeSelectionHighlight(); if(typeof updateBrowserUrlAfterNavigation==='function') updateBrowserUrlAfterNavigation(window.__pendingUrlCode||''); window.__pendingUrlCode=undefined;}, 500);"
                                   onerror="forceHideLoading();"
                                   title="Voir le type précédent (ordre alphabétique)"
                                   rendered="#{applicationBean.previousType != null}">
                        <span class="typologie-card-indicator typologie-card-indicator-prev">
                            <i class="pi pi-chevron-left" aria-hidden="true"/>
                            <span>Précédent</span>
                        </span>
                        <div class="typologie-card-image-wrapper">
                            <p:graphicImage value="#{applicationBean.previousType.image.url}"
                                            styleClass="typologie-card-image"
                                            alt="#{applicationBean.previousType.nom}"
                                            rendered="#{not empty applicationBean.previousType.image and not empty applicationBean.previousType.image.url}"/>
                            <h:panelGroup class="reference-image-placeholder"
                                          rendered="#{empty applicationBean.previousType.image or empty applicationBean.previousType.image.url}">
                                <span class="reference-placeholder-text">OpenTypo</span>
                            </h:panelGroup>
                            <div class="typologie-card-overlay"></div>
                        </div>
                        <div class="typologie-card-content">
                            <h3 class="typologie-card-title">#{applicationBean.previousType.code}</h3>
                        </div>
                    </p:commandLink>
                    <h:panelGroup layout="block" styleClass="galleria-side-placeholder" rendered="#{applicationBean.previousType == null}"/>
                </div>

                <!-- Galerie custom (HTML/CSS/JS) - bloc en plein écran -->
                <div class="galleria-main-wrapper">
                    <h:panelGroup layout="block" rendered="#{not empty applicationBean.galleriaPhotos}">
                        <div class="opentypo-gallery" id="opentypoGalleryMain">
                            <div class="opentypo-gallery-viewport">
                                <button type="button" class="opentypo-gallery-nav opentypo-gallery-prev"
                                        aria-label="Image précédente">
                                    <i class="pi pi-chevron-left"/>
                                </button>
                                <button type="button" class="opentypo-gallery-nav opentypo-gallery-next"
                                        aria-label="Image suivante">
                                    <i class="pi pi-chevron-right"/>
                                </button>
                                <ui:repeat value="#{applicationBean.galleriaPhotos}" var="photo" varStatus="status">
                                    <div class="opentypo-gallery-slide #{status.first ? 'opentypo-gallery-slide-active' : ''}"
                                         aria-hidden="#{status.first ? 'false' : 'true'}">
                                        <div class="opentypo-gallery-slide-content">
                                            <img src="#{photo.itemImageSrc}" alt="#{photo.alt}"
                                                 data-image-legende="#{photo.title}"
                                                 title="Cliquez pour afficher en plein écran"
                                                 onclick="if(typeof openFullscreenFromGallery==='function'){openFullscreenFromGallery(this);}return false;"/>
                                            <h:outputText value="#{photo.title}" styleClass="opentypo-gallery-slide-legend" rendered="#{not empty photo.title}"/>
                                        </div>
                                    </div>
                                </ui:repeat>
                            </div>
                            <div class="opentypo-gallery-thumbnails">
                                <ui:repeat value="#{applicationBean.galleriaPhotos}" var="photo" varStatus="status">
                                    <button type="button" class="opentypo-gallery-thumb #{status.first ? 'opentypo-gallery-thumb-active' : ''}"
                                            aria-label="Voir image #{status.index + 1}"
                                            aria-selected="#{status.first ? 'true' : 'false'}">
                                        <img src="#{photo.thumbnailImageSrc}" alt="#{photo.alt}"/>
                                    </button>
                                </ui:repeat>
                            </div>
                        </div>
                        <script>if(window.OpentypoGallery&amp;&amp;window.OpentypoGallery.init){window.OpentypoGallery.init();}</script>
                    </h:panelGroup>
                    <h:panelGroup layout="block" class="image-container galleria-placeholder"
                                  rendered="#{empty applicationBean.galleriaPhotos}">
                        <h:panelGroup class="reference-image-placeholder">
                            <span class="reference-placeholder-text">OpenTypo</span>
                        </h:panelGroup>
                    </h:panelGroup>
                    <h:panelGroup rendered="#{not empty applicationBean.galleriaPhotos}">
                        <button type="button" class="galleria-fullscreen-close" title="Fermer (Échap)"
                                onclick="var c=document.querySelector('.galleria-main-wrapper');if(c){c.classList.remove('galleria-fullscreen-mode');document.body.style.overflow='';}return false;">
                            <i class="pi pi-times"/>
                        </button>
                    </h:panelGroup>
                </div>

                <!-- Carte typologie droite : type suivant (ordre alphabétique) -->
                <div class="galleria-side-card galleria-side-card-right">
                    <p:commandLink action="#{applicationBean.showType(applicationBean.nextType)}"
                                   styleClass="typologie-card typologie-card-next"
                                   process="@this"
                                   update=":centerContent"
                                   pt:data-entity-code="#{applicationBean.nextType != null ? applicationBean.nextType.code : ''}"
                                   onclick="window.__pendingUrlCode = this.getAttribute('data-entity-code') || '';"
                                   onstart="showLoading('Chargement du type...', 'spinner');"
                                   oncomplete="setTimeout(function(){hideLoading(); if(typeof applyTreeSelectionHighlight==='function') applyTreeSelectionHighlight(); if(typeof updateBrowserUrlAfterNavigation==='function') updateBrowserUrlAfterNavigation(window.__pendingUrlCode||''); window.__pendingUrlCode=undefined;}, 500);"
                                   onerror="forceHideLoading();"
                                   title="Voir le type suivant (ordre alphabétique)"
                                   rendered="#{applicationBean.nextType != null}">
                        <span class="typologie-card-indicator typologie-card-indicator-next">
                            <span>Suivant</span>
                            <i class="pi pi-chevron-right" aria-hidden="true"/>
                        </span>
                        <div class="typologie-card-image-wrapper">
                            <p:graphicImage value="#{applicationBean.nextType.image.url}"
                                            styleClass="typologie-card-image"
                                            alt="#{applicationBean.nextType.nom}"
                                            rendered="#{not empty applicationBean.nextType.image and not empty applicationBean.nextType.image.url}"/>
                            <h:panelGroup class="reference-image-placeholder"
                                          rendered="#{empty applicationBean.nextType.image or empty applicationBean.nextType.image.url}">
                                <span class="reference-placeholder-text">OpenTypo</span>
                            </h:panelGroup>
                            <div class="typologie-card-overlay"></div>
                        </div>
                        <div class="typologie-card-content">
                            <h3 class="typologie-card-title">#{applicationBean.nextType.code}</h3>
                        </div>
                    </p:commandLink>
                    <h:panelGroup layout="block" styleClass="galleria-side-placeholder" rendered="#{applicationBean.nextType == null}"/>
                </div>
            </div>
        </div>
    </h:panelGroup>
</ui:composition>
