<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <h:panelGroup rendered="#{applicationBean.showAlignementsBlock()}" layout="block">
    <div class="row mt-20 details-row-mt-15 monnaie-communs-section">
        <div class="col-md-12">
            <div class="concept-info-panel">
                <div class="concept-info-header monnaie-communs-header">
                    <div class="concept-info-title-section monnaie-communs-title-wrapper">
                        <i class="pi pi-sitemap monnaie-communs-title-icon" />
                        <h2 class="concept-info-title monnaie-communs-title">Relations</h2>
                    </div>
                </div>

                <div class="concept-info-grid">
                    <div class="concept-info-item">
                        <div class="concept-info-label">
                            <i class="pi pi-users monnaie-communs-icon" />
                            <span>Alignement interne</span>
                        </div>
                        <div class="concept-info-value">
                            <ui:fragment rendered="#{not empty applicationBean.selectedTypeInternalAlignments}">
                                <ui:repeat value="#{applicationBean.selectedTypeInternalAlignments}" var="alignment">
                                    <span class="bibliographie-badge" style="margin-right:6px;margin-bottom:6px;">
                                        <i class="pi pi-sitemap bibliographie-badge-icon"/>
                                        <span class="bibliographie-badge-text">
                                            <h:outputLink value="#{request.contextPath}/#{alignment.targetTypeCode}"
                                                          styleClass="internal-alignment-target-link"
                                                          title="Ouvrir la fiche #{alignment.targetTypeCode}"
                                                          rendered="#{not empty alignment.targetTypeCode}">
                                                #{alignment.targetTypeLabel} (#{alignment.targetTypeCode})
                                            </h:outputLink>
                                            <ui:fragment rendered="#{empty alignment.targetTypeCode}">
                                                #{alignment.targetTypeLabel}
                                            </ui:fragment>
                                            <span class="internal-alignment-match-badge #{alignment.matchType == 'CloseMatch' ? 'internal-alignment-match-close' : 'internal-alignment-match-exact'}">
                                                #{alignment.matchType}
                                            </span>
                                        </span>
                                    </span>
                                </ui:repeat>
                            </ui:fragment>
                            <ui:fragment rendered="#{empty applicationBean.selectedTypeInternalAlignments}">
                                <span class="empty-field-message">Non renseigné</span>
                            </ui:fragment>
                        </div>
                    </div>

                    <div class="concept-info-item">
                        <div class="concept-info-label">
                            <i class="pi pi-globe monnaie-communs-icon" />
                            <span>Alignement externe</span>
                        </div>
                        <div class="concept-info-value">
                            <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata.alignementExterne}">
                                #{applicationBean.selectedEntity.metadata.alignementExterne}
                            </ui:fragment>
                            <ui:fragment rendered="#{empty applicationBean.selectedEntity.metadata.alignementExterne}">
                                <span class="empty-field-message">Non renseigné</span>
                            </ui:fragment>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </h:panelGroup>
</ui:composition>
