<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions">

    <h:panelGroup rendered="#{applicationBean.showAttestationsSectionBlock()}" layout="block">
        <section class="details-row-mt-15 description-typo-root monnaie-communs-section monnaie-communs-new-line"
                 aria-label="Attestations et contextes du type">
            <div class="concept-info-panel description-typo-panel" role="region" aria-labelledby="type-attestations-heading">
                <header class="concept-info-header monnaie-communs-header description-typo-header">
                    <div class="concept-info-title-section monnaie-communs-title-wrapper">
                        <i class="pi pi-check-circle monnaie-communs-title-icon" aria-hidden="true"/>
                        <h2 id="type-attestations-heading" class="concept-info-title monnaie-communs-title">Attestations et contextes</h2>
                    </div>
                </header>

                <div class="concept-info-grid concept-info-grid--two-columns-max description-typo-grid">
                    <div class="concept-info-grid-band description-typo-band">
                        <div class="concept-info-grid concept-info-grid--three-columns-max concept-info-grid--nested description-typo-band-grid">
                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.metadata != null ? applicationBean.selectedEntity.metadata.attestations : null)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-check-circle monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Attestation(s)/Contexte(s)</span>
                                </div>
                                <div class="concept-info-value bibliographie-container">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata.attestations}">
                                        <ui:repeat value="#{fn:split(applicationBean.selectedEntity.metadata.attestations, ';')}" var="ref" varStatus="status">
                                            <ui:fragment rendered="#{not empty ref and fn:trim(ref) != ''}">
                                                <span class="bibliographie-badge">
                                                    <span class="bibliographie-badge-text">#{fn:trim(ref)}</span>
                                                </span>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <h:outputText value="#{msg['attestations.empty.none']}"
                                                  rendered="#{empty applicationBean.selectedEntity.metadata.attestations}"
                                                  styleClass="bibliographie-empty"/>
                                </div>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.metadata != null ? applicationBean.selectedEntity.metadata.sitesArcheologiques : null)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-map-marker monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Sites archéologiques</span>
                                </div>
                                <div class="concept-info-value bibliographie-container">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata.sitesArcheologiques}">
                                        <ui:repeat value="#{fn:split(applicationBean.selectedEntity.metadata.sitesArcheologiques, ';')}" var="ref" varStatus="status">
                                            <ui:fragment rendered="#{not empty ref and fn:trim(ref) != ''}">
                                                <span class="bibliographie-badge">
                                                    <span class="bibliographie-badge-text">#{fn:trim(ref)}</span>
                                                </span>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <h:outputText value="#{msg['attestations.sites.empty']}"
                                                  rendered="#{empty applicationBean.selectedEntity.metadata.sitesArcheologiques}"
                                                  styleClass="bibliographie-empty"/>
                                </div>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{applicationBean.showFieldWithValue(applicationBean.selectedEntity.metadata != null ? applicationBean.selectedEntity.metadata.corpusLies : null)}"
                                          styleClass="concept-info-item description-typo-field" layout="block">
                                <div class="concept-info-label">
                                    <i class="pi pi-book monnaie-communs-icon" aria-hidden="true"/>
                                    <span>Corpus lié(s)</span>
                                </div>
                                <div class="concept-info-value bibliographie-container">
                                    <ui:fragment rendered="#{not empty applicationBean.selectedEntity.metadata.corpusLies}">
                                        <ui:repeat value="#{fn:split(applicationBean.selectedEntity.metadata.corpusLies, ';')}" var="corpus">
                                            <ui:fragment rendered="#{not empty corpus and fn:trim(corpus) != ''}">
                                                <ui:fragment rendered="#{fn:length(fn:split(fn:trim(corpus), '\\\\|')) ge 2}">
                                                    <span class="bibliographie-badge">
                                                        <i class="pi pi-book bibliographie-badge-icon" aria-hidden="true"/>
                                                        <h:outputLink value="#{fn:split(fn:trim(corpus), '\\\\|')[1]}"
                                                                      target="_blank"
                                                                      rel="noopener noreferrer"
                                                                      styleClass="bibliographie-badge-text">
                                                            #{fn:split(fn:trim(corpus), '\\\\|')[0]}
                                                        </h:outputLink>
                                                    </span>
                                                </ui:fragment>
                                                <ui:fragment rendered="#{fn:length(fn:split(fn:trim(corpus), '\\\\|')) lt 2}">
                                                    <span class="bibliographie-badge">
                                                        <i class="pi pi-book bibliographie-badge-icon" aria-hidden="true"/>
                                                        <span class="bibliographie-badge-text">#{fn:trim(corpus)}</span>
                                                    </span>
                                                </ui:fragment>
                                            </ui:fragment>
                                        </ui:repeat>
                                    </ui:fragment>
                                    <ui:fragment rendered="#{empty applicationBean.selectedEntity.metadata.corpusLies}">
                                        <span class="empty-field-message">Non renseigné</span>
                                    </ui:fragment>
                                </div>
                            </h:panelGroup>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </h:panelGroup>
</ui:composition>
