<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:p="http://primefaces.org/ui"
             xmlns:ui="http://java.sun.com/jsf/facelets"
             xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
    <!-- Menu latéral : accueil, candidats, utilisateurs (admin), déconnexion -->

    <aside id="sidebar" class="app-sidebar sidebar-collapsed sidebar-always-collapsed">
        <h:form id="sidebarForm">
            <div class="sidebar-content">
                <!-- Header du menu -->
                <div class="sidebar-menu-header">
                    <div class="sidebar-header-icon">
                        <i class="pi pi-th-large" />
                    </div>
                </div>

                <!-- Menu items dynamiques -->
                <nav class="sidebar-nav">
                    <!-- Accueil item -->
                    <p:commandLink action="#{applicationBean.goToAccueil(entityUpdateBean)}"
                                   styleClass="sidebar-menu-item"
                                   pt:data-menu-item="accueil"
                                   ajax="false">
                        <div class="sidebar-menu-item-content">
                            <div class="sidebar-menu-item-icon">
                                <i class="pi pi-home" />
                            </div>
                            <span class="sidebar-menu-item-text">Accueil</span>
                            <span class="sidebar-menu-item-tooltip">Accueil</span>
                        </div>
                    </p:commandLink>

                    <h:panelGroup rendered="#{loginBean.authenticated}">
                        <!-- Candidats item - Visible uniquement si connecté -->
                        <p:commandLink action="#{applicationBean.goToBrouillons(entityUpdateBean)}"
                                       styleClass="sidebar-menu-item"
                                       pt:data-menu-item="candidats"
                                       ajax="false">
                            <div class="sidebar-menu-item-content">
                                <div class="sidebar-menu-item-icon">
                                    <i class="pi pi-users" />
                                </div>
                                <span class="sidebar-menu-item-text">Brouillons</span>
                                <span class="sidebar-menu-item-tooltip">Brouillons</span>
                            </div>
                        </p:commandLink>

                        <!-- Gestion des utilisateurs item - Visible uniquement si connecté ET administrateur -->
                        <h:panelGroup rendered="#{loginBean.isAdminTechniqueOrFonctionnel()}">
                            <p:commandLink action="#{applicationBean.goToUtilisateurs(entityUpdateBean)}"
                                           styleClass="sidebar-menu-item"
                                           pt:data-menu-item="users"
                                           ajax="false">
                                <div class="sidebar-menu-item-content">
                                    <div class="sidebar-menu-item-icon">
                                        <i class="pi pi-user-edit" />
                                    </div>
                                    <span class="sidebar-menu-item-text">Utilisateurs</span>
                                    <span class="sidebar-menu-item-tooltip">Utilisateurs</span>
                                </div>
                            </p:commandLink>
                        </h:panelGroup>
                    </h:panelGroup>
                </nav>

            </div>
        </h:form>
    </aside>
</ui:fragment>
