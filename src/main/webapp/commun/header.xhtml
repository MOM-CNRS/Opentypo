<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:p="http://primefaces.org/ui"
             xmlns:ui="http://java.sun.com/jsf/facelets">
    <!-- En-tête : burger (mobile), logo, zone centrale (label entité sélectionnée), actions -->

    <header class="app-header">
        <div class="header-left">
            <div class="burger-button">
                <!-- Barre mobile avec bouton burger -->
                <p:commandButton icon="pi pi-bars text-white"
                                 styleClass="mobile-burger-button"
                                 type="button"
                                 title="#{msg['header.menu']}"
                                 onclick="toggleSidebar(); return false;" />
            </div>

            <!-- Logo texte : Opentypo -->
            <div class="logo-desktop header-logo-text">
                <span class="logo-accent" />
                <span class="logo-text">
                    <span class="logo-text-main">Open</span><span class="logo-text-accent">typo</span>
                </span>
            </div>
            <div class="logo-mobile header-logo-text">
                <span class="logo-accent" />
                <span class="logo-text">
                    <span class="logo-text-main">Open</span><span class="logo-text-accent">typo</span>
                </span>
            </div>
        </div>

        <h:panelGroup id="selectedEntityLabel" styleClass="header-title" rendered="#{facesContext.viewRoot.viewId != null and facesContext.viewRoot.viewId.contains('/index.xhtml')}">
            <h:outputText value="#{applicationBean.selectedEntityLabel}"/>
        </h:panelGroup>

        <div class="header-right">
            <h:form id="headerForm">
                <!-- Icône d'alertes -->
                <p:commandButton icon="pi pi-bell text-white"
                                 styleClass="p-button-rounded p-button-text p-button-secondary header-icon"
                                 style="color: white"
                                 title="#{msg['header.alerts']}"
                                 action="#{notificationBean.showAlerts}" />

                <p:button icon="pi pi-code text-white"
                          href="#{request.contextPath}/swagger-ui/index.html"
                          target="_blank"
                          styleClass="p-button-rounded p-button-text p-button-secondary header-icon"
                          style="color: white"
                          title="#{msg['header.apiDocs']}" />

                <div class="header-locale-switch" role="group" aria-label="#{msg['header.locale']}">
                    <p:commandButton id="localeMenuBtn"
                                     type="button"
                                     value="  "
                                     icon="pi pi-angle-down"
                                     iconPos="right"
                                     title="#{msg['header.locale.menuHint']}"
                                     styleClass="header-locale-menubtn p-button-rounded p-button-text p-button-secondary header-icon"
                                     style="color: white; --locale-flag: url('#{localeBean.activeFlagUrl}')" />
                    <p:overlayPanel id="localeOverlayPanel"
                                    widgetVar="wvLocalePanel"
                                    for="localeMenuBtn"
                                    appendTo="@(body)"
                                    dismissable="true"
                                    styleClass="header-locale-overlay-panel">
                        <div class="header-locale-overlay-body">
                            <p:commandLink action="#{localeBean.switchToFrench}"
                                           ajax="false"
                                           onclick="if(typeof showLoading==='function') showLoading('#{msg['header.locale.switching']}', 'bars');"
                                           styleClass="header-locale-option"
                                           rendered="#{!localeBean.french}">
                                <h:graphicImage library="img"
                                                name="flags/fr.svg"
                                                alt=""
                                                width="22"
                                                height="15"
                                                styleClass="header-locale-flag-img"/>
                                <span>#{msg['locale.labelFr']}</span>
                            </p:commandLink>
                            <h:panelGroup layout="block"
                                          styleClass="header-locale-option header-locale-option-current"
                                          rendered="#{localeBean.french}">
                                <h:graphicImage library="img"
                                                name="flags/fr.svg"
                                                alt=""
                                                width="22"
                                                height="15"
                                                styleClass="header-locale-flag-img"/>
                                <span>#{msg['locale.labelFr']}</span>
                            </h:panelGroup>
                            <p:commandLink action="#{localeBean.switchToEnglish}"
                                           ajax="false"
                                           onclick="if(typeof showLoading==='function') showLoading('#{msg['header.locale.switching']}', 'bars');"
                                           styleClass="header-locale-option"
                                           rendered="#{!localeBean.english}">
                                <h:graphicImage library="img"
                                                name="flags/gb.svg"
                                                alt=""
                                                width="22"
                                                height="15"
                                                styleClass="header-locale-flag-img"/>
                                <span>#{msg['locale.labelEn']}</span>
                            </p:commandLink>
                            <h:panelGroup layout="block"
                                          styleClass="header-locale-option header-locale-option-current"
                                          rendered="#{localeBean.english}">
                                <h:graphicImage library="img"
                                                name="flags/gb.svg"
                                                alt=""
                                                width="22"
                                                height="15"
                                                styleClass="header-locale-flag-img"/>
                                <span>#{msg['locale.labelEn']}</span>
                            </h:panelGroup>
                        </div>
                    </p:overlayPanel>
                </div>

                <!-- Bouton de connexion/déconnexion -->
                <h:panelGroup rendered="#{!loginBean.authenticated}">
                    <p:commandButton icon="pi pi-user text-white"
                                     styleClass="p-button-rounded p-button-text p-button-secondary header-icon"
                                     style="color: white"
                                     title="#{msg['header.login']}"
                                     type="button"
                                     onclick="showLoginDialog(); return false;" />
                </h:panelGroup>
                <h:panelGroup rendered="#{loginBean.authenticated}" id="header">
                    <p:menuButton value="#{loginBean.userDisplayName}"
                                  icon="pi pi-user-check text-white"
                                  styleClass="p-button-rounded p-button-text p-button-secondary header-icon authenticated-user">
                        <p:menuitem value="#{msg['header.profile']}"
                                    icon="pi pi-user"
                                    outcome="/profile/myAccount.xhtml?faces-redirect=true" />
                        <p:separator />
                        <p:menuitem value="#{msg['header.logout']}"
                                    icon="pi pi-sign-out"
                                    type="button"
                                    onclick="PF('confirmLogoutDialog').show(); return false;" />
                    </p:menuButton>
                </h:panelGroup>
            </h:form>
        </div>
    </header>
</ui:fragment>
