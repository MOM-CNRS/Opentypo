<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">

        <!-- Identifiant pérenne -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="#{msg['modifier.details.permanentId']}" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group ">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-link input-icon" title="#{msg['modifier.details.permanentId']}"/>
                    <p:inputText value="#{entityUpdateBean.identifiantPerenne}"
                                 styleClass="users-input"
                                 placeholder="#{msg['modifier.placeholder.permanentId']}"/>
                </div>
            </div>
        </div>

        <!-- Ancienne version -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="#{msg['modifier.details.oldVersion']}" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-history input-icon" title="#{msg['modifier.details.oldVersion']}"/>
                    <p:inputText value="#{entityUpdateBean.ancienneVersion}"
                                 styleClass="users-input"
                                 placeholder="#{msg['modifier.placeholder.oldVersion']}"/>
                </div>
            </div>
        </div>

    </div>
</ui:composition>
