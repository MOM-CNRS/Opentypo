<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">

        <!-- Attestations -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Attestations" />
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-check-circle input-icon" title="Attestations"/>
                <p:chips value="#{entityUpdateBean.attestations}"
                         styleClass="users-chips"
                         placeholder="Saisissez une attestation et appuyez sur Entrée..."
                         maxlength="500"
                         addOnBlur="true">
                    <p:ajax event="itemSelect" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                    <p:ajax event="itemUnselect" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                    <p:ajax event="change" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                </p:chips>
            </div>
        </div>

        <!-- Sites archéologiques -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Sites archéologiques" />
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-map-marker input-icon" title="Sites archéologiques"/>
                <p:chips value="#{entityUpdateBean.sitesArcheologiques}"
                         styleClass="users-chips"
                         placeholder="Saisissez un site archéologique et appuyez sur Entrée..."
                         maxlength="500"
                         addOnBlur="true">
                    <p:ajax event="itemSelect" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                    <p:ajax event="itemUnselect" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                    <p:ajax event="change" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                </p:chips>
            </div>
        </div>

        <!-- Identifiant pérenne -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Identifiant pérenne" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group ">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-link input-icon" title="Identifiant pérenne"/>
                    <p:inputText value="#{entityUpdateBean.identifiantPerenne}"
                                 styleClass="users-input"
                                 placeholder="Aucun valeur pour l'identifiant perenne"/>
                </div>
            </div>
        </div>

        <!-- Ancienne version -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Ancienne version" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-history input-icon" title="Ancienne version"/>
                    <p:inputText value="#{entityUpdateBean.ancienneVersion}"
                                 styleClass="users-input"
                                 placeholder="Aucun valeur pour l'ancienne version"/>
                </div>
            </div>
        </div>

    </div>
</ui:composition>
