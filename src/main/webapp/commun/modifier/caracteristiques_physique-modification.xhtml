<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <!-- Caractéristiques physiques (communes à tous les types de brouillons) -->
    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
        <!-- Titre -->
        <b><p:outputLabel value="#{msg['modifier.physicalCharacteristics.title']}"
                           styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <h:panelGroup rendered="#{applicationBean.isCeramiqueTypo()}">
            <ui:include src="caracteristiques_ceramique-modification.xhtml"/>
        </h:panelGroup>

        <h:panelGroup rendered="#{applicationBean.isCashTypo()}">
            <ui:include src="caracteristiques_monnais-modification.xhtml"/>
        </h:panelGroup>

        <h:panelGroup rendered="#{applicationBean.isInstrumentumTypo()}">
            <ui:include src="caracteristiques_instrumentum-modification.xhtml"/>
        </h:panelGroup>
    </div>
</ui:composition>
