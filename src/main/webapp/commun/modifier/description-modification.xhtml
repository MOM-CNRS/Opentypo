<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:fn="http://java.sun.com/jsp/jstl/functions"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
        <!-- Caractéristiques physiques -->
        <b><p:outputLabel value="#{msg['modifier.description.section.title']}" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <h:panelGroup rendered="#{!applicationBean.isCashTypo()}">
            <h:panelGroup styleClass="users-form-group users-form-group-full" rendered="#{applicationBean.isCeramiqueTypo()}">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.form']}" />
                </div>
                <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                    <div id="formeAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-briefcase input-icon periode-autocomplete-icon" aria-hidden="true"/>
                        <p:autoComplete value="#{entityUpdateBean.formeAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="2"
                                        appendTo="#formeAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="#{msg['modifier.autocomplete.empty.manual']}"
                                        placeholder="#{msg['modifier.placeholder.form.ceramique']}"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false"/>
                    </div>
                </div>
            </h:panelGroup>

            <!-- Décors -->
            <div class="users-form-group users-form-group-full  candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.decors']}" />
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="candidat-description-textarea-wrapper">
                            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                                <i class="pi pi-palette input-icon" aria-hidden="true"/>
                                <p:inputTextarea value="#{entityUpdateBean.decors}"
                                                 placeholder="#{msg['modifier.placeholder.decors']}"
                                                 rows="4"
                                                 styleClass="users-textarea"
                                                 maxlength="2000"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Marques/estampilles -->
            <div class="users-form-group users-form-group-full candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.marks']}" for="marquesEstampillesTextarea"/>
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="candidat-description-textarea-wrapper">
                            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                                <i class="pi pi-tag input-icon" aria-hidden="true"/>
                                <p:inputTextarea id="marquesEstampillesTextarea"
                                                 value="#{entityUpdateBean.marques}"
                                                 placeholder="#{msg['modifier.placeholder.marks']}"
                                                 rows="4"
                                                 styleClass="users-textarea"
                                                 maxlength="2000"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Fonction/usage (multi) -->
            <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10" rendered="#{applicationBean.isCeramiqueTypo()}">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.functionUsage']}" for="fonctionUsageAutocomplete"/>
                </div>
                <p:outputPanel id="modifierFonctionUsagePanel" layout="block"
                               styleClass="modifier-fonction-usage-editor modifier-autocomplete-multi-editor">
                    <div class="d-flex gap-2 align-items-stretch flex-wrap modifier-aires-toolbar">
                        <div id="fonctionUsageAutocompleteWrapper"
                             class="flex-grow-1 min-w-0 candidat-aires-wrapper input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                            <i class="pi pi-briefcase input-icon periode-autocomplete-icon" aria-hidden="true"/>
                            <p:autoComplete id="fonctionUsageAutocomplete"
                                            widgetVar="modifierFonctionUsageAC"
                                            value="#{entityUpdateBean.fonctionUsageAutocompleteSelection}"
                                            completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                            converter="pactolsConceptConverter"
                                            var="concept"
                                            itemLabel="#{concept.selectedTerm}"
                                            itemValue="#{concept}"
                                            dropdown="false"
                                            minQueryLength="0"
                                            queryDelay="350"
                                            appendTo="#fonctionUsageAutocompleteWrapper"
                                            my="left top"
                                            at="left bottom"
                                            panelStyleClass="periode-autocomplete-panel"
                                            scrollHeight="280"
                                            emptyMessage="#{msg['modifier.autocomplete.empty.enterOnly']}"
                                            placeholder="#{msg['modifier.placeholder.functionUsage.enter']}"
                                            styleClass="users-input periode-autocomplete-input"
                                            forceSelection="false">
                                <p:ajax event="itemSelect"
                                        listener="#{entityUpdateBean.addFonctionUsageFromAutocomplete}"
                                        process="modifierFonctionUsagePanel"
                                        update="modifierFonctionUsagePanel :growl"/>
                            </p:autoComplete>
                        </div>
                    </div>
                    <p:remoteCommand name="modifierAddFonctionUsageCmd"
                                     actionListener="#{entityUpdateBean.addFonctionUsageFromAutocomplete}"
                                     process="modifierFonctionUsagePanel"
                                     update="modifierFonctionUsagePanel :growl"/>
                    <div class="candidat-aires-circulation-chips mt-2">
                        <ui:repeat value="#{entityUpdateBean.fonctionsUsage}" var="fu" id="fonctionsUsageRepeat">
                            <span class="candidat-aire-chip">
                                <span class="candidat-aire-chip-label">#{fu.valeur}</span>
                                <p:commandButton icon="pi pi-times"
                                                 styleClass="candidat-aire-chip-delete"
                                                 action="#{entityUpdateBean.deleteFonctionUsage(fu.valeur)}"
                                                 process="@this"
                                                 ajax="true"
                                                 update="@form :growl"/>
                            </span>
                        </ui:repeat>
                    </div>
                </p:outputPanel>
            </h:panelGroup>

            <!-- Catégorie fonctionnelle -->
            <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10"
                          rendered="#{applicationBean.isInstrumentumTypo() or applicationBean.isInstrumentumTypo()}">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.functionalCategory']}" />
                </div>
                <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                    <div id="categorieFonctionnelleAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-cog input-icon periode-autocomplete-icon" />
                        <p:autoComplete value="#{entityUpdateBean.categorieFonctionnelleAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="2"
                                        appendTo="#categorieFonctionnelleAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="#{msg['modifier.autocomplete.empty.manual']}"
                                        placeholder="#{msg['modifier.placeholder.form.ceramique']}"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false"/>
                    </div>
                </div>
            </h:panelGroup>

            <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10" rendered="#{applicationBean.isInstrumentumTypo()}">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.imitationRelations']}" />
                </div>
                <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                    <div id="relationImitationAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-share-alt input-icon periode-autocomplete-icon" />
                        <p:autoComplete value="#{entityUpdateBean.relationImitationAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="2"
                                        appendTo="#relationImitationAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="#{msg['modifier.autocomplete.empty.manual']}"
                                        placeholder="#{msg['modifier.placeholder.imitation']}"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false"/>
                    </div>
                </div>
            </h:panelGroup>
        </h:panelGroup>

        <h:panelGroup rendered="#{applicationBean.isCashTypo()}">
            <!-- Droit (avers) -->
            <div class="users-form-group users-form-group-full candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.obverse']}" />
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-arrow-circle-right input-icon" aria-hidden="true"/>
                            <p:inputText value="#{entityUpdateBean.droit}"
                                         placeholder="#{msg['modifier.placeholder.obverse']}"
                                         styleClass="users-input"
                                         maxlength="500"/>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Légende du droit -->
            <div class="users-form-group users-form-group-full candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.obverseLegend']}" />
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="candidat-description-textarea-wrapper">
                            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                                <i class="pi pi-align-left input-icon" aria-hidden="true"/>
                                <p:inputText value="#{entityUpdateBean.legendeDroit}"
                                             placeholder="#{msg['modifier.placeholder.obverseLegend']}"
                                             styleClass="users-input"
                                             maxlength="500"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Revers -->
            <div class="users-form-group users-form-group-full candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.reverse']}" />
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-arrows-h input-icon" aria-hidden="true"/>
                            <p:inputText value="#{entityUpdateBean.revers}"
                                         placeholder="#{msg['modifier.placeholder.reverse']}"
                                         styleClass="users-input"
                                         maxlength="500"/>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Légende du revers -->
            <div class="users-form-group users-form-group-full candidats-mt-10">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.reverseLegend']}" />
                </div>
                <div class="periode-field-row">
                    <div class="candidat-description-input-row periode-input-wrapper candidats-input-wrapper-border">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-palette input-icon" />
                            <p:inputText value="#{entityUpdateBean.legendeRevers}"
                                         placeholder="#{msg['modifier.placeholder.reverseLegend']}"
                                         styleClass="users-input"
                                         maxlength="500"/>
                        </div>
                    </div>
                </div>
            </div>

        </h:panelGroup>

        <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10" rendered="#{applicationBean.isInstrumentumTypo()}">
            <div class="periode-header-row">
                <p:outputLabel value="#{msg['modifier.field.denomination']}" />
            </div>
            <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                <div id="denominationInstrumentumAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                    <i class="pi pi-tag input-icon periode-autocomplete-icon" />
                    <p:autoComplete value="#{entityUpdateBean.denominationInstrumentumAutocompleteSelection}"
                                    completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                    converter="pactolsConceptConverter"
                                    var="concept"
                                    itemLabel="#{concept.selectedTerm}"
                                    itemValue="#{concept}"
                                    dropdown="false"
                                    minQueryLength="2"
                                    appendTo="#denominationInstrumentumAutocompleteWrapper"
                                    my="left top"
                                    at="left bottom"
                                    panelStyleClass="periode-autocomplete-panel"
                                    scrollHeight="280"
                                    emptyMessage="#{msg['modifier.autocomplete.empty.manual']}"
                                    placeholder="#{msg['modifier.placeholder.denomination.instrumentum']}"
                                    styleClass="users-input periode-autocomplete-input"
                                    forceSelection="false"/>
                </div>
            </div>
        </h:panelGroup>
    </div>
</ui:composition>
