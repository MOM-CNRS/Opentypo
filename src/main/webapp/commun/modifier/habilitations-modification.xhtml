<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <div class="reference-form-group reference-form-section group-dialog-permissions-section" style="padding-top: 15px">
        <div class="group-dialog-permissions-row">
            <div class="group-dialog-permission-card group-dialog-permission-redacteur">
                <div class="group-dialog-permission-card-header">
                    <div class="group-dialog-permission-icon">
                        <i class="pi pi-pencil"/>
                    </div>
                    <div class="group-dialog-permission-card-label">
                        <label>Rédacteurs</label>
                    </div>
                </div>
                <p:pickList id="redacteursPickList"
                            value="#{entityUpdateBean.redacteursPickList}"
                            var="userId"
                            itemLabel="#{entityUpdateBean.getUtilisateurDisplayName(userId)}"
                            itemValue="#{userId}"
                            converter="pickListLongConverter"
                            styleClass="group-dialog-picklist"
                            showSourceFilter="true"
                            showTargetFilter="true"
                            filterMatchMode="contains"
                            sourceFilterPlaceholder="Rechercher..."
                            targetFilterPlaceholder="Rechercher..."
                            responsive="true"
                            rendered="#{not empty entityUpdateBean.redacteursList}"/>
                <h:panelGroup rendered="#{empty entityUpdateBean.redacteursList}" class="group-dialog-no-relecteurs">
                    <span>Aucun rédacteur disponible</span>
                </h:panelGroup>
            </div>
        </div>

        <div class="group-dialog-permissions-row">
            <div class="group-dialog-permission-card group-dialog-permission-validateurs">
                <div class="group-dialog-permission-card-header">
                    <div class="group-dialog-permission-icon">
                        <i class="pi pi-check-circle"/>
                    </div>
                    <div class="group-dialog-permission-card-label">
                        <label>Validateurs</label>
                    </div>
                </div>
                <p:pickList id="validateursPickList"
                            value="#{entityUpdateBean.validateursPickList}"
                            var="userId"
                            itemLabel="#{entityUpdateBean.getUtilisateurDisplayName(userId)}"
                            itemValue="#{userId}"
                            converter="pickListLongConverter"
                            styleClass="group-dialog-picklist"
                            showSourceFilter="true"
                            showTargetFilter="true"
                            filterMatchMode="contains"
                            sourceFilterPlaceholder="Rechercher..."
                            targetFilterPlaceholder="Rechercher..."
                            responsive="true"
                            rendered="#{not empty entityUpdateBean.validateursList}"/>
                <h:panelGroup rendered="#{empty entityUpdateBean.validateursList}" class="group-dialog-no-relecteurs">
                    <span>Aucun validateur disponible</span>
                </h:panelGroup>
            </div>
        </div>
        <div class="group-dialog-permissions-row">
            <div class="group-dialog-permission-card group-dialog-permission-relecteurs">
                <div class="group-dialog-permission-card-header">
                    <div class="group-dialog-permission-icon">
                        <i class="pi pi-pencil"/>
                    </div>
                    <div class="group-dialog-permission-card-label">
                        <label>Relecteurs</label>
                    </div>
                </div>
                <p:pickList id="relecteursPickList"
                            value="#{entityUpdateBean.relecteursPickList}"
                            var="userId"
                            itemLabel="#{entityUpdateBean.getUtilisateurDisplayName(userId)}"
                            itemValue="#{userId}"
                            converter="pickListLongConverter"
                            styleClass="group-dialog-picklist"
                            showSourceFilter="true"
                            showTargetFilter="true"
                            filterMatchMode="contains"
                            sourceFilterPlaceholder="Rechercher..."
                            targetFilterPlaceholder="Rechercher..."
                            responsive="true"
                            rendered="#{not empty entityUpdateBean.relecteursList}"/>
                <h:panelGroup rendered="#{empty entityUpdateBean.relecteursList}" class="group-dialog-no-relecteurs">
                    <span>Aucun relecteur disponible</span>
                </h:panelGroup>
            </div>
        </div>
    </div>
</ui:composition>
