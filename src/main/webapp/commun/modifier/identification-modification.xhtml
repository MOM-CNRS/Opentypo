<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="users-form-group users-form-group-full periode-group">

        <b><p:outputLabel value="#{msg['modifier.identification.section.title']}" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <!-- Code -->
        <h:panelGroup class="users-form-group users-form-group-full periode-group" rendered="#{applicationBean.selectedEntity.entityType.id != 6}">
            <p:outputLabel value="#{msg['modifier.field.code']}" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-align-left input-icon" />
                    <p:inputText value="#{entityUpdateBean.code}"
                                 styleClass="users-input"
                                 placeholder="#{msg['modifier.placeholder.code']}"
                                 maxlength="255"/>
                </div>
            </div>
        </h:panelGroup>

        <ui:include src="label-modification.xhtml"/>

        <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 4 or applicationBean.selectedEntity.entityType.id == 5}">
            <div class="users-form-group users-form-group-full candidats-mt-15 periode-group" id="appellationUsuelleGroup">
                <div class="periode-header-row">
                    <p:outputLabel value="#{msg['modifier.field.usualNames']}" for="modifierAppellationInput"/>
                </div>
                <p:outputPanel id="modifierAppellationsPanel" layout="block" styleClass="modifier-aires-circulation-editor">
                    <div class="d-flex gap-2 align-items-stretch flex-wrap modifier-aires-toolbar">
                        <div id="modifierAppellationAutocompleteWrapper"
                             class="flex-grow-1 min-w-0 candidat-aires-wrapper input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                            <i class="pi pi-tag input-icon periode-autocomplete-icon candidat-aires-icon" />
                            <p:autoComplete id="modifierAppellationInput"
                                            widgetVar="modifierAppellationUsuelleAC"
                                            value="#{entityUpdateBean.appellationAutocompleteSelection}"
                                            completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                            converter="pactolsConceptConverter"
                                            var="concept"
                                            itemLabel="#{concept.selectedTerm}"
                                            itemValue="#{concept}"
                                            dropdown="false"
                                            minQueryLength="0"
                                            queryDelay="350"
                                            appendTo="#modifierAppellationAutocompleteWrapper"
                                            my="left top"
                                            at="left bottom"
                                            panelStyleClass="periode-autocomplete-panel"
                                            scrollHeight="280"
                                            emptyMessage="#{msg['modifier.autocomplete.empty.enterPlus']}"
                                            placeholder="#{msg['modifier.placeholder.openthesoFreeThenEnter']}"
                                            styleClass="users-input periode-autocomplete-input"
                                            forceSelection="false"
                                            rendered="#{entityUpdateBean.canEditCurrentBrouillon()}">
                                <p:ajax event="itemSelect"
                                        listener="#{entityUpdateBean.addAppellationUsuelleFromAutocomplete}"
                                        process="modifierAppellationsPanel"
                                        update="modifierAppellationsPanel :growl"/>
                            </p:autoComplete>
                        </div>
                    </div>
                    <p:remoteCommand name="modifierAddAppellationCmd"
                                     actionListener="#{entityUpdateBean.addAppellationUsuelleFromAutocomplete}"
                                     process="modifierAppellationsPanel"
                                     update="modifierAppellationsPanel :growl"/>
                    <div class="candidat-aires-circulation-chips mt-2">
                        <ui:repeat value="#{entityUpdateBean.appellationsUsuelles}" var="appRef" id="modifierAppellationsRepeat">
                                    <span class="candidat-aire-chip">
                                        <span class="candidat-aire-chip-label">#{appRef.valeur}</span>
                                        <p:commandButton icon="pi pi-times"
                                                         styleClass="candidat-aire-chip-delete"
                                                         action="#{entityUpdateBean.deleteAppellationUsuelle(appRef.valeur)}"
                                                         process="@this"
                                                         ajax="true"
                                                         update="modifierAppellationsPanel :growl"
                                                         rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
                                    </span>
                        </ui:repeat>
                    </div>
                </p:outputPanel>
            </div>
            <style type="text/css">
                .modifier-aires-circulation-editor .modifier-aire-add-btn { min-width: 2.75rem; flex-shrink: 0; }
                .modifier-aires-toolbar .min-w-0 { min-width: 0; }
            </style>
            <script type="text/javascript">
                //<![CDATA[
                window.modifierSyncAppellationHiddenBeforeAjax = function () {
                    var w = PF('modifierAppellationUsuelleAC');
                    if (!w || !w.input || !w.input.length || !w.hinput) return;
                    var vis = (w.input.val() || '').trim();
                    if (!vis) return;
                    var $h = $(w.hinput);
                    var h = ($h.val() || '').trim();
                    if (h.indexOf('|||') === -1) {
                        $h.val(vis);
                    }
                };
                (function () {
                    if (window.__modifierAppellationEnterBound) return;
                    window.__modifierAppellationEnterBound = true;
                    $(document).on('keydown.modifierAppellation', '#appellationUsuelleGroup .modifier-aires-circulation-editor input.ui-autocomplete-input', function (e) {
                        if (e.key !== 'Enter' && e.which !== 13) return;
                        var $wrap = $(this).closest('.modifier-aires-circulation-editor');
                        var $panel = $wrap.find('.ui-autocomplete-panel:visible');
                        if ($panel.length && $panel.find('.ui-autocomplete-item').length > 0) {
                            return;
                        }
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        modifierSyncAppellationHiddenBeforeAjax();
                        if (typeof modifierAddAppellationCmd === 'function') {
                            modifierAddAppellationCmd();
                        }
                        return false;
                    });
                })();
                //]]>
            </script>
        </h:panelGroup>

        <ui:include src="definition-modification.xhtml"/>

        <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 5}"
                      class="users-form-group users-form-group-full periode-group candidats-mt-20">
            <p:outputLabel value="#{msg['modifier.field.scientificAuthors']}" style="margin-bottom: 13px !important" />
            <p:selectCheckboxMenu value="#{entityUpdateBean.selectedScientificAuthorIds}"
                                  label="#{msg['modifier.selectAuthors.label']}"
                                  styleClass="users-input modifier-scientific-authors-select"
                                  filter="true"
                                  filterMatchMode="contains"
                                  panelStyle="width: min(520px, 90vw);"
                                  updateLabel="true">
                <f:selectItems value="#{entityUpdateBean.availableScientificAuthors}"
                               var="scientificAuthor"
                               itemValue="#{scientificAuthor.id}"
                               itemLabel="#{scientificAuthor.prenom} #{scientificAuthor.nom}#{scientificAuthor.active ? '' : msg['modifier.user.hidden']}"/>
            </p:selectCheckboxMenu>
        </h:panelGroup>
    </div>
</ui:composition>
