<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:panelGroup id="imageModificationSection" layout="block" class="users-form-group users-form-group-full periode-group">
        <div class="periode-header-row">
            <p:outputLabel value="Images" />
        </div>

        <div class="reference-image-sources modifier-image-sources candidats-mt-10">
            <p class="modifier-image-deferred-hint">
                <i class="pi pi-info-circle"/>Les images chargées seront enregistrées à la validation.
            </p>
            <div class="modifier-image-unitaire">
                <div class="modifier-slot-wrapper modifier-slot-add-visible">
                    <label class="modifier-slot-add-zone">
                        <h:inputFile value="#{entityUpdateBean.pendingFileParts}"
                                     styleClass="modifier-slot-file-input modifier-slot-input modifier-pending-file-input"
                                     accept="image/jpeg,image/jpg,image/png,image/gif,image/webp"
                                     multiple="true"
                                     onchange="ModifierImage.onFilesSelected(this);"/>
                        <i class="pi pi-plus-circle modifier-add-icon"/>
                        <span class="modifier-add-main">Cliquez pour choisir une ou plusieurs images</span>
                        <span class="modifier-add-formats">JPG, PNG, GIF ou WebP</span>
                    </label>
                </div>
                <div class="modifier-pending-preview" style="display:none;">
                    <div class="modifier-pending-preview-list"></div>
                    <div class="modifier-pending-actions">
                        <button type="button" class="modifier-pending-clear" onclick="ModifierImage.clearPending();" title="Supprimer la sélection">
                            <i class="pi pi-times"/> Supprimer la sélection
                        </button>
                    </div>
                </div>
            </div>

            <div class="reference-image-divider">
                <span class="reference-image-divider-line"/>
                <span class="reference-image-divider-text">ou</span>
                <span class="reference-image-divider-line"/>
            </div>

            <div class="reference-image-url-group">
                <div class="input-wrapper periode-input-wrapper collection-select">
                    <i class="pi pi-tag input-icon" />
                    <p:inputText id="newImageUrlInput"
                                 value="#{entityUpdateBean.newImageUrlInput}"
                                 placeholder="Collez l'adresse d'une image sur internet"
                                 styleClass="users-input"/>
                </div>
                <p:commandButton value="Ajouter cette image"
                                 icon="pi pi-plus"
                                 styleClass="reference-btn-add reference-image-url-btn"
                                 actionListener="#{entityUpdateBean.addImageFromUrl()}"
                                 process="@form"
                                 ajax="true"
                                 update=":contentPanels :growl"/>
            </div>
        </div>

        <!-- Liste des images -->
        <p:dataTable value="#{entityUpdateBean.editingImageUrls}"
                     var="imgUrl"
                     rowIndexVar="idx"
                     styleClass="candidat-labels-table candidats-mt-10"
                     emptyMessage="Aucune image"
                     rendered="#{not empty entityUpdateBean.editingImageUrls}">
            <p:column headerText="Aperçu" styleClass="candidat-table-label-column" width="80">
                <div class="candidat-table-label-cell modifier-image-preview-cell"
                     data-image-url="#{imgUrl}"
                     onclick="var u=this.getAttribute('data-image-url');if(u&amp;&amp;typeof showFullscreenImage==='function'){showFullscreenImage(u);}return false;"
                     role="button"
                     title="Cliquer pour afficher en plein écran">
                    <p:graphicImage value="#{imgUrl}"
                                   alt="Aperçu"
                                   style="max-width: 48px; max-height: 36px; object-fit: contain;"/>
                </div>
            </p:column>
            <p:column headerText="URL" styleClass="candidat-table-label-column candidats-table-label-padding">
                <div class="candidat-table-label-cell">
                    <h:outputText value="#{imgUrl}" styleClass="candidat-table-label-text"/>
                </div>
            </p:column>
            <p:column styleClass="candidat-table-action-column">
                <div class="candidat-table-action-cell">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     action="#{entityUpdateBean.removeImageByUrl(imgUrl)}"
                                     process="@this"
                                     ajax="true"
                                     update=":contentPanels :growl"
                                     title="Supprimer cette image"/>
                </div>
            </p:column>
        </p:dataTable>

        <ui:fragment rendered="#{empty entityUpdateBean.editingImageUrls}">
            <div class="candidat-no-labels candidats-mt-10">
                <div class="candidat-no-labels-content">
                    <div class="candidat-no-labels-icon"><i class="pi pi-images" /></div>
                    <div class="candidat-no-labels-text">
                        <h4 class="candidat-no-labels-title">Aucune image</h4>
                        <p class="candidat-no-labels-message">Ajoutez des images depuis votre ordinateur ou collez une adresse web ci-dessus.</p>
                    </div>
                </div>
            </div>
        </ui:fragment>
    </h:panelGroup>

    <style>
        .modifier-image-sources {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            background: #fff;
            border: 1px solid rgba(71, 98, 77, 0.15);
            border-radius: 8px;
        }
        .modifier-image-deferred-hint {
            font-size: 0.9rem;
            color: #555;
            margin: 0 0 0.75rem 0;
        }
        .modifier-image-simple {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modifier-image-unitaire {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modifier-slot-wrapper {
            display: flex;
            flex-direction: column;
        }
        .modifier-slot-wrapper .modifier-slot-add-zone {
            min-height: 120px;
            padding: 1rem 1.25rem;
            width: 100%;
        }
        .modifier-pending-preview {
            padding: 0.75rem 1rem;
            background: rgba(71, 98, 77, 0.08);
            border: 1px dashed rgba(71, 98, 77, 0.3);
            border-radius: 8px;
        }
        .modifier-pending-preview-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .modifier-pending-preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem;
            background: #fff;
            border-radius: 6px;
            border: 1px solid rgba(71, 98, 77, 0.15);
        }
        .modifier-pending-preview-item .modifier-slot-thumb {
            width: 64px;
            height: 48px;
            object-fit: contain;
            border-radius: 4px;
            background: #f5f5f5;
        }
        .modifier-pending-preview-item .modifier-slot-filename {
            font-size: 0.8rem;
            color: #333;
            text-align: center;
            word-break: break-all;
            max-width: 120px;
        }
        .modifier-pending-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .modifier-pending-hint {
            font-size: 0.85rem;
            color: #666;
        }
        .modifier-pending-clear {
            padding: 0.25rem 0.5rem;
            background: transparent;
            border: 1px solid rgba(71, 98, 77, 0.3);
            border-radius: 4px;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
        }
        .modifier-pending-clear:hover {
            background: rgba(71, 98, 77, 0.1);
            color: var(--color-action-main, #47624D);
        }
        .modifier-image-add-block {
            padding: 1.25rem;
            background: #f8faf8;
            border: 2px dashed rgba(71, 98, 77, 0.35);
            border-radius: 10px;
        }
        .modifier-image-add-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin: 0 0 1rem 0;
        }
        .modifier-slot-add-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 140px;
            padding: 1.5rem;
            background: #fff;
            border: 2px dashed rgba(71, 98, 77, 0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modifier-slot-add-zone:hover {
            border-color: var(--color-action-main, #47624D);
            background: rgba(71, 98, 77, 0.04);
        }
        .modifier-slot-file-input {
            position: absolute !important;
            width: 0.1px !important;
            height: 0.1px !important;
            opacity: 0 !important;
            overflow: hidden !important;
            z-index: -1 !important;
        }
        .modifier-add-icon {
            font-size: 2rem;
            color: var(--color-action-main, #47624D);
        }
        .modifier-add-main {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        .modifier-add-sub {
            font-size: 0.9rem;
            color: #666;
        }
        .modifier-add-formats {
            font-size: 0.8rem;
            color: #888;
        }
        .modifier-image-preview-cell {
            cursor: pointer;
        }
        .modifier-image-preview-cell:hover {
            opacity: 0.85;
        }
    </style>
    <script>
    (function() {
        window.ModifierImage = {
            onFilesSelected: function(input) {
                var files = input &amp;&amp; input.files;
                var preview = document.querySelector('.modifier-pending-preview');
                var listEl = preview &amp;&amp; preview.querySelector('.modifier-pending-preview-list');
                if (!preview || !listEl) return;
                listEl.innerHTML = '';
                if (!files || files.length === 0) {
                    preview.style.display = 'none';
                    return;
                }
                var count = files.length;
                for (var i = 0; i &lt; count; i++) {
                    var file = files[i];
                    var item = document.createElement('div');
                    item.className = 'modifier-pending-preview-item';
                    var thumb = document.createElement('img');
                    thumb.className = 'modifier-slot-thumb';
                    thumb.alt = file.name;
                    var nameSpan = document.createElement('span');
                    nameSpan.className = 'modifier-slot-filename';
                    nameSpan.textContent = file.name;
                    item.appendChild(thumb);
                    item.appendChild(nameSpan);
                    listEl.appendChild(item);
                    if (file.type &amp;&amp; file.type.indexOf('image') === 0) {
                        var reader = new FileReader();
                        reader.onload = (function(img) { return function(e) { img.src = e.target.result; }; })(thumb);
                        reader.readAsDataURL(file);
                    } else {
                        thumb.style.display = 'none';
                    }
                }
                preview.style.display = 'block';
            },
            clearPending: function() {
                var input = document.querySelector('.modifier-pending-file-input');
                var preview = document.querySelector('.modifier-pending-preview');
                if (input) input.value = '';
                if (preview) {
                    preview.style.display = 'none';
                    var listEl = preview.querySelector('.modifier-pending-preview-list');
                    if (listEl) listEl.innerHTML = '';
                }
            }
        };
    })();
    </script>
</ui:composition>
