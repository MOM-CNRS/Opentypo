<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:panelGroup id="imageModificationSection" layout="block" class="users-form-group users-form-group-full periode-group">
        <div class="periode-header-row">
            <p:outputLabel value="Images" />
        </div>

        <div class="reference-image-sources modifier-image-sources candidats-mt-10">
            <p class="modifier-image-deferred-hint">
                <i class="pi pi-info-circle"/> Les images seront enregistrées sur le serveur lorsque vous cliquerez sur Enregistrer.
            </p>
            <div class="modifier-image-simple">
                <ui:repeat value="#{entityUpdateBean.pendingFileSlots}" var="slot" varStatus="slotStatus">
                    <label class="modifier-slot-add-zone">
                        <h:inputFile id="imageFileInput"
                                     value="#{slot.part}"
                                     styleClass="modifier-slot-file-input modifier-pending-file-input"
                                     accept="image/jpeg,image/jpg,image/png,image/gif,image/webp"
                                     onchange="ModifierImage.onFileSelected(this);"/>
                        <i class="pi pi-plus-circle modifier-add-icon"/>
                        <span class="modifier-add-main">Cliquez ici pour choisir une image</span>
                        <span class="modifier-add-sub">ou glissez-déposez une image</span>
                        <span class="modifier-add-formats">JPG, PNG, GIF ou WebP</span>
                    </label>
                </ui:repeat>
                <div class="modifier-pending-preview modifier-pending-file-preview" style="display:none;">
                    <div class="modifier-pending-preview-content">
                        <img class="modifier-pending-thumb" alt="" />
                        <div class="modifier-pending-info">
                            <span class="modifier-pending-filename"></span>
                            <span class="modifier-pending-hint">Sera enregistré à l'enregistrement</span>
                            <button type="button" class="modifier-pending-clear" onclick="ModifierImage.clearPending();" title="Changer de fichier">
                                <i class="pi pi-times"/>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="reference-image-divider">
                <span class="reference-image-divider-line"/>
                <span class="reference-image-divider-text">ou</span>
                <span class="reference-image-divider-line"/>
            </div>

            <div class="reference-image-url-group">
                <div class="input-wrapper periode-input-wrapper collection-select">
                    <i class="pi pi-tag input-icon" />
                    <p:inputText id="newImageUrlInput"
                                 value="#{entityUpdateBean.newImageUrlInput}"
                                 placeholder="Collez l'adresse d'une image sur internet"
                                 styleClass="users-input"/>
                </div>
                <p:commandButton value="Ajouter cette image"
                                 icon="pi pi-plus"
                                 styleClass="reference-btn-add reference-image-url-btn"
                                 actionListener="#{entityUpdateBean.addImageFromUrl()}"
                                 process="@form"
                                 ajax="true"
                                 update=":contentPanels :growl"/>
            </div>
        </div>

        <!-- Liste des images -->
        <p:dataTable value="#{entityUpdateBean.editingImageUrls}"
                     var="imgUrl"
                     rowIndexVar="idx"
                     styleClass="candidat-labels-table candidats-mt-10"
                     emptyMessage="Aucune image"
                     rendered="#{not empty entityUpdateBean.editingImageUrls}">
            <p:column headerText="Aperçu" styleClass="candidat-table-label-column" width="80">
                <div class="candidat-table-label-cell modifier-image-preview-cell"
                     data-image-url="#{imgUrl}"
                     onclick="var u=this.getAttribute('data-image-url');if(u&amp;&amp;typeof showFullscreenImage==='function'){showFullscreenImage(u);}return false;"
                     role="button"
                     title="Cliquer pour afficher en plein écran">
                    <p:graphicImage value="#{imgUrl}"
                                   alt="Aperçu"
                                   style="max-width: 48px; max-height: 36px; object-fit: contain;"/>
                </div>
            </p:column>
            <p:column headerText="URL" styleClass="candidat-table-label-column candidats-table-label-padding">
                <div class="candidat-table-label-cell">
                    <h:outputText value="#{imgUrl}" styleClass="candidat-table-label-text"/>
                </div>
            </p:column>
            <p:column styleClass="candidat-table-action-column">
                <div class="candidat-table-action-cell">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     action="#{entityUpdateBean.removeImageByUrl(imgUrl)}"
                                     process="@this"
                                     ajax="true"
                                     update=":contentPanels :growl"
                                     title="Supprimer cette image"/>
                </div>
            </p:column>
        </p:dataTable>

        <ui:fragment rendered="#{empty entityUpdateBean.editingImageUrls}">
            <div class="candidat-no-labels candidats-mt-10">
                <div class="candidat-no-labels-content">
                    <div class="candidat-no-labels-icon"><i class="pi pi-images" /></div>
                    <div class="candidat-no-labels-text">
                        <h4 class="candidat-no-labels-title">Aucune image</h4>
                        <p class="candidat-no-labels-message">Ajoutez des images depuis votre ordinateur ou collez une adresse web ci-dessus.</p>
                    </div>
                </div>
            </div>
        </ui:fragment>
    </h:panelGroup>

    <style>
        .modifier-image-sources {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            background: #fff;
            border: 1px solid rgba(71, 98, 77, 0.15);
            border-radius: 8px;
        }
        .modifier-image-deferred-hint {
            font-size: 0.9rem;
            color: #555;
            margin: 0 0 0.75rem 0;
        }
        .modifier-image-simple {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .modifier-image-add-block {
            padding: 1.25rem;
            background: #f8faf8;
            border: 2px dashed rgba(71, 98, 77, 0.35);
            border-radius: 10px;
        }
        .modifier-image-add-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin: 0 0 1rem 0;
        }
        .modifier-slot-add-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 140px;
            padding: 1.5rem;
            background: #fff;
            border: 2px dashed rgba(71, 98, 77, 0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .modifier-slot-add-zone:hover {
            border-color: var(--color-action-main, #47624D);
            background: rgba(71, 98, 77, 0.04);
        }
        .modifier-slot-file-input {
            position: absolute !important;
            width: 0.1px !important;
            height: 0.1px !important;
            opacity: 0 !important;
            overflow: hidden !important;
            z-index: -1 !important;
        }
        .modifier-add-icon {
            font-size: 2rem;
            color: var(--color-action-main, #47624D);
        }
        .modifier-add-main {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        .modifier-add-sub {
            font-size: 0.9rem;
            color: #666;
        }
        .modifier-add-formats {
            font-size: 0.8rem;
            color: #888;
        }
        .modifier-image-preview-cell {
            cursor: pointer;
        }
        .modifier-image-preview-cell:hover {
            opacity: 0.85;
        }
        .modifier-pending-preview {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(71, 98, 77, 0.08);
            border: 1px dashed rgba(71, 98, 77, 0.3);
            border-radius: 8px;
        }
        .modifier-pending-preview-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .modifier-pending-thumb {
            width: 64px;
            height: 48px;
            object-fit: contain;
            border-radius: 4px;
            background: #fff;
        }
        .modifier-pending-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .modifier-pending-filename {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        .modifier-pending-hint {
            font-size: 0.85rem;
            color: #666;
        }
        .modifier-pending-clear {
            align-self: flex-start;
            padding: 0.25rem 0.5rem;
            background: transparent;
            border: 1px solid rgba(71, 98, 77, 0.3);
            border-radius: 4px;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
        }
        .modifier-pending-clear:hover {
            background: rgba(71, 98, 77, 0.1);
            color: var(--color-action-main, #47624D);
        }
    </style>
    <script>
    (function() {
        window.ModifierImage = {
            onFileSelected: function(input) {
                var file = input &amp;&amp; input.files &amp;&amp; input.files[0];
                var preview = document.querySelector('.modifier-pending-file-preview');
                var thumb = preview &amp;&amp; preview.querySelector('.modifier-pending-thumb');
                var filename = preview &amp;&amp; preview.querySelector('.modifier-pending-filename');
                if (!preview || !thumb || !filename) return; 
                if (!file) {
                    preview.style.display = 'none';
                    return;
                }
                filename.textContent = file.name;
                if (file.type &amp;&amp; file.type.indexOf('image') === 0) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        thumb.src = e.target.result;
                        thumb.style.display = '';
                    };
                    reader.readAsDataURL(file);
                } else {
                    thumb.style.display = 'none';
                }
                preview.style.display = 'block';
            },
            clearPending: function() {
                var input = document.querySelector('.modifier-pending-file-input');
                var preview = document.querySelector('.modifier-pending-file-preview');
                if (input) input.value = '';
                if (preview) preview.style.display = 'none';
            }
        };
    })();
    </script>
</ui:composition>
