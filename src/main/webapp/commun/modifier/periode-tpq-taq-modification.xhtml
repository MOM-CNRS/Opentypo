<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Période, TPQ et TAQ -->
    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">

        <h:panelGroup class="users-form-group users-form-group-full" id="periode"
                      rendered="#{applicationBean.selectedEntity.entityType.id != 6}">
            <div class="periode-header-row">
                <p:outputLabel value="Période" />
            </div>
            <div class="periode-field-row periode-autocomplete-row">
                <div id="periodeAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper">
                    <i class="pi pi-calendar input-icon periode-autocomplete-icon" />
                    <p:autoComplete id="periodeAutocomplete"
                                    value="#{entityUpdateBean.periodeAutocompleteSelection}"
                                    completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                    converter="pactolsConceptConverter"
                                    var="concept"
                                    itemLabel="#{concept.selectedTerm}"
                                    itemValue="#{concept}"
                                    dropdown="false"
                                    minQueryLength="2"
                                    appendTo="#periodeAutocompleteWrapper"
                                    my="left top"
                                    at="left bottom"
                                    panelStyleClass="periode-autocomplete-panel"
                                    scrollHeight="280"
                                    emptyMessage="Aucun résultat. Vous pouvez saisir une valeur manuellement."
                                    placeholder="Ex. Antiquité, Moyen Âge..."
                                    styleClass="users-input periode-autocomplete-input"
                                    forceSelection="false"/>
                </div>
            </div>
        </h:panelGroup>

        <!-- TPQ et TAQ sur la même ligne -->
        <h:panelGroup class="users-form-group users-form-group-full candidats-mt-15"
                      rendered="#{applicationBean.selectedEntity.entityType.id != 6 and applicationBean.selectedEntity.entityType.id != 1}">
            <div class="users-form-grid">
                <div class="users-form-group">
                    <div class="periode-header-row">
                        <p:outputLabel for="groupTpq" value="TPQ (Terminus Post Quem)" />
                    </div>
                    <div class="periode-field-row">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-calendar-plus input-icon" />
                            <p:inputNumber id="groupTpq"
                                           value="#{entityUpdateBean.tpq}"
                                           styleClass="users-input"
                                           placeholder="Ex: 1500"
                                           minValue="-9999"
                                           maxValue="9999"
                                           decimalPlaces="0"/>
                        </div>
                    </div>
                    <p:message for="groupTpq" display="icon"/>
                </div>

                <div class="users-form-group">
                    <div class="periode-header-row">
                        <p:outputLabel for="groupTaq" value="TAQ (Terminus Ante Quem)" />
                    </div>
                    <div class="periode-field-row">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-calendar-plus input-icon" />
                            <p:inputNumber id="groupTaq"
                                           value="#{entityUpdateBean.taq}"
                                           styleClass="users-input"
                                           placeholder="Ex: 1500"
                                           minValue="-9999"
                                           maxValue="9999"
                                           decimalPlaces="0"/>
                        </div>
                    </div>
                </div>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{!applicationBean.isInstrumentumTypo() and applicationBean.selectedEntity.entityType.id != 1
                and applicationBean.selectedEntity.entityType.id != 5 and applicationBean.selectedEntity.entityType.id != 6}">
            <div class="users-form-group users-form-group-full candidats-mt-15" id="corpusExterneGroup">
                <p:outputLabel value="Corpus externe" />
                <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                        <i class="pi pi-cog input-icon" />
                        <p:inputText value="#{entityUpdateBean.corpusExterne}"
                                     styleClass="users-input"
                                     placeholder="Ex. Corpus externe..."
                                     rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
                    </div>
                </div>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{applicationBean.isInstrumentumTypo() and applicationBean.selectedEntity.entityType.id != 1
                    and applicationBean.selectedEntity.entityType.id != 5 and applicationBean.selectedEntity.entityType.id != 6}">
            <div class="users-form-group users-form-group-full candidats-mt-15" id="alignementExterneGroup">
                <p:outputLabel value="Alignement externe" />
                <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                        <i class="pi pi-link input-icon" />
                        <p:inputText value="#{entityUpdateBean.alignementExterne}"
                                     styleClass="users-input"
                                     placeholder="Ex. URL d'alignement externe..."
                                     rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
                    </div>
                </div>
            </div>
        </h:panelGroup>
    </div>
</ui:composition>
