<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Période, TPQ et TAQ -->
    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">

        <b><p:outputLabel value="#{msg['modifier.dating.section.title']}" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <h:panelGroup class="users-form-group users-form-group-full" id="periode"
                      rendered="#{applicationBean.selectedEntity.entityType.id != 6}">
            <div class="periode-header-row">
                <p:outputLabel value="#{msg['modifier.field.period']}" for="periodeAutocomplete"/>
            </div>
            <p:outputPanel id="modifierPeriodesPanel" layout="block"
                           styleClass="modifier-periode-editor modifier-autocomplete-multi-editor">
                <div class="d-flex gap-2 align-items-stretch flex-wrap modifier-aires-toolbar">
                    <div id="periodeAutocompleteWrapper"
                         class="flex-grow-1 min-w-0 candidat-aires-wrapper input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-calendar input-icon periode-autocomplete-icon" aria-hidden="true"/>
                        <p:autoComplete id="periodeAutocomplete"
                                        widgetVar="modifierPeriodeAC"
                                        value="#{entityUpdateBean.periodeAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="0"
                                        queryDelay="350"
                                        appendTo="#periodeAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="#{msg['modifier.autocomplete.empty.enterOnly']}"
                                        placeholder="#{msg['modifier.placeholder.period.enter']}"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false">
                            <p:ajax event="itemSelect"
                                    listener="#{entityUpdateBean.addPeriodeFromAutocomplete}"
                                    process="modifierPeriodesPanel"
                                    update="modifierPeriodesPanel :growl"/>
                        </p:autoComplete>
                    </div>
                </div>
                <p:remoteCommand name="modifierAddPeriodeCmd"
                                 actionListener="#{entityUpdateBean.addPeriodeFromAutocomplete}"
                                 process="modifierPeriodesPanel"
                                 update="modifierPeriodesPanel :growl"/>
                <div class="candidat-aires-circulation-chips mt-2">
                    <ui:repeat value="#{entityUpdateBean.periodes}" var="per" id="periodesRepeat">
                        <span class="candidat-aire-chip">
                            <span class="candidat-aire-chip-label">#{per.valeur}</span>
                            <p:commandButton icon="pi pi-times"
                                             styleClass="candidat-aire-chip-delete"
                                             action="#{entityUpdateBean.deletePeriode(per.valeur)}"
                                             process="@this"
                                             ajax="true"
                                             update="@form :growl"/>
                        </span>
                    </ui:repeat>
                </div>
            </p:outputPanel>
        </h:panelGroup>

        <!-- TPQ et TAQ sur la même ligne -->
        <h:panelGroup class="users-form-group users-form-group-full candidats-mt-15"
                      rendered="#{applicationBean.selectedEntity.entityType.id != 6 and applicationBean.selectedEntity.entityType.id != 1}">
            <div class="users-form-grid">
                <div class="users-form-group">
                    <div class="periode-header-row">
                        <p:outputLabel for="groupTpq" value="#{msg['modifier.field.tpq']}" />
                    </div>
                    <div class="periode-field-row">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-calendar-plus input-icon" />
                            <p:inputNumber id="groupTpq"
                                           value="#{entityUpdateBean.tpq}"
                                           styleClass="users-input"
                                           placeholder="#{msg['modifier.placeholder.yearExample']}"
                                           minValue="-9999"
                                           maxValue="9999"
                                           decimalPlaces="0"/>
                        </div>
                    </div>
                    <p:message for="groupTpq" display="icon"/>
                </div>

                <div class="users-form-group">
                    <div class="periode-header-row">
                        <p:outputLabel for="groupTaq" value="#{msg['modifier.field.taq']}" />
                    </div>
                    <div class="periode-field-row">
                        <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                            <i class="pi pi-calendar-plus input-icon" />
                            <p:inputNumber id="groupTaq"
                                           value="#{entityUpdateBean.taq}"
                                           styleClass="users-input"
                                           placeholder="#{msg['modifier.placeholder.yearExample']}"
                                           minValue="-9999"
                                           maxValue="9999"
                                           decimalPlaces="0"/>
                        </div>
                    </div>
                </div>
            </div>
        </h:panelGroup>

        <!-- Appellation usuelle -->
        <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 5}" class="candidats-mt-15">
            <p:outputLabel value="#{msg['modifier.field.datingComment']}" style="margin-bottom: 13px !important" />
            <div class="periode-field-row candidat-production-wrapper candidat-production-group candidats-mt--10">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-cog input-icon" />
                    <p:inputText value="#{entityUpdateBean.commentaireDatation}"
                                 styleClass="users-input"
                                 placeholder="#{msg['modifier.placeholder.datingComment']}"/>
                </div>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{!applicationBean.isInstrumentumTypo() and applicationBean.selectedEntity.entityType.id != 1
                and applicationBean.selectedEntity.entityType.id != 5 and applicationBean.selectedEntity.entityType.id != 6}">
            <div class="users-form-group users-form-group-full candidats-mt-15" id="corpusExterneGroup">
                <p:outputLabel value="#{msg['modifier.field.externalCorpus']}" />
                <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                        <i class="pi pi-cog input-icon" />
                        <p:inputText value="#{entityUpdateBean.corpusExterne}"
                                     styleClass="users-input"
                                     placeholder="#{msg['modifier.placeholder.externalCorpus']}"
                                     rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
                    </div>
                </div>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{applicationBean.isInstrumentumTypo() and applicationBean.selectedEntity.entityType.id != 1
                    and applicationBean.selectedEntity.entityType.id != 5 and applicationBean.selectedEntity.entityType.id != 6}">
            <div class="users-form-group users-form-group-full candidats-mt-15" id="alignementExterneGroup">
                <p:outputLabel value="#{msg['modifier.field.alignementExterne']}" />
                <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                        <i class="pi pi-link input-icon" />
                        <p:inputText value="#{entityUpdateBean.alignementExterne}"
                                     styleClass="users-input"
                                     placeholder="#{msg['modifier.placeholder.alignmentUrl']}"
                                     rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
                    </div>
                </div>
            </div>
        </h:panelGroup>
    </div>
</ui:composition>
