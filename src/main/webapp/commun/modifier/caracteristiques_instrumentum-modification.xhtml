<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <!-- Matériau -->
    <h:panelGroup styleClass="users-form-group users-form-group-full">
        <div class="periode-header-row">
            <p:outputLabel value="#{msg['modifier.instrumentum.materials']}" />
        </div>
        <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                <i class="pi pi-arrows-h input-icon periode-autocomplete-icon" />
                <p:autoComplete value="#{entityUpdateBean.materiauxAutocompleteSelection}"
                                completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                converter="pactolsConceptConverter"
                                var="concept"
                                itemLabel="#{concept.selectedTerm}"
                                itemValue="#{concept}"
                                dropdown="false"
                                minQueryLength="2"
                                appendTo="#materiauxAutocompleteWrapper"
                                my="left top"
                                at="left bottom"
                                panelStyleClass="periode-autocomplete-panel"
                                scrollHeight="280"
                                emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('MATERIAUX')}"
                                placeholder="#{msg['modifier.placeholder.goldSilver']}"
                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"/>
            </div>
        </div>
    </h:panelGroup>

    <!-- Dénomination -->
    <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">

                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"
                                rendered="#{entityUpdateBean.canEditCurrentBrouillon()}"/>
            </div>
        </div>
    </h:panelGroup>
