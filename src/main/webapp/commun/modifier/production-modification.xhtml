<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <!-- PRODUCTION -->
    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">

        <b><p:outputLabel value="Production et circulation" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <!-- Aire(s) de production : même mode que « Aire de circulation » (multi + Entrée une fois) -->
        <div class="users-form-group users-form-group-full" id="productionGroup">
            <div class="periode-header-row">
                <p:outputLabel value="Aire(s) de production" for="productionAutocomplete"/>
            </div>
            <p:outputPanel id="modifierProductionPanel" layout="block"
                           styleClass="modifier-production-editor modifier-autocomplete-multi-editor">
                <div class="d-flex gap-2 align-items-stretch flex-wrap modifier-aires-toolbar">
                    <div id="productionAutocompleteWrapper"
                         class="flex-grow-1 min-w-0 candidat-aires-wrapper input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-cog input-icon periode-autocomplete-icon" aria-hidden="true"/>
                        <p:autoComplete id="productionAutocomplete"
                                        widgetVar="modifierProductionAC"
                                        value="#{entityUpdateBean.productionAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="0"
                                        queryDelay="350"
                                        appendTo="#productionAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="Pas de correspondance OpenTheso : validez avec Entrée pour ajouter votre texte tel quel."
                                        placeholder="Ex. Céramique, Verre… puis Entrée"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false">
                            <p:ajax event="itemSelect"
                                    listener="#{entityUpdateBean.addProductionFromAutocomplete}"
                                    process="modifierProductionPanel"
                                    update="modifierProductionPanel :growl"/>
                        </p:autoComplete>
                    </div>
                </div>
                <p:remoteCommand name="modifierAddProductionCmd"
                                 actionListener="#{entityUpdateBean.addProductionFromAutocomplete}"
                                 process="modifierProductionPanel"
                                 update="modifierProductionPanel :growl"/>
                <div class="candidat-aires-circulation-chips mt-2">
                    <ui:repeat value="#{entityUpdateBean.productions}" var="prod" id="productionsRepeat">
                        <span class="candidat-aire-chip">
                            <span class="candidat-aire-chip-label">#{prod.valeur}</span>
                            <p:commandButton icon="pi pi-times"
                                             styleClass="candidat-aire-chip-delete"
                                             action="#{entityUpdateBean.deleteProduction(prod.valeur)}"
                                             process="@this"
                                             ajax="true"
                                             update="@form :growl"/>
                        </span>
                    </ui:repeat>
                </div>
            </p:outputPanel>
        </div>

        <!-- Atelier(s) (Saisie libre avec tags) -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel value="Atelier(s)" />
            </div>
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-wrench input-icon" />
                <p:chips value="#{entityUpdateBean.ateliers}"
                         styleClass="users-chips"
                         placeholder="Saisissez un atelier, Entrée ou séparez par point-virgule (;)..."
                         maxlength="500"
                         addOnBlur="true"
                         addOnPaste="true"
                         separator=";">
                    <p:ajax event="itemSelect" listener="#{entityUpdateBean.saveAteliers}" process="@this" update="@none"/>
                    <p:ajax event="itemUnselect" listener="#{entityUpdateBean.saveAteliers}" process="@this" update="@none"/>
                    <p:ajax event="change" listener="#{entityUpdateBean.saveAteliers}" process="@this" update="@none"/>
                </p:chips>
            </div>
        </div>

        <!-- Aire de circulation : OpenTheso ou texte libre ; Entrée ou bouton + pour ajouter -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel value="Aire de circulation" for="aireCirculationInput"/>
            </div>
            <p:outputPanel id="modifierAiresCirculationPanel" layout="block"
                           styleClass="modifier-aires-circulation-editor modifier-autocomplete-multi-editor">
                <div class="d-flex gap-2 align-items-stretch flex-wrap modifier-aires-toolbar">
                    <div id="aireAutocompleteWrapper"
                         class="flex-grow-1 min-w-0 candidat-aires-wrapper input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                        <i class="pi pi-map-marker input-icon periode-autocomplete-icon candidat-aires-icon" />
                        <p:autoComplete id="aireCirculationInput"
                                        widgetVar="modifierAireCirculationAC"
                                        value="#{entityUpdateBean.aireCirculationAutocompleteSelection}"
                                        completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                        converter="pactolsConceptConverter"
                                        var="concept"
                                        itemLabel="#{concept.selectedTerm}"
                                        itemValue="#{concept}"
                                        dropdown="false"
                                        minQueryLength="0"
                                        queryDelay="350"
                                        appendTo="#aireAutocompleteWrapper"
                                        my="left top"
                                        at="left bottom"
                                        panelStyleClass="periode-autocomplete-panel"
                                        scrollHeight="280"
                                        emptyMessage="Pas de correspondance OpenTheso : validez avec Entrée ou + pour ajouter votre texte tel quel."
                                        placeholder="Ex. Gaule, Italie… puis Entrée ou +"
                                        styleClass="users-input periode-autocomplete-input"
                                        forceSelection="false">
                            <p:ajax event="itemSelect"
                                    listener="#{entityUpdateBean.addAireCirculationFromAutocomplete}"
                                    process="modifierAiresCirculationPanel"
                                    update="modifierAiresCirculationPanel :growl"/>
                        </p:autoComplete>
                    </div>
                </div>
                <p:remoteCommand name="modifierAddAireCirculationCmd"
                                 actionListener="#{entityUpdateBean.addAireCirculationFromAutocomplete}"
                                 process="modifierAiresCirculationPanel"
                                 update="modifierAiresCirculationPanel :growl"/>
                <div class="candidat-aires-circulation-chips mt-2">
                    <ui:repeat value="#{entityUpdateBean.airesCirculation}" var="aire" id="airesRepeat">
                        <span class="candidat-aire-chip">
                            <span class="candidat-aire-chip-label">#{aire.valeur}</span>
                            <p:commandButton icon="pi pi-times"
                                             styleClass="candidat-aire-chip-delete"
                                             action="#{entityUpdateBean.deleteAireCirculation(aire.valeur)}"
                                             process="@this"
                                             ajax="true"
                                             update="@form :growl"/>
                        </span>
                    </ui:repeat>
                </div>
            </p:outputPanel>
        </div>
    </div>
    <style type="text/css">
        .modifier-aires-circulation-editor .modifier-aire-add-btn { min-width: 2.75rem; flex-shrink: 0; }
        .modifier-aires-toolbar .min-w-0 { min-width: 0; }
    </style>
</ui:composition>
