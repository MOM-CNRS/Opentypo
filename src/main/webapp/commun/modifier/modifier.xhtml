<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:panelGroup id="groupeModifierForm" layout="block">
        <div class="wizard-content candidats-p-20">
            <h:panelGroup rendered="#{openThesoDialogBean.isOpenThesoParametrageMissing()}" layout="block" styleClass="periode-parametrage-info-banner">
                <i class="pi pi-info-circle periode-parametrage-info-icon" />
                <div class="periode-parametrage-info-content">
                    <strong>Connexion OpenTheso non paramétrée</strong>
                    <p>Le gestionnaire doit configurer OpenTheso pour ce groupe.</p>
                </div>
            </h:panelGroup>

            <ui:include src="identification-modification.xhtml"/>

            <!-- Images : ajouter, modifier, supprimer -->
            <h:panelGroup layout="block" class="periode-group candidats-mt-20"
                          rendered="#{applicationBean.selectedEntity.entityType.code == 'REFERENTIEL' or applicationBean.selectedEntity.entityType.code == 'TYPE'}">
                <ui:include src="image-modification.xhtml"/>
            </h:panelGroup>

            <h:panelGroup layout="block" rendered="#{applicationBean.selectedEntity.entityType.id != 2}">
                <ui:include src="periode-tpq-taq-modification.xhtml"/>
            </h:panelGroup>

            <!-- Référence bibliographique -->
            <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 1}"
                          class="users-form-group users-form-group-full periode-group candidats-mt-20 reference-modifier-bibliographie-group">
                <p:outputLabel value="Référence bibliographique" style="margin-bottom: 13px !important" />
                <div class="reference-modifier-bibliographie-wrapper">
                    <p:chips value="#{entityUpdateBean.referenceBibliographiqueList}"
                             styleClass="reference-modifier-bibliographie-chips"
                             placeholder="Ajouter une référence (ex: Auteur, Titre, Éditeur, année)"
                             separator=";"/>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id != 6 and applicationBean.selectedEntity.entityType.id != 1
                                            and applicationBean.selectedEntity.entityType.id != 2}">

                <ui:include src="production-modification.xhtml"/>

                <ui:include src="attestations-modification.xhtml"/>

                <ui:include src="description-modification.xhtml"/>

                <ui:include src="caracteristiques_physique-modification.xhtml"/>

                <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 5}">
                    <ui:include src="relations-modification.xhtml"/>
                    <!--<ui:include src="details_type-modification.xhtml"/>-->
                </h:panelGroup>

                <!-- Section Permissions -->
                <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 3}">
                    <ui:include src="habilitations-modification.xhtml"/>
                </h:panelGroup>
            </h:panelGroup>

            <ui:include src="bibliographie-modification.xhtml"/>

            <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 1}">
                <!-- Gestionnaires du référentiel -->
                <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
                    <p:outputLabel value="Gestionnaires du référentiel" style="margin-bottom: 13px !important" />
                    <p:pickList value="#{referenceBean.editingGestionnairesPickList}"
                                var="userId"
                                itemLabel="#{referenceBean.getUtilisateurDisplayName(userId)}"
                                itemValue="#{userId}"
                                converter="pickListLongConverter"
                                styleClass="group-dialog-picklist"
                                showSourceFilter="true"
                                showTargetFilter="true"
                                filterMatchMode="contains"
                                sourceFilterPlaceholder="Rechercher..."
                                targetFilterPlaceholder="Rechercher..."
                                responsive="true"
                                rendered="#{not empty referenceBean.gestionnairesList}"/>
                    <h:panelGroup rendered="#{empty referenceBean.gestionnairesList}" class="group-dialog-no-relecteurs">
                        <span>Aucun utilisateur disponible</span>
                    </h:panelGroup>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{applicationBean.selectedEntity.entityType.id == 6}">
                <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
                    <p:outputLabel value="Gestionnaires de la typologie" style="margin-bottom: 13px !important" />
                    <p:pickList value="#{collectionBean.editingGestionnairesPickList}"
                                var="userId"
                                itemLabel="#{collectionBean.getUtilisateurDisplayName(userId)}"
                                itemValue="#{userId}"
                                converter="pickListLongConverter"
                                styleClass="group-dialog-picklist"
                                showSourceFilter="true"
                                showTargetFilter="true"
                                filterMatchMode="contains"
                                sourceFilterPlaceholder="Rechercher..."
                                targetFilterPlaceholder="Rechercher..."
                                responsive="true"
                                rendered="#{not empty collectionBean.gestionnairesList}"/>
                    <h:panelGroup rendered="#{empty collectionBean.gestionnairesList}" class="group-dialog-no-relecteurs">
                        <span>Aucun utilisateur disponible</span>
                    </h:panelGroup>
                </div>
            </h:panelGroup>
        </div>

        <!-- RemoteCommands pour déclencher les actions après l'animation de glissement -->
        <p:remoteCommand name="modifierCancelCommand"
                        action="#{entityUpdateBean.cancelEditingGroupe()}"
                        process="@this"
                        update=":contentPanels :leftTreePanel :searchSectionWrapper :growl"
                        oncomplete="window.scrollTo({ top: 0, behavior: 'smooth' });"
                        immediate="true"/>
        <p:remoteCommand name="modifierPrepareSaveCommand"
                        action="#{confirmSaveBean.prepareSaveForSelectedEntity()}"
                        process="@form"
                        update=":growl"
                        oncomplete="PF('confirmSaveDialog').show();"/>

        <div class="modifier-actions-wrapper modifier-actions-sticky candidats-mt-20" id="modifierActionsWrapper">
            <div class="collection-edit-actions collection-modifier-actions modifier-actions-sticky" id="modifierActionsBar">
                <button type="button"
                        class="collection-modifier-btn collection-modifier-btn-back"
                        onclick="modifierActionsSlideOut('retour')">
                    <i class="pi pi-arrow-left modifier-btn-icon" />
                    <span>Retour</span>
                </button>
                <button type="button"
                        class="collection-modifier-btn collection-modifier-btn-save"
                        onclick="modifierActionsSlideOut('enregistrer')">
                    <i class="pi pi-check modifier-btn-icon" />
                    <span>Enregistrer</span>
                </button>
            </div>
        </div>
    </h:panelGroup>

    <h:outputStylesheet library="css" name="candidats/candidats-forms-common.css"/>
    <h:outputStylesheet library="css" name="candidats/candidats-group-form.css"/>
    <h:outputStylesheet library="css" name="candidats/candidats-category-form.css"/>
    <h:outputStylesheet library="css" name="collection.css"/>
    <h:outputScript library="js" name="modifier-actions.js"/>
    <ui:include src="../../candidats/dialogs/confirmDeleteReferenceDialog.xhtml"/>
    <ui:include src="../../candidats/dialogs/confirmValidateurInvitationDialog.xhtml"/>

    <style>
        .wizard-content .users-form-group > label, .wizard-content .users-form-group .ui-outputlabel {
            font-size: 0.85rem !important;
        }
        body .ui-button.ui-button-icon-only .ui-icon {
            top: 25%;
            left: 20%;
        }
    </style>

    <script type="text/javascript">
        //<![CDATA[
        /** Saisie libre OpenTheso : copier la valeur visible vers le champ caché avant l’AJAX. */
        window.modifierSyncAutocompleteFreeTextBeforeAjax = function (widgetVar) {
            var w = PF(widgetVar);
            if (!w || !w.input || !w.input.length || !w.hinput) return;
            var vis = (w.input.val() || '').trim();
            if (!vis) return;
            var $h = $(w.hinput);
            var h = ($h.val() || '').trim();
            if (h.indexOf('|||') === -1) {
                $h.val(vis);
            }
        };
        /**
         * PrimeFaces AutoComplete : panneau ouvert sans sélection → Entrée ne fait que fermer.
         * Capture : un seul Entrée pour valider la saisie libre (période, production, circulation).
         */
        (function () {
            if (window.__modifierAutocompleteMultiEnterBound) return;
            window.__modifierAutocompleteMultiEnterBound = true;
            document.addEventListener('keydown', function modifierAutocompleteMultiEnterCapture(e) {
                if (e.key !== 'Enter' && e.which !== 13) return;
                var el = e.target;
                if (!el || !el.classList || !el.classList.contains('ui-autocomplete-input')) return;
                var editor = el.closest('.modifier-autocomplete-multi-editor');
                if (!editor) return;

                var widgetVar = el.closest('.modifier-periode-editor') ? 'modifierPeriodeAC'
                        : el.closest('.modifier-production-editor') ? 'modifierProductionAC'
                        : el.closest('.modifier-aires-circulation-editor') ? 'modifierAireCirculationAC'
                        : el.closest('.modifier-fonction-usage-editor') ? 'modifierFonctionUsageAC'
                        : el.closest('.modifier-fabrication-faconnage-editor') ? 'modifierFabricationFaconnageAC'
                        : el.closest('.modifier-couleur-pate-editor') ? 'modifierCouleurPateAC'
                        : el.closest('.modifier-nature-pate-editor') ? 'modifierNaturePateAC'
                        : el.closest('.modifier-inclusions-pate-editor') ? 'modifierInclusionsPateAC'
                        : el.closest('.modifier-cuisson-post-cuisson-editor') ? 'modifierCuissonPostCuissonAC' : null;
                if (!widgetVar) return;

                var w = PF(widgetVar);
                if (!w || !w.panel || !w.panel.length) return;

                var panelVisible = w.panel.is(':visible');
                var $items = w.items && w.items.length ? w.items : w.panel.find('.ui-autocomplete-item');
                var hasItems = $items.length > 0;
                var highlighted = hasItems ? $items.filter('.ui-state-highlight') : $();

                if (panelVisible && highlighted.length > 0) {
                    return;
                }
                if (panelVisible && hasItems && highlighted.length === 0) {
                    return;
                }

                e.preventDefault();
                e.stopImmediatePropagation();
                e.stopPropagation();

                modifierSyncAutocompleteFreeTextBeforeAjax(widgetVar);
                if (panelVisible && typeof w.hide === 'function') {
                    w.hide();
                }
                if (widgetVar === 'modifierPeriodeAC' && typeof modifierAddPeriodeCmd === 'function') {
                    modifierAddPeriodeCmd();
                } else if (widgetVar === 'modifierProductionAC' && typeof modifierAddProductionCmd === 'function') {
                    modifierAddProductionCmd();
                } else if (widgetVar === 'modifierAireCirculationAC' && typeof modifierAddAireCirculationCmd === 'function') {
                    modifierAddAireCirculationCmd();
                } else if (widgetVar === 'modifierFonctionUsageAC' && typeof modifierAddFonctionUsageCmd === 'function') {
                    modifierAddFonctionUsageCmd();
                } else if (widgetVar === 'modifierFabricationFaconnageAC' && typeof modifierAddFabricationFaconnageCmd === 'function') {
                    modifierAddFabricationFaconnageCmd();
                } else if (widgetVar === 'modifierCouleurPateAC' && typeof modifierAddCouleurPateCmd === 'function') {
                    modifierAddCouleurPateCmd();
                } else if (widgetVar === 'modifierNaturePateAC' && typeof modifierAddNaturePateCmd === 'function') {
                    modifierAddNaturePateCmd();
                } else if (widgetVar === 'modifierInclusionsPateAC' && typeof modifierAddInclusionsPateCmd === 'function') {
                    modifierAddInclusionsPateCmd();
                } else if (widgetVar === 'modifierCuissonPostCuissonAC' && typeof modifierAddCuissonPostCuissonCmd === 'function') {
                    modifierAddCuissonPostCuissonCmd();
                }
            }, true);
        })();
        //]]>
    </script>
</ui:composition>
