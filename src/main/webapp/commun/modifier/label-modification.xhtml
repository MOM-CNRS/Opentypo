<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <div class="#{applicationBean.selectedEntity.entityType.id != 6 ? 'users-form-group users-form-group-full periode-group candidats-mt-20' : 'users-form-group users-form-group-full periode-group'}">
        <div class="periode-header-row">
            <p:outputLabel value="Nom complet/entier [et ses traductions]" />
        </div>
        <div class="candidat-definition-editor-row">
            <div class="candidat-definition-editor-inner">
                <div class="candidat-definition-editor-header">
                    <i class="pi pi-tag candidat-definition-editor-icon" />
                    <span class="candidat-definition-editor-label">Saisissez la traduction du nom</span>
                </div>
                <p:textEditor value="#{entityUpdateBean.newLabelValue}"
                              placeholder="Saisissez la traduction du nom..."
                              secure="false"
                              height="30"
                              styleClass="candidat-definition-texteditor">
                    <f:facet name="toolbar">
                         <span class="ql-formats">
                            <button class="ql-bold"/>
                            <button class="ql-italic"/>
                            <button class="ql-underline"/>
                            <button class="ql-strike"/>
                        </span>
                        <span class="ql-formats">
                            <select class="ql-font"/>
                            <select class="ql-size"/>
                        </span>
                    </f:facet>
                </p:textEditor>
            </div>
        </div>
        <h:panelGroup layout="block" styleClass="candidat-label-input-row">
            <div class="candidat-label-select-wrapper">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-globe input-icon" />
                    <p:selectOneMenu value="#{entityUpdateBean.newLabelLangueCode}"
                                     styleClass="users-select">
                        <f:selectItem itemLabel="Sélectionner une langue" itemValue="" />
                        <f:selectItems value="#{entityUpdateBean.availableTmpLanguagesForLabel}"
                                       var="langue"
                                       itemLabel="#{langue.nom}"
                                       itemValue="#{langue.code}" />
                    </p:selectOneMenu>
                </div>
            </div>
            <p:commandButton value="Ajouter"
                             icon="pi pi-plus"
                             styleClass="candidat-btn-add"
                             actionListener="#{entityUpdateBean.addTempLabel()}"
                             process="@form"
                             ajax="true"
                             update=":centerContent :growl"/>
        </h:panelGroup>

        <p:dataTable value="#{entityUpdateBean.noms}"
                     var="labelItem"
                     styleClass="candidat-labels-table candidats-mt-10"
                     emptyMessage="Aucune traduction ajoutée"
                     rendered="#{not empty entityUpdateBean.noms}">
            <p:column headerText="Labels" styleClass="candidat-table-label-column candidats-table-label-padding">
                <div class="candidat-table-label-cell">
                    <h:panelGroup rendered="#{labelItem.langueCode != null}">
                        <h:graphicImage library="img" name="flag/#{labelItem.langueCode}.png"
                                        styleClass="candidat-table-flag" alt="#{labelItem.langue.nom}" title="#{labelItem.langue.nom}"/>
                    </h:panelGroup>
                    <h:outputText value="#{labelItem.nom}" styleClass="candidat-table-label-text" />
                </div>
            </p:column>
            <p:column styleClass="candidat-table-action-column">
                <div class="candidat-table-action-cell">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     action="#{entityUpdateBean.removeTempLabel(labelItem)}"
                                     process="@form"
                                     ajax="true"
                                     update=":centerContent :growl"
                                     title="Supprimer cette traduction"/>
                </div>
            </p:column>
        </p:dataTable>

        <ui:fragment rendered="#{empty entityUpdateBean.noms}">
            <div class="candidat-no-labels">
                <div class="candidat-no-labels-content">
                    <div class="candidat-no-labels-icon"><i class="pi pi-info-circle" /></div>
                    <div class="candidat-no-labels-text">
                        <h4 class="candidat-no-labels-title">Aucune traduction ajoutée</h4>
                        <p class="candidat-no-labels-message">Utilisez le formulaire ci-dessus pour ajouter une traduction de la définition dans une autre langue.</p>
                    </div>
                </div>
            </div>
        </ui:fragment>
    </div>
</ui:composition>
