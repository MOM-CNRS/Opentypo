<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <style>
        .corpus-lie-row {
            width: 100%;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }

        .corpus-lie-label-col {
            flex: 1 1 34%;
            min-width: 0;
            background: #fff;
            border: 1px solid #cfdac7;
            border-radius: 10px;
        }

        .corpus-lie-url-col {
            flex: 1 1 56%;
            min-width: 0;
            background: #fff;
            border: 1px solid #cfdac7;
            border-radius: 10px;
        }

        .corpus-lie-add-btn {
            height: 42px;
            white-space: nowrap;
            flex: 0 0 auto;
            min-width: 120px;
            border-radius: 10px !important;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(71, 98, 77, 0.2);
        }

        .corpus-lie-row .category-btn {
            align-self: stretch;
        }
    </style>

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
        <b><p:outputLabel value="Attestations et contextes" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <!-- Attestation(s)/Contexte(s) -->
        <div class="users-form-group users-form-group-full">
            <p:outputLabel value="Attestation(s)/Contexte(s)" />
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-check-circle input-icon" title="Attestations"/>
                <p:chips value="#{entityUpdateBean.attestations}"
                         styleClass="users-chips"
                         placeholder="Saisissez une attestation, Entrée ou séparez par point-virgule (;)..."
                         maxlength="500"
                         addOnBlur="true"
                         addOnPaste="true"
                         separator=";">
                    <p:ajax event="itemSelect" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                    <p:ajax event="itemUnselect" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                    <p:ajax event="change" listener="#{entityUpdateBean.saveAttestations}" process="@this" update="@none"/>
                </p:chips>
            </div>
        </div>

        <!-- Sites archéologiques -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Sites archéologiques" />
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-map-marker input-icon" title="Sites archéologiques"/>
                <p:chips value="#{entityUpdateBean.sitesArcheologiques}"
                         styleClass="users-chips"
                         placeholder="Saisissez un site, Entrée ou séparez par point-virgule (;)..."
                         maxlength="500"
                         addOnBlur="true"
                         addOnPaste="true"
                         separator=";">
                    <p:ajax event="itemSelect" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                    <p:ajax event="itemUnselect" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                    <p:ajax event="change" listener="#{entityUpdateBean.saveSitesArcheologiques}" process="@this" update="@none"/>
                </p:chips>
            </div>
        </div>

        <div class="users-form-group users-form-group-full candidats-mt-10">
            <p:outputLabel value="Corpus lié(s)" />
            <div class="users-form-group users-form-group-full periode-group" style="margin-top:6px; border:1px solid #cfdac7; border-radius:12px; padding:14px;;">
                <div class="candidats-flex-row candidats-gap-8 corpus-lie-row"
                     style="display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center; gap:8px; width:100%;">
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border corpus-lie-label-col"
                         style="flex:0 1 32%; min-width:0; box-shadow: inset 0 0 0 1px rgba(71, 98, 77, 0.06);">
                        <i class="pi pi-tag input-icon" title="Libellé"/>
                        <p:inputText id="corpusLieLabelInput"
                                     value="#{entityUpdateBean.corpusLieLabel}"
                                     styleClass="users-input"
                                     placeholder="Libellé du corpus"
                                     maxlength="200"/>
                    </div>
                    <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border corpus-lie-url-col"
                         style="flex:1 1 auto; min-width:0; box-shadow: inset 0 0 0 1px rgba(71, 98, 77, 0.06);">
                        <i class="pi pi-link input-icon" title="URL"/>
                        <p:inputText id="corpusLieUrlInput"
                                     value="#{entityUpdateBean.corpusLieUrl}"
                                     styleClass="users-input"
                                     placeholder="URL"
                                     maxlength="500"/>
                    </div>
                    <p:commandButton value="Ajouter"
                                     icon="pi pi-plus"
                                     action="#{entityUpdateBean.addCorpusLie}"
                                     process="@this corpusLieLabelInput corpusLieUrlInput"
                                     update="corpusLiesListPanel corpusLieLabelInput corpusLieUrlInput :growl"
                                     styleClass="collection-modifier-btn collection-modifier-btn-save"
                                     style="flex:0 0 auto;"/>
                </div>

                <p:outputPanel id="corpusLiesListPanel" layout="block"
                               styleClass="bibliographie-container candidats-mt-5"
                               style="display:flex; flex-direction:column; gap:6px; max-height:220px; overflow:auto;">
                    <ui:repeat value="#{entityUpdateBean.corpusLies}" var="c">
                        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid #e4ebde; border-radius:8px; padding:8px 10px; background:#fff;">
                            <h:outputLink value="#{c.url}"
                                          target="_blank"
                                          rel="noopener noreferrer"
                                          title="#{c.url}"
                                          style="color:#2f4f39; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px; min-width:0;">
                                <i class="pi pi-external-link" aria-hidden="true"/>
                                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:520px;">#{c.label}</span>
                            </h:outputLink>
                            <p:commandLink type="button"
                                           action="#{entityUpdateBean.removeCorpusLie(c)}"
                                           process="@this"
                                           update="corpusLiesListPanel :growl"
                                           styleClass="zotero-chip-remove"
                                           title="Retirer">
                                <i class="pi pi-times" aria-hidden="true"/>
                            </p:commandLink>
                        </div>
                    </ui:repeat>
                    <h:outputText value="Aucun corpus lié."
                                  rendered="#{empty entityUpdateBean.corpusLies}"
                                  styleClass="empty-field-message"
                                  style="padding:8px 4px;"/>
                </p:outputPanel>
            </div>
        </div>
    </div>
</ui:composition>
