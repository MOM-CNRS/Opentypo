<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20 candidat-definition-form">
        <div class="periode-header-row">
            <p:outputLabel value="Description [et ses traductions]" />
        </div>
        <div class="candidat-definition-editor-row">
            <div class="candidat-definition-editor-inner">
                <div class="candidat-definition-editor-header">
                    <i class="pi pi-align-left candidat-definition-editor-icon" />
                    <span class="candidat-definition-editor-label">Saisissez la traduction de la définition</span>
                </div>
                <p:textEditor value="#{entityUpdateBean.newDescriptionValue}"
                              placeholder="Saisissez la traduction de la définition..."
                              secure="false"
                              height="160"
                              styleClass="candidat-definition-texteditor"/>
            </div>
        </div>
        <div class="candidat-definition-actions-row">
            <div class="candidat-label-select-wrapper candidat-definition-lang-select">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-globe input-icon" />
                    <p:selectOneMenu value="#{entityUpdateBean.newDescriptionLangueCode}"
                                     styleClass="users-select">
                        <f:selectItem itemLabel="Sélectionner une langue" itemValue="" />
                        <f:selectItems value="#{entityUpdateBean.availableTmpLanguagesForDefinition}"
                                       var="langue"
                                       itemLabel="#{langue.nom}"
                                       itemValue="#{langue.code}" />
                    </p:selectOneMenu>
                </div>
            </div>
            <p:commandButton value="Ajouter"
                             icon="pi pi-plus"
                             styleClass="candidat-btn-add"
                             actionListener="#{entityUpdateBean.addTempDescription()}"
                             process="@form"
                             ajax="true"
                             update=":centerContent :growl"/>
        </div>

        <p:dataTable value="#{entityUpdateBean.descriptions}"
                     var="labelItem"
                     styleClass="candidat-labels-table candidats-mt-10"
                     emptyMessage="Aucune traduction ajoutée"
                     rendered="#{not empty entityUpdateBean.descriptions}">
            <p:column headerText="Liste description [et ses traductions]" styleClass="candidat-table-label-column candidats-table-label-padding">
                <div class="candidat-table-label-cell">
                    <h:panelGroup rendered="#{labelItem.langueCode != null}">
                        <h:graphicImage library="img" name="flag/#{labelItem.langueCode}.png"
                                        styleClass="candidat-table-flag" alt="#{labelItem.langue.nom}" title="#{labelItem.langue.nom}"/>
                    </h:panelGroup>
                    <h:outputText value="#{labelItem.valeur}" styleClass="candidat-table-label-text" escape="false" />
                </div>
            </p:column>
            <p:column styleClass="candidat-table-action-column">
                <div class="candidat-table-action-cell">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     action="#{entityUpdateBean.removeTmpDescription(labelItem)}"
                                     process="@form"
                                     ajax="true"
                                     update=":centerContent :growl"
                                     title="Supprimer cette définition"/>
                </div>
            </p:column>
        </p:dataTable>

        <ui:fragment rendered="#{empty entityUpdateBean.descriptions}">
            <div class="candidat-no-labels">
                <div class="candidat-no-labels-content">
                    <div class="candidat-no-labels-icon"><i class="pi pi-info-circle" /></div>
                    <div class="candidat-no-labels-text">
                        <h4 class="candidat-no-labels-title">Aucune traduction ajoutée</h4>
                        <p class="candidat-no-labels-message">Utilisez le formulaire ci-dessus pour ajouter une traduction de la définition dans une autre langue.</p>
                    </div>
                </div>
            </div>
        </ui:fragment>
    </div>
</ui:composition>
