<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <!-- Matériau -->
    <h:panelGroup styleClass="users-form-group users-form-group-full">
        <div class="periode-header-row periode-header-row-with-icon">
            <p:outputLabel value="Matériau" />
        </div>
        <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
            <div id="materiauMonnaieAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                <i class="pi pi-box input-icon periode-autocomplete-icon" aria-hidden="true"/>
                <p:autoComplete value="#{entityUpdateBean.materiauxAutocompleteSelection}"
                                completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                converter="pactolsConceptConverter"
                                var="concept"
                                itemLabel="#{concept.selectedTerm}"
                                itemValue="#{concept}"
                                dropdown="false"
                                minQueryLength="2"
                                appendTo="#materiauMonnaieAutocompleteWrapper"
                                my="left top"
                                at="left bottom"
                                panelStyleClass="periode-autocomplete-panel"
                                scrollHeight="280"
                                emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('MATERIAUX')}"
                                placeholder="Ex. Or, Argent..."
                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"/>
            </div>
        </div>
    </h:panelGroup>

    <!-- Dénomination -->
    <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
        <div class="periode-header-row periode-header-row-with-icon">
            <p:outputLabel value="Dénomination" />
        </div>
        <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
            <div id="denominationMonnaieAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                <i class="pi pi-tag input-icon periode-autocomplete-icon" aria-hidden="true"/>
                <p:autoComplete value="#{entityUpdateBean.denominationAutocompleteSelection}"
                                completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                converter="pactolsConceptConverter"
                                var="concept"
                                itemLabel="#{concept.selectedTerm}"
                                itemValue="#{concept}"
                                dropdown="false"
                                minQueryLength="2"
                                appendTo="#denominationMonnaieAutocompleteWrapper"
                                my="left top"
                                at="left bottom"
                                panelStyleClass="periode-autocomplete-panel"
                                scrollHeight="280"
                                emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('DENOMINATION')}"
                                placeholder="Ex. Denier, Sesterce..."
                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"/>
            </div>
        </div>
    </h:panelGroup>

    <!-- Métrologie (texte libre) -->
    <div class="users-form-group users-form-group-full candidats-mt-10">
        <div class="periode-header-row periode-header-row-with-icon">
            <p:outputLabel value="Métrologie" />
        </div>
        <div class="periode-field-row candidat-production-wrapper candidat-production-group">
            <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                <i class="pi pi-sliders-h input-icon" aria-hidden="true"/>
                <p:inputText value="#{entityUpdateBean.metrologie}"
                             styleClass="users-input"
                             placeholder="Ex. Poids, diamètre..."/>
            </div>
        </div>
    </div>

    <!-- Valeur -->
    <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
        <div class="periode-header-row periode-header-row-with-icon">
            <p:outputLabel value="Valeur" />
        </div>
        <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
            <div id="valeurMonnaieAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                <i class="pi pi-dollar input-icon periode-autocomplete-icon" aria-hidden="true"/>
                <p:autoComplete value="#{entityUpdateBean.valeurAutocompleteSelection}"
                                completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                converter="pactolsConceptConverter"
                                var="concept"
                                itemLabel="#{concept.selectedTerm}"
                                itemValue="#{concept}"
                                dropdown="false"
                                minQueryLength="2"
                                appendTo="#valeurMonnaieAutocompleteWrapper"
                                my="left top"
                                at="left bottom"
                                panelStyleClass="periode-autocomplete-panel"
                                scrollHeight="280"
                                emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('VALEUR')}"
                                placeholder="Ex. 1/4 de statère..."
                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"/>
            </div>
        </div>
    </h:panelGroup>

    <!-- Technique -->
    <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
        <div class="periode-header-row periode-header-row-with-icon">
            <p:outputLabel value="Technique" />
        </div>
        <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
            <div id="techniqueMonnaieAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                <i class="pi pi-hammer input-icon periode-autocomplete-icon" aria-hidden="true"/>
                <p:autoComplete value="#{entityUpdateBean.techniqueAutocompleteSelection}"
                                completeMethod="#{openThesoDialogBean.searchInOpenTheso}"
                                converter="pactolsConceptConverter"
                                var="concept"
                                itemLabel="#{concept.selectedTerm}"
                                itemValue="#{concept}"
                                dropdown="false"
                                minQueryLength="2"
                                appendTo="#techniqueMonnaieAutocompleteWrapper"
                                my="left top"
                                at="left bottom"
                                panelStyleClass="periode-autocomplete-panel"
                                scrollHeight="280"
                                emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('TECHNIQUE')}"
                                placeholder="Ex. Frappé, Coulé..."
                                styleClass="users-input periode-autocomplete-input"
                                forceSelection="false"/>
            </div>
        </div>
    </h:panelGroup>

</ui:composition>
