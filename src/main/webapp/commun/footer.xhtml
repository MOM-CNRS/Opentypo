<h:panelGroup id="appFooter" layout="block"
              xmlns="http://www.w3.org/1999/xhtml"
              xmlns:h="http://xmlns.jcp.org/jsf/html">

    <footer class="app-footer">
        <!-- Section basse : Copyright et liens rapides -->
        <div class="footer-bottom">
            <div class="footer-bottom-content">
                <div class="footer-copyright-main">
                    <span class="footer-copyright-text">#{msg['footer.copyright']}</span>
                    <span class="footer-separator">•</span>
                    <span class="footer-rights">#{msg['footer.rights']}</span>
                </div>
                <div class="footer-quick-links">
                    <h:link outcome="/pages/contact" value="#{sitePageFooterBean.contactLabel}" styleClass="footer-quick-link"/>
                    <span class="footer-separator">•</span>
                    <h:link outcome="/pages/legal" value="#{sitePageFooterBean.legalLabel}" styleClass="footer-quick-link"/>
                    <span class="footer-separator">•</span>
                    <h:link outcome="/pages/accessibility" value="#{sitePageFooterBean.accessibilityLabel}" styleClass="footer-quick-link"/>
                </div>
            </div>
        </div>
    </footer>
</h:panelGroup>
