<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<!-- ========== HEAD : métadonnées, CSS, scripts globaux ========== -->
<h:head>
    <title>OpenTypo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="#{request.contextPath}/resources/img/o.png"/>

    <!-- Font Awesome : CDN (fallback si webjars non disponibles en déploiement externe) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css" crossorigin="anonymous"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/v4-shims.min.css" crossorigin="anonymous"/>

    <!-- Bootstrap : CDN (fallback si webjars non disponibles en déploiement externe) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous"/>

    <!-- PrimeFaces theme + PrimeIcons : chargement APRÈS Bootstrap/FontAwesome pour éviter les conflits de font-family -->
    <h:outputStylesheet library="primefaces" name="theme.css"/>
    <h:outputStylesheet library="primeicons" name="primeicons.css"/>

    <!-- CSS principal -->
    <h:outputStylesheet library="css" name="openTypo_style.css"/>

    <!-- Styles critiques pour la zone de présentation - garantis pour persister -->
    <!-- NOTE: Les styles ont été déplacés dans template_styles.css -->
    <h:outputStylesheet library="css" name="template_styles.css"/>
    
    <!-- Styles pour les animations de chargement -->
    <h:outputStylesheet library="css" name="loading.css"/>

    <!-- Styles des dialogs login / logout -->
    <h:outputStylesheet library="css" name="pages/user/login.css"/>
    <h:outputStylesheet library="css" name="pages/user/logout.css"/>

    <!-- Styles des dialogs collection / référentiel -->
    <h:outputStylesheet library="css" name="dialogs/collection-dialog.css"/>
    <h:outputStylesheet library="css" name="dialogs/reference-dialog.css"/>
    <h:outputStylesheet library="css" name="dialogs/group-dialog.css"/>

    <h:outputStylesheet library="css" name="index-layout.css"/>
    <h:outputStylesheet library="css" name="search/search-results.css"/>
    <h:outputStylesheet library="css" name="search/search-bar.css"/>
    <h:outputStylesheet library="css" name="details/details-common.css"/>
    <h:outputStylesheet library="css" name="details/type-details.css"/>
    <h:outputStylesheet library="css" name="details/groupe-details.css"/>
    <h:outputStylesheet library="css" name="details/series-types-unified.css"/>
    <h:outputStylesheet library="css" name="details/details-all-pages.css"/>
    <h:outputStylesheet library="css" name="details/reference-details.css"/>
    <h:outputStylesheet library="css" name="details/monnaie-communs.css"/>
    <h:outputStylesheet library="css" name="candidats/opentheso-dialog.css"/>

    <h:outputScript library="js" name="showLoginDialog.js" target="head"/>
</h:head>

<!-- ========== BODY : scripts, layout, contenu ========== -->
<h:body styleClass="app-body" data-context-path="#{request.contextPath}">
    <!-- Scripts globaux (ordre de chargement) -->
    <h:outputScript library="js" name="constants.js"/>
    <!-- SidebarUtils DOIT être chargé avant theso_responsiveMenu_optimized.js -->
    <h:outputScript library="js" name="sidebarUtils.js"/>
    <!-- Charger le script JavaScript du menu après SidebarUtils -->
    <h:outputScript library="js" name="theso_responsiveMenu_optimized.js"/>

    <!-- Délégation data-action (remplace les onclick inline) -->
    <h:outputScript library="js" name="actions.js"/>

    <!-- Script pour gérer le menu dynamique -->
    <!-- NOTE: Le script a été déplacé dans template_scripts.js -->
    <h:outputScript library="js" name="template_scripts.js"/>

    <!-- Script pour gérer les animations de chargement -->
    <h:outputScript library="js" name="loadingUtils.js"/>
    
    <!-- Script pour gérer l'arbre (toujours chargé pour que le drag-and-drop fonctionne dès le premier affichage) -->
    <h:outputScript library="js" name="treeUtils.js"/>
    <h:outputScript library="js" name="tree.js"/>
    <h:outputScript library="js" name="urlSync.js"/>
    
    <!-- Script pour le paginateur -->
    <h:outputScript library="js" name="paginator.js"/>

    <!-- Fonction pour afficher le dialog de login avec vérification -->
    <!-- NOTE: Le script a été déplacé dans template_scripts.js -->

    <!-- Layout principal : header + container (menu + main) -->
    <ui:include src="header.xhtml" />
    <div class="app-container">
        <ui:include src="menu.xhtml" />
        <main class="app-main">
            <ui:insert name="mainContent"/>
        </main>
    </div>
    <ui:include src="footer.xhtml" />

    <!-- Notifications globales -->
    <p:growl id="growl" showDetail="true" life="5000" position="top-right" />

    <!-- Dialogs globaux (login / logout / confirmation suppression et sauvegarde entité) -->
    <ui:include src="../user/login.xhtml" />
    <ui:include src="../user/logout.xhtml" />
    <ui:include src="../dialogs/confirmDeleteDialog.xhtml" />
    <ui:include src="../dialogs/confirmSaveDialog.xhtml" />
    <ui:include src="../dialogs/orderListDialog.xhtml" />

    <!-- Overlay image plein écran (galerie, référence, etc.) — navigation clavier + flèches latérales + compteur -->
    <div id="fullscreenImageOverlay" class="fullscreen-image-overlay" onclick="if(typeof hideFullscreenImage==='function')hideFullscreenImage();">
        <button type="button" id="fullscreenImagePrev" class="fullscreen-image-nav fullscreen-image-nav-prev"
                aria-label="Image précédente" title="Précédent (←)"
                onclick="event.stopPropagation(); if(typeof fullscreenImageGoPrev==='function')fullscreenImageGoPrev();">
            <i class="pi pi-chevron-left" aria-hidden="true"/>
        </button>
        <button type="button" id="fullscreenImageNext" class="fullscreen-image-nav fullscreen-image-nav-next"
                aria-label="Image suivante" title="Suivant (→)"
                onclick="event.stopPropagation(); if(typeof fullscreenImageGoNext==='function')fullscreenImageGoNext();">
            <i class="pi pi-chevron-right" aria-hidden="true"/>
        </button>
        <div class="fullscreen-image-wrapper" onclick="event.stopPropagation();">
            <button type="button" class="fullscreen-image-close" onclick="if(typeof hideFullscreenImage==='function')hideFullscreenImage();" title="Fermer (Échap)">
                <i class="pi pi-times"/>
            </button>
            <img id="fullscreenImageElement" class="fullscreen-image-content" alt="Image en plein écran" />
            <div id="fullscreenImageLegend" class="fullscreen-image-legend" style="display:none;"></div>
        </div>
        <div id="fullscreenImageCounter" class="fullscreen-image-counter" style="display:none;" role="navigation"
             aria-live="polite" onclick="event.stopPropagation();"></div>
    </div>
    <h:outputScript library="js" name="fullscreen-image.js"/>
    <h:outputScript library="js" name="gallery.js"/>
    <h:outputScript library="js" name="description-expand.js"/>

    <!-- Bouton retour en haut - visible uniquement après défilement vers le bas (classe ui-scrolltop-visible gérée par scrollTop.js) -->
    <button type="button" id="scrollTopBtn" class="ui-scrolltop custom-scrolltop scroll-top-button" aria-label="Retour en haut">
        <i class="pi pi-arrow-up ui-scrolltop-icon"/>
    </button>
    <h:outputScript library="js" name="scrollTop.js"/>
</h:body>
</html>
