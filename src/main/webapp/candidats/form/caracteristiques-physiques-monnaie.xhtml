<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <div class="users-form-group users-form-group-full periode-group candidats-mt-20">
        <b><p:outputLabel value="#{msg['modifier.physicalCharacteristics.title']}" styleClass="caracteristiques-physiques-title candidats-label-pl"/></b>

        <!-- Matériau -->
        <h:panelGroup styleClass="users-form-group users-form-group-full">
            <div class="periode-header-row">
                <p:outputLabel value="#{msg['modifier.monnais.material']}" />
            </div>
            <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                <div id="materiauAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                    <i class="pi pi-arrows-h input-icon periode-autocomplete-icon" />
                    <p:autoComplete value="#{candidatBean.materiauxAutocompleteSelection}"
                                   completeMethod="#{openThesoDialogBean.completeMateriaux}"
                                   converter="pactolsConceptConverter"
                                   var="concept"
                                   itemLabel="#{concept.selectedTerm}"
                                   itemValue="#{concept}"
                                   dropdown="false"
                                   minQueryLength="2"
                                   appendTo="#materiauxAutocompleteWrapper"
                                   my="left top"
                                   at="left bottom"
                                   panelStyleClass="periode-autocomplete-panel"
                                   scrollHeight="280"
                                   emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('MATERIAUX')}"
                                   placeholder="#{msg['modifier.placeholder.goldSilver']}"
                                   styleClass="users-input periode-autocomplete-input"
                                   forceSelection="false"
                                   rendered="#{candidatBean.canEditCurrentBrouillon()}"/>
                    <p:inputText value="#{candidatBean.materiaux != null ? candidatBean.materiaux.valeur : ''}"
                                 styleClass="users-input"
                                 readonly="true"
                                 placeholder="#{msg['modifier.placeholder.noMaterial']}"
                                 rendered="#{candidatBean.isCurrentBrouillonReadOnly()}"/>
                </div>
                <div class="periode-action-buttons">
                    <p:commandButton icon="pi pi-check"
                                     styleClass="candidat-btn-save periode-save-btn"
                                     title="#{msg['modifier.tooltip.save.material']}"
                                     rendered="#{candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.saveMateriauxFromAutocomplete}"
                                     process="@form"
                                     ajax="true"
                                     update="@form :growl"/>
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     title="#{msg['modifier.tooltip.delete.material']}"
                                     rendered="#{candidatBean.hasMateriaux() and candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.prepareConfirmDeleteMateriaux()}"
                                     process="@this"
                                     update="@none"
                                     oncomplete="PF('confirmDeleteReferenceDialog').show();"/>
                </div>
            </div>
        </h:panelGroup>

        <!-- Dénomination -->
        <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel value="#{msg['modifier.field.denomination']}" />
            </div>
            <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                <div id="denominationAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                    <i class="pi pi-wrench input-icon periode-autocomplete-icon" />
                    <p:autoComplete value="#{candidatBean.denominationAutocompleteSelection}"
                                   completeMethod="#{openThesoDialogBean.completeDenomination}"
                                   converter="pactolsConceptConverter"
                                   var="concept"
                                   itemLabel="#{concept.selectedTerm}"
                                   itemValue="#{concept}"
                                   dropdown="false"
                                   minQueryLength="2"
                                   appendTo="#denominationAutocompleteWrapper"
                                   my="left top"
                                   at="left bottom"
                                   panelStyleClass="periode-autocomplete-panel"
                                   scrollHeight="280"
                                   emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('DENOMINATION')}"
                                   placeholder="#{msg['modifier.placeholder.coinTypes']}"
                                   styleClass="users-input periode-autocomplete-input"
                                   forceSelection="false"
                                   rendered="#{candidatBean.canEditCurrentBrouillon()}"/>
                    <p:inputText value="#{candidatBean.denomination != null ? candidatBean.denomination.valeur : ''}"
                                 styleClass="users-input"
                                 readonly="true"
                                 placeholder="#{msg['modifier.placeholder.noDenomination']}"
                                 rendered="#{candidatBean.isCurrentBrouillonReadOnly()}"/>
                </div>
                <div class="periode-action-buttons">
                    <p:commandButton icon="pi pi-check"
                                     styleClass="candidat-btn-save periode-save-btn"
                                     title="#{msg['modifier.tooltip.save.denomination']}"
                                     rendered="#{candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.saveDenominationFromAutocomplete}"
                                     process="@form"
                                     ajax="true"
                                     update="@form :growl"/>
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     title="#{msg['modifier.tooltip.delete.denomination']}"
                                     rendered="#{candidatBean.hasDenomination() and candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.prepareConfirmDeleteDenomination()}"
                                     process="@this"
                                     update="@none"
                                     oncomplete="PF('confirmDeleteReferenceDialog').show();"/>
                </div>
            </div>
        </h:panelGroup>

        <!-- Métrologie (texte libre) -->
        <div class="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel for="metrologieMonnaieInput" value="#{msg['modifier.ceramique.metrologie']}" />
            </div>
            <div class="periode-field-row candidat-production-wrapper candidat-production-group">
                <div class="input-wrapper periode-input-wrapper candidats-input-wrapper-border">
                    <i class="pi pi-cog input-icon" />
                    <p:inputText id="metrologieMonnaieInput"
                                 value="#{candidatBean.metrologieMonnaie}"
                                 styleClass="users-input"
                                 placeholder="#{msg['modifier.placeholder.metrologie.free']}"
                                 rendered="#{candidatBean.canEditCurrentBrouillon()}"/>
                    <p:inputText value="#{candidatBean.metrologieMonnaie}"
                                 styleClass="users-input"
                                 readonly="true"
                                 placeholder="#{msg['common.empty.notProvided']}"
                                 rendered="#{candidatBean.isCurrentBrouillonReadOnly()}"/>
                </div>
                <div class="periode-action-buttons">
                    <p:commandButton icon="pi pi-check"
                                     styleClass="candidat-btn-save periode-save-btn"
                                     title="#{msg['modifier.tooltip.save.metrology']}"
                                     rendered="#{candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.saveMetrologieMonnaie}"
                                     process="@form"
                                     ajax="true"
                                     update="@form :growl"/>
                </div>
            </div>
            <p:message for="metrologieMonnaieInput" display="icon"/>
        </div>

        <!-- Valeur -->
        <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel value="#{msg['modifier.monnais.value']}" />
            </div>
            <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                <div id="valeurAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                    <i class="pi pi-palette input-icon periode-autocomplete-icon" />
                    <p:autoComplete value="#{candidatBean.valeurAutocompleteSelection}"
                                   completeMethod="#{openThesoDialogBean.completeValeur}"
                                   converter="pactolsConceptConverter"
                                   var="concept"
                                   itemLabel="#{concept.selectedTerm}"
                                   itemValue="#{concept}"
                                   dropdown="false"
                                   minQueryLength="2"
                                   appendTo="#valeurAutocompleteWrapper"
                                   my="left top"
                                   at="left bottom"
                                   panelStyleClass="periode-autocomplete-panel"
                                   scrollHeight="280"
                                   emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('VALEUR')}"
                                   placeholder="#{msg['modifier.placeholder.coinValue']}"
                                   styleClass="users-input periode-autocomplete-input"
                                   forceSelection="false"
                                   rendered="#{candidatBean.canEditCurrentBrouillon()}"/>
                    <p:inputText value="#{candidatBean.valeur != null ? candidatBean.valeur.valeur : ''}"
                                 styleClass="users-input"
                                 readonly="true"
                                 placeholder="#{msg['modifier.placeholder.noValue']}"
                                 rendered="#{candidatBean.isCurrentBrouillonReadOnly()}"/>
                </div>
                <div class="periode-action-buttons">
                    <p:commandButton icon="pi pi-check"
                                     styleClass="candidat-btn-save periode-save-btn"
                                     title="#{msg['modifier.tooltip.save.value']}"
                                     rendered="#{candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.saveValeurFromAutocomplete}"
                                     process="@form"
                                     ajax="true"
                                     update="@form :growl"/>
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     title="#{msg['modifier.tooltip.delete.value']}"
                                     rendered="#{candidatBean.hasValeur() and candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.prepareConfirmDeleteValeur()}"
                                     process="@this"
                                     update="@none"
                                     oncomplete="PF('confirmDeleteReferenceDialog').show();"/>
                </div>
            </div>
        </h:panelGroup>

        <!-- Technique -->
        <h:panelGroup styleClass="users-form-group users-form-group-full candidats-mt-10">
            <div class="periode-header-row">
                <p:outputLabel for="techniqueAutocomplete" value="#{msg['modifier.monnais.technique']}" />
            </div>
            <div class="periode-field-row periode-autocomplete-row candidat-production-wrapper candidat-production-group">
                <div id="techniqueAutocompleteWrapper" class="input-wrapper periode-input-wrapper candidats-input-wrapper-border periode-autocomplete-wrapper candidat-production-input-wrapper">
                    <i class="pi pi-th-large input-icon periode-autocomplete-icon" />
                    <p:autoComplete id="techniqueAutocomplete"
                                   value="#{candidatBean.techniqueAutocompleteSelection}"
                                   completeMethod="#{openThesoDialogBean.completeTechnique}"
                                   converter="pactolsConceptConverter"
                                   var="concept"
                                   itemLabel="#{concept.selectedTerm}"
                                   itemValue="#{concept}"
                                   dropdown="false"
                                   minQueryLength="2"
                                   appendTo="#techniqueAutocompleteWrapper"
                                   my="left top"
                                   at="left bottom"
                                   panelStyleClass="periode-autocomplete-panel"
                                   scrollHeight="280"
                                   emptyMessage="#{openThesoDialogBean.getEmptyMessageFor('TECHNIQUE')}"
                                   placeholder="#{msg['modifier.placeholder.technique.coin']}"
                                   styleClass="users-input periode-autocomplete-input"
                                   forceSelection="false"
                                   rendered="#{candidatBean.canEditCurrentBrouillon()}"/>
                    <p:inputText value="#{candidatBean.technique != null ? candidatBean.technique.valeur : ''}"
                                 styleClass="users-input"
                                 readonly="true"
                                 placeholder="#{msg['modifier.placeholder.noTechnique']}"
                                 rendered="#{candidatBean.isCurrentBrouillonReadOnly()}"/>
                </div>
                <div class="periode-action-buttons">
                    <p:commandButton icon="pi pi-check"
                                     styleClass="candidat-btn-save periode-save-btn"
                                     title="#{msg['modifier.tooltip.save.technique']}"
                                     rendered="#{candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.saveTechniqueFromAutocomplete}"
                                     process="@form"
                                     ajax="true"
                                     update="@form :growl"/>
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="candidat-btn-remove"
                                     title="#{msg['modifier.tooltip.delete.technique']}"
                                     rendered="#{candidatBean.hasTechnique() and candidatBean.canEditCurrentBrouillon()}"
                                     actionListener="#{candidatBean.prepareConfirmDeleteTechnique()}"
                                     process="@this"
                                     update="@none"
                                     oncomplete="PF('confirmDeleteReferenceDialog').show();"/>
                </div>
            </div>
            <p:message for="techniqueAutocomplete" display="icon"/>
        </h:panelGroup>

    </div>
</ui:composition>
