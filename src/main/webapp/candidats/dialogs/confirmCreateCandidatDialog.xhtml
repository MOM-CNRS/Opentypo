<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://java.sun.com/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- Dialog de confirmation de sauvegarde -->
    <p:dialog id="confirmSaveCandidatDialog"
              widgetVar="confirmSaveCandidatDialog"
              header="#{msg['candidat.dialog.create.header']}"
              modal="true"
              closable="true"
              resizable="false"
              draggable="false"
              width="500"
              height="auto"
              styleClass="candidat-confirm-dialog">

        <f:facet name="header">
            <div class="candidat-confirm-header">
                <div class="candidat-confirm-header-icon-wrapper">
                    <i class="pi pi-check-circle candidat-confirm-header-icon" />
                </div>
                <div class="candidat-confirm-header-content">
                    <h3 class="candidat-confirm-header-title">#{msg['candidat.dialog.create.header']}</h3>
                    <p class="candidat-confirm-header-subtitle">#{msg['candidat.dialog.create.subtitle']}</p>
                </div>
            </div>
        </f:facet>

        <div class="candidat-confirm-message-wrapper">
            <div class="candidat-confirm-icon-info">
                <i class="pi pi-info-circle" />
            </div>
            <p class="candidat-confirm-message-text">
                <h:outputText value="#{msg['candidat.dialog.create.message']}" escape="false"/>
            </p>
        </div>

        <div class="candidat-confirm-actions">
            <p:commandButton value="#{msg['common.action.cancel']}"
                             icon="pi pi-times"
                             onclick="PF('confirmSaveCandidatDialog').hide(); return false;"
                             type="button"
                             styleClass="candidat-confirm-btn candidat-confirm-btn-cancel"/>
            <p:commandButton value="#{msg['common.action.yesCreate']}"
                             icon="pi pi-check"
                             action="#{candidatBean.sauvegarderCandidat()}"
                             process=":createCandidatForm"
                             ajax="true"
                             update=":createCandidatForm :growl"
                             styleClass="candidat-confirm-btn candidat-confirm-btn-validate"
                             onstart="showLoading('#{msg['candidat.dialog.create.saving']}', 'spinner');"
                             oncomplete="setTimeout(function(){PF('confirmSaveCandidatDialog').hide(); hideLoading();}, 300);"
                             onerror="forceHideLoading();"/>
        </div>
    </p:dialog>
</ui:fragment>
