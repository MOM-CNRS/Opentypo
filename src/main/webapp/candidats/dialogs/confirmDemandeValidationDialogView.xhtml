<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://java.sun.com/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:h="http://xmlns.jcp.org/jsf/html"
             xmlns:f="http://xmlns.jcp.org/jsf/core">

    <p:dialog id="confirmDemandeValidationDialogView"
              widgetVar="confirmDemandeValidationDialogView"
              header="Demande de validation"
              modal="true"
              closable="true"
              resizable="false"
              draggable="false"
              width="520"
              height="auto"
              styleClass="candidat-confirm-dialog">
        <f:facet name="header">
            <div class="candidat-confirm-header">
                <div class="candidat-confirm-header-icon-wrapper">
                    <i class="pi pi-send candidat-confirm-header-icon" />
                </div>
                <div class="candidat-confirm-header-content">
                    <h3 class="candidat-confirm-header-title">Confirmer la demande</h3>
                    <p class="candidat-confirm-header-subtitle">La fiche passera en attente de décision du valideur</p>
                </div>
            </div>
        </f:facet>
        <div class="candidat-confirm-message-wrapper">
            <div class="candidat-confirm-icon-info">
                <i class="pi pi-info-circle" />
            </div>
            <p class="candidat-confirm-message-text">
                Confirmez-vous l’envoi en validation ? Les champs obligatoires pour votre typologie ont été vérifiés.<br/>
                <strong>#{candidatBean.entityLabel}</strong>
            </p>
        </div>
        <f:facet name="footer">
            <div class="candidat-confirm-footer">
                <p:commandButton value="Annuler"
                               icon="pi pi-times"
                               styleClass="candidat-confirm-btn candidat-confirm-btn-cancel"
                               process="@this"
                               update="@none"
                               onclick="PF('confirmDemandeValidationDialogView').hide(); return false;"/>
                <p:commandButton value="Oui, envoyer"
                               icon="pi pi-check"
                               styleClass="candidat-confirm-btn candidat-confirm-btn-confirm"
                               action="#{candidatBean.confirmDemandeValidation()}"
                               process="@this"
                               update=":growl :createCandidatForm"
                               oncomplete="PF('confirmDemandeValidationDialogView').hide();"/>
            </div>
        </f:facet>
    </p:dialog>
</ui:fragment>
