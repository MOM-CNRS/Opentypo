<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <div class="wizard-content">
        <div class="wizard-step-content">
            <div class="wizard-step-header">
                <i class="pi pi-tag wizard-step-icon" />
                <h3 class="wizard-step-title">#{msg['candidat.wizard.step1.title']}</h3>
                <p class="wizard-step-description">#{msg['candidat.wizard.step1.description']}</p>
            </div>

            <div class="users-form-panel wizard-form-panel">
                <div class="users-form-grid candidats-p-20">
                    <div class="users-form-group users-form-group-full">
                        <p:outputLabel for="entityType" value="#{msg['candidat.wizard.entityType']}" />
                        <div class="input-wrapper">
                            <i class="pi pi-sitemap input-icon" />
                            <p:selectOneMenu id="entityType"
                                             value="#{candidatBean.selectedEntityTypeId}"
                                             styleClass="users-select"
                                             required="true"
                                             requiredMessage="#{msg['candidat.save.entityTypeRequired']}"
                                             validatorMessage="#{msg['candidat.save.entityTypeRequired']}">
                                <f:selectItem itemLabel="#{msg['candidat.wizard.selectEntityType']}" itemValue="" />
                                <f:selectItems value="#{candidatBean.availableEntityTypes}"
                                               var="entityType"
                                               itemLabel="#{candidatBean.getEntityTypeName(entityType)}"
                                               itemValue="#{entityType.id}" />
                                <p:ajax event="change" process="@this" update="wizardContent"/>
                            </p:selectOneMenu>
                        </div>
                        <p:message for="entityType" display="icon"/>
                    </div>

                    <div class="users-form-group">
                        <p:outputLabel for="selectedLangue" value="#{msg['candidat.wizard.labelLanguage']}" />
                        <div class="input-wrapper">
                            <i class="pi pi-globe input-icon" />
                            <p:selectOneMenu id="selectedLangue"
                                             value="#{candidatBean.selectedLangueCode}"
                                             styleClass="users-select"
                                             disabled="#{candidatBean.isSelectedEntityTypeType()}"
                                             required="#{not candidatBean.isSelectedEntityTypeType()}"
                                             requiredMessage="#{msg['modifier.msg.languageRequired']}"
                                             validatorMessage="#{msg['modifier.msg.languageRequired']}">
                                <f:selectItem itemLabel="#{msg['common.selectLanguage']}" itemValue="" />
                                <f:selectItems value="#{candidatBean.availableLanguages}"
                                               var="langue"
                                               itemLabel="#{langue.nom}"
                                               itemValue="#{langue.code}" />
                            </p:selectOneMenu>
                        </div>
                        <p:message for="selectedLangue" display="icon"/>
                    </div>

                    <div class="users-form-group">
                        <p:outputLabel for="entityLabel" value="#{msg['candidat.wizard.label']}" />
                        <div class="input-wrapper">
                            <i class="pi pi-pencil input-icon" />
                            <p:inputText id="entityLabel"
                                         value="#{candidatBean.entityLabel}"
                                         disabled="#{candidatBean.isSelectedEntityTypeType()}"
                                         required="#{not candidatBean.isSelectedEntityTypeType()}"
                                         requiredMessage="#{msg['modifier.msg.labelRequired']}"
                                         validatorMessage="#{msg['modifier.msg.labelRequired']}"
                                         styleClass="users-input"
                                         placeholder="#{msg['candidat.wizard.entityNamePlaceholder']}"
                                         maxlength="1000"/>
                        </div>
                        <p:message for="entityLabel" display="icon"/>
                    </div>

                    <div class="users-form-group">
                        <p:outputLabel for="entityCode" value="#{msg['modifier.field.code']}" />
                        <div class="input-wrapper">
                            <i class="pi pi-hashtag input-icon" />
                            <p:inputText id="entityCode"
                                         value="#{candidatBean.entityCode}"
                                         required="true"
                                         requiredMessage="#{msg['candidat.save.codeRequired']}"
                                         validatorMessage="#{msg['candidat.save.codeRequired']}"
                                         styleClass="users-input"
                                         placeholder="#{msg['candidat.wizard.codePlaceholder']}"
                                         maxlength="1000"/>
                        </div>
                        <p:message for="entityCode" display="icon"/>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ui:composition>
