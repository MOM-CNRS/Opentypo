<ui:composition template="../commun/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <ui:define name="mainContent">
        <h:outputStylesheet library="css" name="profile/myAccount.css"/>
        <div class="profile-page">
            <!-- En-tête -->
            <div class="profile-header">
                <div class="profile-title-section">
                    <h1 class="profile-title">
                        <i class="pi pi-user profile-title-icon"/> #{msg['profile.panel.title']}
                    </h1>
                    <p class="profile-subtitle">#{msg['profile.panel.subtitle']}</p>
                </div>
                <div class="profile-actions">
                    <h:form>
                        <p:commandButton value="#{msg['common.action.backHome']}"
                                       icon="pi pi-arrow-left"
                                       styleClass="profile-btn-back"
                                       action="/index.xhtml?faces-redirect=true"
                                       process="@this"
                                       update="@none"/>
                    </h:form>
                </div>
            </div>

            <!-- Formulaire -->
            <h:form id="profileForm">
                <p:panel header="#{msg['profile.panel.personalInfo']}" styleClass="profile-form-card">
                    <div class="profile-form-grid">
                        <div class="profile-form-group profile-form-group-full">
                            <p:outputLabel for="email" value="#{msg['profile.panel.email']}"/>
                            <p:inputText id="email"
                                       value="#{profileBean.email}"
                                       required="true"
                                       requiredMessage="#{msg['profile.validation.email']}"
                                       styleClass="users-input"
                                       placeholder="#{msg['profile.panel.emailExample']}"
                                       maxlength="1000"/>
                            <p:message for="email" display="icon"/>
                        </div>

                        <div class="profile-form-group">
                            <p:outputLabel for="prenom" value="#{msg['profile.panel.firstName']}"/>
                            <p:inputText id="prenom"
                                       value="#{profileBean.prenom}"
                                       required="true"
                                       requiredMessage="#{msg['profile.validation.firstName']}"
                                       styleClass="users-input"
                                       placeholder="#{msg['profile.panel.firstName']}"
                                       maxlength="1000"/>
                            <p:message for="prenom" display="icon"/>
                        </div>

                        <div class="profile-form-group">
                            <p:outputLabel for="nom" value="#{msg['profile.panel.lastName']}"/>
                            <p:inputText id="nom"
                                       value="#{profileBean.nom}"
                                       required="true"
                                       requiredMessage="#{msg['profile.validation.lastName']}"
                                       styleClass="users-input"
                                       placeholder="#{msg['profile.panel.lastName']}"
                                       maxlength="1000"/>
                            <p:message for="nom" display="icon"/>
                        </div>

                        <div class="profile-form-group">
                            <p:outputLabel for="nouveauMotDePasse" value="#{msg['profile.panel.password']}"/>
                            <p:password id="nouveauMotDePasse"
                                       value="#{profileBean.nouveauMotDePasse}"
                                       feedback="false"
                                       styleClass="users-input"
                                       placeholder="#{msg['profile.panel.passwordPlaceholder']}"
                                       maxlength="1000"
                                       pt:data-tooltip="#{msg['profile.panel.passwordTooltip']}"
                                       pt:data-tooltip-position="right"/>
                            <p:message for="nouveauMotDePasse" display="icon"/>
                        </div>

                        <div class="profile-form-group">
                            <p:outputLabel for="confirmationMotDePasse" value="#{msg['profile.panel.passwordConfirm']}"/>
                            <p:password id="confirmationMotDePasse"
                                       value="#{profileBean.confirmationMotDePasse}"
                                       feedback="false"
                                       styleClass="users-input"
                                       placeholder="#{msg['profile.panel.passwordConfirmPlaceholder']}"
                                       maxlength="1000"
                                       pt:data-tooltip="#{msg['profile.panel.passwordTooltip']}"
                                       pt:data-tooltip-position="right"/>
                            <p:message for="confirmationMotDePasse" display="icon"/>
                        </div>
                    </div>
                </p:panel>

                <div class="profile-form-actions">
                    <p:commandButton value="#{msg['common.action.cancel']}"
                                   icon="pi pi-times"
                                   styleClass="profile-btn profile-btn-cancel"
                                   action="/index.xhtml?faces-redirect=true"
                                   process="@this"
                                   update="@none"/>
                    <p:commandButton value="#{msg['common.action.register']}"
                                   icon="pi pi-check"
                                   styleClass="profile-btn profile-btn-save"
                                   action="#{profileBean.sauvegarder}"
                                   process="@form"
                                   update="@form :growl"/>
                </div>
            </h:form>

            <!-- Bloc : entités auxquelles l'utilisateur est rattaché -->
            <div class="profile-associations-section">
                <p:panel header="Mes rattachements" styleClass="profile-form-card profile-associations-card">
                    <ui:fragment rendered="#{empty profileBean.profilePermissions}">
                        <div class="profile-associations-empty">
                            <i class="pi pi-info-circle profile-associations-empty-icon"/>
                            <p>#{msg['profile.panel.associationsEmpty']}</p>
                        </div>
                    </ui:fragment>
                    <ui:fragment rendered="#{not empty profileBean.profilePermissions}">
                        <p:dataTable value="#{profileBean.profilePermissions}"
                                     var="perm"
                                     styleClass="profile-associations-table"
                                     rowIndexVar="rowIndex">
                            <p:column headerText="#{msg['profile.panel.entityColumn']}" styleClass="profile-assoc-col-entity">
                                <ui:fragment rendered="#{not empty perm.entityCode}">
                                    <h:outputLink value="#{request.contextPath}/#{perm.entityCode}"
                                                 styleClass="profile-assoc-entity-link"
                                                 title="#{msg['profile.panel.viewEntityPrefix']} #{perm.entityLabelPlainText}">
                                        #{perm.entityTypeLabel} :
                                        <h:outputText value="#{perm.entityLabel}"
                                                      escape="false"
                                                      styleClass="profile-assoc-entity-label entity-label-html"/>
                                        <span class="profile-assoc-entity-code">(#{perm.entityCode})</span>
                                        <i class="pi pi-arrow-right profile-assoc-entity-link-icon" aria-hidden="true"/>
                                    </h:outputLink>
                                </ui:fragment>
                                <ui:fragment rendered="#{empty perm.entityCode}">
                                    <h:outputText value="#{perm.entityLabel}"
                                                  escape="false"
                                                  styleClass="profile-assoc-entity-label entity-label-html"/>
                                </ui:fragment>
                            </p:column>
                            <p:column headerText="#{msg['profile.panel.roleColumn']}" styleClass="profile-assoc-col-role" width="10%" headerStyleClass="profile-assoc-col-role">
                                <span class="profile-assoc-role-badge">#{perm.role}</span>
                            </p:column>
                        </p:dataTable>
                    </ui:fragment>
                </p:panel>
            </div>
        </div>
    </ui:define>
</ui:composition>
