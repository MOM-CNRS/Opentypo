<ui:composition template="../commun/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="mainContent">
        <div class="users-container">
            <div class="users-header">
                <div class="users-header-content">
                    <div>
                        <h1 class="users-title">
                            <i class="pi pi-user users-title-icon"/> Mon profil
                        </h1>
                        <p class="users-subtitle">Modifiez vos informations personnelles</p>
                    </div>
                    <h:form>
                        <p:commandButton value="Retour à l'accueil"
                                       icon="pi pi-arrow-left"
                                       styleClass="users-create-button"
                                       action="/index.xhtml?faces-redirect=true"
                                       process="@this"
                                       update="@none"/>
                    </h:form>
                </div>
            </div>

            <div class="users-content">
                <h:form id="profileForm">
                    <p:panel header="Informations personnelles" styleClass="users-form-panel">
                        <div class="users-form-grid">
                            <div class="users-form-group users-form-group-full">
                                <p:outputLabel for="email" value="Email"/>
                                <p:inputText id="email"
                                           value="#{profileBean.email}"
                                           required="true"
                                           requiredMessage="L'email est obligatoire"
                                           styleClass="users-input"
                                           placeholder="votre@email.com"
                                           maxlength="255"/>
                                <p:message for="email" display="icon"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="prenom" value="Prénom"/>
                                <p:inputText id="prenom"
                                           value="#{profileBean.prenom}"
                                           required="true"
                                           requiredMessage="Le prénom est obligatoire"
                                           styleClass="users-input"
                                           placeholder="Prénom"
                                           maxlength="100"/>
                                <p:message for="prenom" display="icon"/>
                            </div>

                            <div class="users-form-group">
                                <p:outputLabel for="nom" value="Nom"/>
                                <p:inputText id="nom"
                                           value="#{profileBean.nom}"
                                           required="true"
                                           requiredMessage="Le nom est obligatoire"
                                           styleClass="users-input"
                                           placeholder="Nom"
                                           maxlength="100"/>
                                <p:message for="nom" display="icon"/>
                            </div>

                            <div class="users-form-group users-form-group-full">
                                <p:outputLabel for="nouveauMotDePasse" value="Nouveau mot de passe (laisser vide pour ne pas modifier)"/>
                                <p:password id="nouveauMotDePasse"
                                           value="#{profileBean.nouveauMotDePasse}"
                                           feedback="false"
                                           styleClass="users-input"
                                           placeholder="Nouveau mot de passe"
                                           maxlength="255"/>
                                <p:message for="nouveauMotDePasse" display="icon"/>
                                <p:tooltip for="nouveauMotDePasse" value="Minimum 6 caractères" position="right"/>
                            </div>
                        </div>
                    </p:panel>

                    <div class="users-form-actions">
                        <p:commandButton value="Annuler"
                                       icon="pi pi-times"
                                       styleClass="users-btn users-btn-cancel"
                                       action="/index.xhtml?faces-redirect=true"
                                       process="@this"
                                       update="@none"/>
                        <p:commandButton value="Sauvegarder"
                                       icon="pi pi-check"
                                       styleClass="users-btn users-btn-save"
                                       action="#{profileBean.sauvegarder}"
                                       process="@form"
                                       update="@form :growl"/>
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
