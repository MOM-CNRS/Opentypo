<ui:composition template="commun/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="mainContent">
        <f:event type="preRenderView" listener="#{applicationBean.handleEntityCodeFromUrlIfPresent}"/>
        <f:event type="preRenderView" listener="#{applicationBean.ensureStateConsistencyOnRefresh}"/>
        <!-- 1. Barre de recherche - désactivée en mode modification -->
        <h:panelGroup id="searchSectionWrapper" layout="block" styleClass="app-search #{entityUpdateBean.editingEntity ? 'app-search-disabled' : ''}">
            <ui:include src="search/search.xhtml"/>
        </h:panelGroup>

        <!-- 2. Contenu principal (arbre + zone centrale + résultats recherche) -->
        <h:panelGroup id="centerContent" class="app-content" style="height: 100%">

            <!-- 2.1 Panneau arbre (gauche) - désactivé en mode modification -->
            <h:panelGroup id="leftTreePanel" styleClass="left-tree #{entityUpdateBean.editingEntity ? 'left-tree-disabled' : ''}" rendered="#{applicationBean.showTreePanel}">
                <ui:include src="tree/tree.xhtml"/>
            </h:panelGroup>

            <!-- 2.2 Zone centrale : présentation + cartes collections OU panneaux détail -->
            <h:panelGroup id="rightTreePanel" styleClass="center-content">
                <h:panelGroup id="cardsContainer" rendered="#{applicationBean.showCollectionsPanel}">
                    <ui:include src="index/sections/site-presentation.xhtml"/>
                    <ui:include src="index/sections/collections-panel.xhtml"/>
                </h:panelGroup>

                <!-- 2.3 Panneaux de détail (référentiel, catégorie, groupe, série, type) -->
                <div id="contentPanelsWrapper" class="content-panels-wrapper">
                    <h:panelGroup id="contentPanels" rendered="#{applicationBean.isShowDetail()}" layout="block" class="info-concept">

                        <ui:include src="details/breadCrumb.xhtml"/>

                        <h:panelGroup rendered="#{applicationBean.showReferencesPanel}">
                            <ui:include src="details/collections/collection.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.showReferencePanel}">
                            <ui:include src="details/references/reference.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.showCategoryPanel}">
                            <ui:include src="details/categories/category.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.isShowGroupePanel()}">
                            <ui:include src="details/groups/groupe.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.showSeriePanel}">
                            <ui:include src="details/series/serie.xhtml"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{applicationBean.showTypePanel}">
                            <ui:include src="details/type/type.xhtml"/>
                        </h:panelGroup>

                        <ui:include src="details/communs/entity-audit-dates.xhtml"/>

                        <!-- Boutons Publier / Refuser pour entité en statut PROPOSITION -->
                        <h:form rendered="#{applicationBean.showTypePanel and typeBean.canPublishOrRefusePropositionType(applicationBean) and not entityUpdateBean.editingEntity}"
                                styleClass="groupe-proposition-actions candidats-mt-20">
                            <div class="groupe-proposition-actions-wrapper">
                                <p:commandButton value="Publier"
                                                 icon="pi pi-check-circle"
                                                 styleClass="groupe-proposition-btn groupe-proposition-btn-publish"
                                                 process="@this"
                                                 update=":confirmPropositionActionDialog"
                                                 action="#{applicationBean.prepareConfirmPropositionAction(true)}"/>

                                <p:commandButton value="Refuser"
                                                 icon="pi pi-times-circle"
                                                 styleClass="groupe-proposition-btn groupe-proposition-btn-refuse"
                                                 process="@this"
                                                 update=":confirmPropositionActionDialog"
                                                 action="#{applicationBean.prepareConfirmPropositionAction(false)}"/>
                            </div>
                        </h:form>

                        <!-- Dialog paramétrage OpenTheso (utilisé par collection et groupe) -->
                        <ui:include src="details/communs/collectionParametrageDialog.xhtml"/>
                        <ui:include src="details/communs/confirmVisibilityChangeDialog.xhtml"/>
                        <ui:include src="details/communs/confirmPropositionActionDialog.xhtml"/>
                        <ui:include src="dialogs/typeDialog.xhtml"/>
                        <ui:include src="dialogs/serieDialog.xhtml"/>
                        <ui:include src="dialogs/moveTypeDialog.xhtml"/>
                        <ui:include src="dialogs/duplicateTypeDialog.xhtml"/>
                        <ui:include src="dialogs/confirmMoveTypeDialog.xhtml"/>
                    </h:panelGroup>
                </div>
            </h:panelGroup>

            <!-- 2.4 Formulaires cachés pour l'arbre (sélection, dépliage) -->
            <h:form id="treeSelectForm" styleClass="utility-hidden">
                <h:inputHidden id="treeEntityId" value="#{treeBean.selectedEntityIdForAjax}"/>
                <p:commandButton id="selectTreeEntityBtn"
                                styleClass="utility-hidden"
                                action="#{treeBean.selectEntityById}"
                                process="@this treeEntityId"
                                update=":contentPanels"
                                ajax="true"
                                onstart="if(typeof showPanelLoading === 'function') showPanelLoading('contentPanelsWrapper', 'Chargement...', 'spinner');"
                                oncomplete="setTimeout(function(){ if(typeof hidePanelLoading === 'function') hidePanelLoading(); if(typeof window.scrollToTopAll === 'function') window.scrollToTopAll(); if(typeof applyTreeSelectionHighlight === 'function') applyTreeSelectionHighlight(); if(typeof initDescriptionExpand === 'function') { initDescriptionExpand(); setTimeout(initDescriptionExpand, 300); } var code = (typeof window.__pendingUrlCode !== 'undefined' &amp;&amp; window.__pendingUrlCode) ? window.__pendingUrlCode : (typeof getEntityCodeFromHighlightedTreeNode === 'function' ? getEntityCodeFromHighlightedTreeNode() : ''); if(typeof updateBrowserUrlAfterNavigation === 'function') updateBrowserUrlAfterNavigation(code); window.__pendingUrlCode = undefined; }, 250);"
                                onerror="if(typeof hidePanelLoading === 'function') hidePanelLoading();"/>
            </h:form>
            <!-- Fragment pour injection des enfants (hors form pour résolution correcte par update) -->
            <h:panelGroup id="treeLoadChildrenFragment" layout="block" style="display:none !important; visibility:hidden;">
                <ui:include src="tree/treeChildrenFragment.xhtml"/>
            </h:panelGroup>

            <!-- Formulaire pour chargement des enfants au dépliage -->
            <h:form id="treeExpandForm" styleClass="utility-hidden">
                <h:inputHidden id="treeExpandEntityId" value="#{treeBean.expandEntityIdForAjax}"/>
                <p:commandButton id="loadTreeChildrenBtn"
                                styleClass="utility-hidden"
                                action="#{treeBean.loadChildrenForEntity}"
                                process="@this treeExpandEntityId"
                                update=":treeLoadChildrenFragment"
                                ajax="true"
                                onstart="if(typeof showPanelLoading === 'function') showPanelLoading('leftTreePanel', 'Chargement...', 'spinner');"
                                oncomplete="var inp=document.querySelector('[id$=treeExpandEntityId]'); var eid=inp?inp.value:null; if(typeof injectTreeChildrenFragment==='function'&amp;&amp;eid){injectTreeChildrenFragment(eid);} if(typeof hidePanelLoading==='function') hidePanelLoading(); if(typeof applyTreeSelectionHighlight==='function') applyTreeSelectionHighlight();"
                                onerror="if(typeof hidePanelLoading==='function') hidePanelLoading();"/>
            </h:form>

            <!-- Formulaire pour déplacement de type par drag-and-drop dans l'arbre -->
            <h:form id="treeMoveForm" styleClass="utility-hidden">
                <h:inputHidden id="treeMoveTypeId" value="#{typeBean.moveTypeIdForDrag}"/>
                <h:inputHidden id="treeMoveNewParentId" value="#{typeBean.moveTypeNewParentIdForDrag}"/>
                <p:commandButton id="prepareConfirmMoveBtn"
                                styleClass="utility-hidden"
                                action="#{typeBean.prepareConfirmMoveFromDrag}"
                                process="@this treeMoveTypeId treeMoveNewParentId"
                                update=":confirmMoveTypeDialogContent"
                                ajax="true"
                                oncomplete="PF('confirmMoveTypeDialog').show();"/>
                <p:commandButton id="moveTypeByDragBtn"
                                styleClass="utility-hidden"
                                action="#{typeBean.moveTypeByDragAndDrop}"
                                process="@this treeMoveTypeId treeMoveNewParentId"
                                update=":growl :mainContentArea :leftTreePanel :contentPanels :selectedEntityLabel"
                                ajax="true"
                                onstart="if(typeof showLoading==='function') showLoading('Déplacement...', 'spinner');"
                                oncomplete="if(typeof hideLoading==='function') hideLoading(); if(typeof applyTreeSelectionHighlight==='function') applyTreeSelectionHighlight(); if(typeof initTreeDragAndDrop==='function') initTreeDragAndDrop();"
                                onerror="if(typeof forceHideLoading==='function') forceHideLoading();"/>
            </h:form>

            <!-- Panneau droit pour les résultats de recherche -->
            <h:panelGroup id="panelRight" styleClass="search-result">
                <ui:include src="search/searchResult.xhtml"/>
            </h:panelGroup>
        </h:panelGroup>

        <!-- Afficher l'arbre automatiquement lorsqu'on accède via URL (mobile + scroll vers sélection) -->
        <h:outputScript rendered="#{requestScope.showTreeOnUrlLoad == true}" target="head">window.showTreeOnUrlLoad=true;</h:outputScript>
    </ui:define>
</ui:composition>
